# gentoo-nexus consumer machine config — drop-in compatible with BOTH
# the nexus 'rolling' binrepo AND the official Gentoo x86-64-v3 binhost.
#
# IMPORTANT: COMMON_FLAGS and CPU_FLAGS_X86 MUST match the official Gentoo
# x86-64-v3 binhost exactly (see wiki "Gentoo binhost / Available packages
# and configurations"). CPU_FLAGS_X86 is a USE flag Portage checks under
# --binpkg-respect-use=y; if it differs, binaries are rejected and recompiled.
# CFLAGS is NOT a binpkg key (emerge ignores it) but both trees are x86-64-v3,
# so runtime is compatible. Keep these in sync with .github/workflows/*.yml.

COMMON_FLAGS="-O2 -pipe -march=x86-64-v3"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

# MUST match the v3 binhost exactly. Do NOT add bmi even if your CPU has it.
CPU_FLAGS_X86="avx avx2 f16c fma3 mmx mmxext popcnt sse sse2 sse3 sse4_1 sse4_2 ssse3"

# USE is inherited from your selected profile (default/linux/amd64/23.0/desktop/gnome).
# The official Gentoo v3 binhost sets NO custom global USE — only profile defaults plus
# */* CPU_FLAGS_X86 — so keep it that way for binary compatibility with both binrepos.
# Set package-specific flags in /etc/portage/package.use instead. ffmpeg codec flags are
# SEPARATE (never a global USE flag), e.g.:
#   media-video/ffmpeg x264 x265 vpx opus dav1d vaapi vdpau


# AMD + Intel coverage. For a single-GPU box use -* amdgpu radeonsi (AMD) or
# -* intel (Intel) to avoid building drivers you don't need.
VIDEO_CARDS="-* amdgpu radeonsi intel"

# Binary host consumption (nexus is unsigned)
FEATURES="getbinpkg parallel-install binpkg-ignore-signature"
EMERGE_DEFAULT_OPTS="--getbinpkg --quiet-build=y --keep-going"
BINPKG_FORMAT="gpkg"
PORTAGE_BINPKG_SIGVERIFY="0"

ACCEPT_LICENSE="*"
ACCEPT_KEYWORDS="~amd64"
MAKEOPTS="-j4"
LC_MESSAGES=C.UTF-8
