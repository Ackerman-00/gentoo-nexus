name: Gentoo Manifest Auto-Generator

on:
  push:
    paths:
      - '**/*.ebuild'
  workflow_dispatch:

jobs:
  generate-manifests:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Manifest Generation in Gentoo Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/overlay \
            -w /overlay \
            gentoo/stage3 sh -c "
              # 1. Fix missing folder warning and disable user privilege dropping
              mkdir -p /var/db/repos/gentoo
              echo 'FEATURES=\"-userfetch\"' >> /etc/portage/make.conf
              
              # 2. Download the official Gentoo tree
              echo 'Fetching Gentoo tree (this takes ~1 minute)...'
              emerge-webrsync -q
              
              # 3. Register your overlay locally (Fixed EOF issue)
              echo 'Registering overlay...'
              mkdir -p /etc/portage/repos.conf
              echo '[overlay]' > /etc/portage/repos.conf/overlay.conf
              echo 'location = /overlay' >> /etc/portage/repos.conf/overlay.conf
              echo 'masters = gentoo' >> /etc/portage/repos.conf/overlay.conf
              echo 'auto-sync = no' >> /etc/portage/repos.conf/overlay.conf
              
              # 4. Find every ebuild and generate its Manifest hash
              echo 'Generating Manifests...'
              find . -name '*.ebuild' -exec ebuild {} manifest \;
              
              # 5. Fix permissions so GitHub Actions can commit the files
              chown -R $(id -u):$(id -g) .
            "

      - name: Commit and Push Manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add all changes (this avoids the fatal pathspec error)
          git add .
          
          # If there are changes, commit and push them
          if ! git diff --cached --quiet; then
            git commit -m "auto: generate Manifest hashes"
            git push
          else
            echo "Manifests are already up to date."
          fi
