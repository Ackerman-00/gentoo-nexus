name: Gentoo Nexus Master Bot

on:
  schedule:
    - cron: '0 */2 * * *'
  push:
    paths:
      - '**/*.ebuild'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 1. Self-Healing & Version Scan
        id: scanner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import os, re, requests, subprocess, stat
          from pathlib import Path

          # ------------------------------------------------------------------
          # Stable packages (numeric versions, not live)
          # ------------------------------------------------------------------
          STABLE_TARGETS = {
              "app-misc/dgop": "AvengeMedia/dgop",
              "games-util/protonplus-bin": "Vysp3r/ProtonPlus"
          }

          # ------------------------------------------------------------------
          # Helper functions
          # ------------------------------------------------------------------
          def get_latest(repo):
              try:
                  r = requests.get(
                      f"https://api.github.com/repos/{repo}/releases/latest",
                      headers={"Authorization": f"token {os.environ['GITHUB_TOKEN']}"},
                      timeout=15
                  )
                  if r.status_code == 200:
                      return r.json().get('tag_name', '').lstrip('v')
              except Exception as e:
                  print(f"⚠️ GitHub API error for {repo}: {e}")
              return None

          def get_appimage_version(filepath):
              try:
                  os.chmod(filepath, stat.S_IRWXU)
                  res = subprocess.run([filepath, '--appimage-version'], capture_output=True, text=True, timeout=10)
                  m = re.search(r'(\d+\.\d+[\.\d]*)', res.stdout + res.stderr)
                  if m: return m.group(1)
                  out = subprocess.run(['strings', filepath], capture_output=True, text=True, timeout=10).stdout
                  m = re.search(r'(\d+\.\d+\.\d+)', out)
                  if m: return m.group(1)
              except Exception as e:
                  print(f"⚠️ Could not extract AppImage version from {filepath}: {e}")
              return None

          def get_latest_commit(repo_url):
              try:
                  out = subprocess.check_output(['git', 'ls-remote', repo_url, 'HEAD'], timeout=30, stderr=subprocess.DEVNULL).decode()
                  m = re.search(r'([a-f0-9]{40})', out)
                  if m: return m.group(1)
              except Exception as e:
                  print(f"⚠️ Could not get latest commit for {repo_url}: {e}")
              return None

          # ------------------------------------------------------------------
          # 1. Fix mangowc version (12.7 -> 0.12.7) – one-time correction
          # ------------------------------------------------------------------
          mango_dir = Path("gui-wm/mangowc")
          if mango_dir.exists():
              ebs = list(mango_dir.glob("mangowc-12.7.ebuild"))
              if ebs:
                  ebs[0].rename(mango_dir / "mangowc-0.12.7.ebuild")
                  print("🐧 Renamed mangowc to 0.12.7")

          # ------------------------------------------------------------------
          # 2. Fix ProtonPlus naming (add "-bin") – one-time correction
          # ------------------------------------------------------------------
          proton_dir = Path("games-util/protonplus-bin")
          if proton_dir.exists():
              for eb in proton_dir.glob("protonplus-[0-9]*.ebuild"):
                  if "protonplus-bin" not in eb.name:
                      new_name = eb.name.replace("protonplus-", "protonplus-bin-")
                      eb.rename(proton_dir / new_name)
                      print(f"🔄 Renamed {eb.name} -> {new_name}")

          # ------------------------------------------------------------------
          # 3. Bump stable packages from GitHub releases
          # ------------------------------------------------------------------
          for path, repo in STABLE_TARGETS.items():
              pkg_dir = Path(path)
              if not pkg_dir.exists():
                  continue
              ebs = sorted(pkg_dir.glob("*.ebuild"))
              if not ebs:
                  continue

              target_file = ebs[0]
              match = re.search(r'-([0-9.]+)\.ebuild$', target_file.name)
              if not match:
                  continue
              curr_ver = match.group(1)
              pkg_name = target_file.name.replace(f"-{curr_ver}.ebuild", "")

              latest_ver = get_latest(repo)
              if latest_ver and latest_ver != curr_ver:
                  print(f"✨ Bumping {pkg_name}: {curr_ver} -> {latest_ver}")
                  target_file.rename(pkg_dir / f"{pkg_name}-{latest_ver}.ebuild")

          # ------------------------------------------------------------------
          # 4. Live ebuilds (version=9999) – update commit hash
          # ------------------------------------------------------------------
          live_dirs = [
              "gui-wm/niri",
              "x11-base/xwayland-satellite",
              "x11-misc/matugen"
          ]
          for live_dir in live_dirs:
              pkg_dir = Path(live_dir)
              if not pkg_dir.exists():
                  continue
              ebs = list(pkg_dir.glob("*.ebuild"))
              for eb in ebs:
                  with open(eb, 'r') as f:
                      content = f.read()
                  m = re.search(r'^version=(\S+)', content, re.MULTILINE)
                  if m and m.group(1).strip('"\'') == '9999':
                      # Extract repo URL
                      repo_match = re.search(r'^(?:EGIT|GIT)_REPO_URI=(["\'])(.*?)\1', content, re.MULTILINE)
                      if not repo_match:
                          gh_match = re.search(r'https://github\.com/([A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+)', content)
                          if gh_match:
                              repo_url = f"https://github.com/{gh_match.group(1)}"
                              repo_match = (None, None, repo_url)  # fake match
                      if repo_match:
                          repo_url = repo_match[2] if len(repo_match) > 2 else repo_match.group(2)
                          new_commit = get_latest_commit(repo_url)
                          if new_commit:
                              if '_commit=' in content:
                                  new_content = re.sub(r'(_commit=["\']?)[a-f0-9]+', r'\1' + new_commit, content)
                              else:
                                  # Insert _commit after version
                                  new_content = re.sub(r'(^version=.*)', r'\1\n_commit="' + new_commit + '"', content, flags=re.MULTILINE)
                              if new_content != content:
                                  with open(eb, 'w') as f:
                                      f.write(new_content)
                                  print(f"🔄 Updated live {eb.name} commit to {new_commit[:8]}")
                          else:
                              print(f"⚠️ Could not get latest commit for {eb.name}")
                  else:
                      print(f"ℹ️ {eb.name} is not a live ebuild (version != 9999)")

          # ------------------------------------------------------------------
          # 5. RootApp AppImage tracking (with error handling)
          # ------------------------------------------------------------------
          root_dir = Path("app-misc/rootapp-bin")
          if root_dir.exists():
              ebs = list(root_dir.glob("*.ebuild"))
              if ebs:
                  # Download AppImage
                  print("📥 Downloading Root.AppImage...")
                  ret = os.system("curl -sLf -o Root.AppImage https://installer.rootapp.com/installer/Linux/X64/Root.AppImage")
                  if ret == 0 and os.path.exists("Root.AppImage"):
                      version = get_appimage_version("Root.AppImage")
                      if version and version not in ebs[0].name:
                          ebs[0].rename(root_dir / f"rootapp-bin-{version}.ebuild")
                          print(f"📦 Updated rootapp-bin to {version}")
                      else:
                          print("ℹ️ RootApp version unchanged or not detected.")
                  else:
                      print("❌ Failed to download Root.AppImage (curl exit code {ret})")
                  # Clean up
                  if os.path.exists("Root.AppImage"):
                      os.remove("Root.AppImage")
          EOF

      - name: 2. Generate Manifests (Gentoo Container)
        run: |
          docker run --rm -v ${{ github.workspace }}:/overlay -w /overlay gentoo/stage3 sh -c "
            set -e
            mkdir -p /var/db/repos/gentoo /etc/portage/repos.conf
            echo 'FEATURES=\"-userfetch -ipc-sandbox -network-sandbox -pid-sandbox\"' >> /etc/portage/make.conf
            emerge-webrsync -q
            echo -e '[gentoo-nexus]\nlocation = /overlay\nmasters = gentoo' > /etc/portage/repos.conf/gentoo-nexus.conf
            find . -name '*.ebuild' -exec ebuild {} manifest \;
            chown -R $(id -u):$(id -g) .
          "

      - name: 3. Commit and Push (safe branch handling)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "bot: auto-update ebuilds and manifests"
            branch=$(git rev-parse --abbrev-ref HEAD)
            if [ "$branch" = "main" ]; then
              git pull --rebase origin main
              git push
            else
              echo "Not on main branch, skipping push. Branch: $branch"
            fi
          fi

  build-binaries:
    needs: update-and-manifest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [gui-wm/niri, gui-wm/mangowc, gui-wm/dank-material-shell, x11-base/xwayland-satellite, app-misc/dgop, x11-misc/matugen, games-util/protonplus-bin]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check Binhost Status (skip live packages)
        id: check_bin
        run: |
          PN=$(basename ${{ matrix.package }})
          # Extract version from the first ebuild in the directory
          VER=$(python3 << PY
          import glob, re
          ebuilds = glob.glob('${{ matrix.package }}/*.ebuild')
          if not ebuilds:
              print("")
              exit(0)
          with open(ebuilds[0], 'r') as f:
              content = f.read()
              m = re.search(r'^version=(\S+)', content, re.MULTILINE)
              if m:
                  print(m.group(1).strip('"\''))
              else:
                  print("")
          PY
          )
          if [ "$VER" = "9999" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Live package $PN, always build."
            exit 0
          fi

          BINHOST="https://ackerman-00.github.io/gentoo-nexus/Packages"
          if [ -n "$VER" ] && curl -sL "$BINHOST" | grep -q "\<${PN}-${VER}\>"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "✅ Binary ${PN}-${VER} already exists. Skipping build."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Binary (Gentoo Docker)
        if: steps.check_bin.outputs.skip == 'false'
        run: |
          docker run --rm -v ${{ github.workspace }}:/overlay gentoo/stage3 sh -c "
            set -e
            mkdir -p /var/db/repos/gentoo /etc/portage/repos.conf
            echo 'FEATURES=\"-userfetch -ipc-sandbox -network-sandbox -pid-sandbox\"' >> /etc/portage/make.conf
            emerge-webrsync -q
            # Install rust if needed (detect from ebuild? Here we just do it for all)
            emerge --noreplace dev-lang/rust-bin
            echo 'USE=\"wayland vulkan pipewire -X -systemd\"' >> /etc/portage/make.conf
            echo -e '[gentoo-nexus]\nlocation = /overlay\nmasters = gentoo' > /etc/portage/repos.conf/gentoo-nexus.conf
            emerge --autounmask=y --autounmask-write --buildpkg --quiet ${{ matrix.package }}
            # Copy built packages and ensure a Packages file exists
            mkdir -p /overlay/job_out
            cp -r /var/cache/binpkgs/* /overlay/job_out/ 2>/dev/null || true
            cd /var/cache/binpkgs
            if [ ! -f Packages ]; then
                touch /overlay/job_out/Packages
            else
                cp Packages /overlay/job_out/
            fi
            chown -R $(id -u):$(id -g) /overlay/job_out
          "

      - name: Upload Intermediate
        if: steps.check_bin.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: binpkg-${{ strategy.job-index }}
          path: job_out/

  deploy-binhost:
    needs: build-binaries
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: combined/
          pattern: binpkg-*
          merge-multiple: true
      - name: Merge Packages files and prepare for deployment
        run: |
          # Combine all Packages files (if any) into one
          find combined -name "Packages" -exec cat {} \; | sort -u > combined/Packages
          # Ensure .nojekyll is present
          touch combined/.nojekyll
          # Copy to public_binhost
          mkdir -p public_binhost
          cp -r combined/* public_binhost/
          # Create a simple index.html for browsing
          cat > public_binhost/index.html << 'HTML'
          <!DOCTYPE html>
          <html><head><title>Gentoo Nexus Binhost</title></head>
          <body><h1>Gentoo Nexus Binhost</h1><pre>$(ls -1 public_binhost)</pre></body></html>
          HTML
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public_binhost/
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
