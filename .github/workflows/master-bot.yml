name: Gentoo Nexus Master Bot

on:
  schedule:
    - cron: '0 */2 * * *'
  push:
    paths:
      - '**/*.ebuild'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 1. Deep Version Scan & Bump
        id: scanner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import os, re, requests, json
          from pathlib import Path

          TARGETS = {
              "app-misc/dgop": "AvengeMedia/dgop",
              "x11-misc/matugen": "strzelewicz/matugen",
              "games-util/protonplus-bin": "Vysp3r/ProtonPlus"
          }

          def get_latest(repo):
              r = requests.get(f"https://api.github.com/repos/{repo}/releases/latest", 
                               headers={"Authorization": f"token {os.environ['GITHUB_TOKEN']}"})
              return r.json().get('tag_name', '').lstrip('v') if r.status_code == 200 else None

          # Correctly indexing the list objects to avoid AttributeError
          for path, repo in TARGETS.items():
              pkg_dir = Path(path)
              if not pkg_dir.exists(): continue
              ebuilds = list(pkg_dir.glob("*.ebuild"))
              if not ebuilds: continue
              
              # ACCESS THE FIRST OBJECT IN THE LIST
              ebuild_path = ebuilds 
              match = re.search(r'-([0-9.]+)\.ebuild', ebuild_path.name)
              if not match: continue
              curr_ver = match.group(1)
              pkg_base = ebuild_path.name[:ebuild_path.name.rfind(f"-{curr_ver}")]
              
              latest_ver = get_latest(repo)
              if latest_ver and latest_ver != curr_ver:
                  print(f"✨ Bumping {pkg_base}: {curr_ver} -> {latest_ver}")
                  ebuild_path.rename(pkg_dir / f"{pkg_base}-{latest_ver}.ebuild")

          # RootApp Verification (Verified Category: app-misc/rootapp-bin)
          root_dir = Path("app-misc/rootapp-bin")
          if root_dir.exists():
              ebs = list(root_dir.glob("*.ebuild"))
              if ebs:
                  eb_path = ebs
                  os.system("curl -sL -o Root.AppImage https://installer.rootapp.com/installer/Linux/X64/Root.AppImage")
                  os.system("chmod +x Root.AppImage && ./Root.AppImage --appimage-extract > /dev/null")
                  ver_file = Path("squashfs-root/usr/bin/sq.version")
                  if ver_file.exists():
                      with open(ver_file, 'r') as f:
                          v = re.search(r'[0-9]+\.[0-9]+\.[0-9]+', f.read()).group(0)
                          if f"rootapp-bin-{v}.ebuild" != eb_path.name:
                              eb_path.rename(root_dir / f"rootapp-bin-{v}.ebuild")
                  os.system("rm -rf Root.AppImage squashfs-root")
          EOF

      - name: 2. Generate Manifests (Gentoo Docker)
        run: |
          docker run --rm -v ${{ github.workspace }}:/overlay -w /overlay gentoo/stage3 sh -c "
            mkdir -p /var/db/repos/gentoo && emerge-webrsync -q
            echo -e '[overlay]\nlocation = /overlay\nmasters = gentoo' > /etc/portage/repos.conf/overlay.conf
            find . -name '*.ebuild' -exec ebuild {} manifest \;
            chown -R $(id -u):$(id -g) .
          "

      - name: 3. Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "bot: sync upstream and update manifests"
            git pull --rebase origin main && git push
          fi

  build-binaries:
    needs: update-and-manifest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [gui-wm/niri, gui-wm/mangowc, gui-wm/dank-material-shell, x11-base/xwayland-satellite, app-misc/dgop, x11-misc/matugen, games-util/protonplus-bin]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check if Binary Exists (Cache Logic)
        id: check_bin
        run: |
          # Reliable Python extraction of the current local version
          LOCAL_VER=$(python3 -c "import os,re; f=os.listdir('${{ matrix.package }}'); print(re.search(r'-(.*)\.ebuild', f).group(1))")
          PKG_NAME=$(echo "${{ matrix.package }}" | cut -d'/' -f2)
          BINHOST="https://ackerman-00.github.io/gentoo-nexus/Packages"
          
          if curl -sL "$BINHOST" | grep -q "${PKG_NAME}-${LOCAL_VER}"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Binary ${PKG_NAME}-${LOCAL_VER} already exists. Skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and Index (Gentoo Docker)
        if: steps.check_bin.outputs.skip == 'false'
        run: |
          docker run --rm -v ${{ github.workspace }}:/overlay gentoo/stage3 sh -c "
            mkdir -p /var/db/repos/gentoo && emerge-webrsync -q
            emerge --noreplace dev-lang/rust-bin
            echo 'USE=\"wayland vulkan pipewire -X -systemd\"' >> /etc/portage/make.conf
            echo -e '[overlay]\nlocation = /overlay\nmasters = gentoo' > /etc/portage/repos.conf/overlay.conf
            
            # 1. Build package into .gpkg binary
            emerge --autounmask=y --autounmask-write --buildpkg ${{ matrix.package }}
            
            # 2. Setup public folder and index
            mkdir -p /overlay/public_binhost
            cp -r /var/cache/binpkgs/* /overlay/public_binhost/
            cd /overlay/public_binhost && emaint binhost --fix
            touch .nojekyll
            chown -R $(id -u):$(id -g) /overlay/public_binhost
          "

      - name: Upload Binhost Artifact
        if: steps.check_bin.outputs.skip == 'false'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public_binhost/

  deploy:
    needs: build-binaries
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
