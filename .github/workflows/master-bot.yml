name: Gentoo Nexus Master Bot

on:
  push:
    paths:
      - '**/*.ebuild'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  maintain-repo:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 1. Check for RootApp Updates
        run: |
          CURRENT_VER=$(ls app-misc/rootapp-bin/rootapp-bin-*.ebuild | sed -E 's/.*rootapp-bin-(.*)\.ebuild/\1/')
          echo "Current version: $CURRENT_VER"
          
          curl -sL -o Root.AppImage "https://installer.rootapp.com/installer/Linux/X64/Root.AppImage"
          chmod +x Root.AppImage
          ./Root.AppImage --appimage-extract > /dev/null
          
          LATEST_VER=$(cat squashfs-root/usr/bin/sq.version | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "Latest upstream: $LATEST_VER"
          
          if [ -n "$LATEST_VER" ] && [ "$CURRENT_VER" != "$LATEST_VER" ]; then
            echo "Update found! Moving $CURRENT_VER -> $LATEST_VER"
            git mv app-misc/rootapp-bin/rootapp-bin-${CURRENT_VER}.ebuild app-misc/rootapp-bin/rootapp-bin-${LATEST_VER}.ebuild
          fi
          
          rm -rf Root.AppImage squashfs-root

      - name: 2. Generate Manifests (For all packages)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/overlay \
            -w /overlay \
            gentoo/stage3 sh -c "
              mkdir -p /var/db/repos/gentoo
              echo 'FEATURES=\"-userfetch\"' >> /etc/portage/make.conf
              emerge-webrsync -q
              mkdir -p /etc/portage/repos.conf
              echo '[overlay]' > /etc/portage/repos.conf/overlay.conf
              echo 'location = /overlay' >> /etc/portage/repos.conf/overlay.conf
              echo 'masters = gentoo' >> /etc/portage/repos.conf/overlay.conf
              echo 'auto-sync = no' >> /etc/portage/repos.conf/overlay.conf
              
              find . -name '*.ebuild' -exec ebuild {} manifest \;
              chown -R $(id -u):$(id -g) .
            "

      - name: 3. Commit and Push Safely
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          if ! git diff --cached --quiet; then
            git commit -m "auto: sync updates and generate manifests"
            git pull --rebase origin main || true
            git push
          else
            echo "Everything is perfectly up to date."
          fi
