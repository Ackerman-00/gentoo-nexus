name: Gentoo Nexus Master Bot

on:
  schedule:
    - cron: '0 */2 * * *' # Every 2 hours
  push:
    paths:
      - '**/*.ebuild'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  update-and-manifest:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.scanner.outputs.packages }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 1. Deep Version Scan & Bump
        id: scanner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import os, re, requests, json
          from pathlib import Path

          # Verified categories from your repo screenshots
          TARGETS = {
              "app-misc/dgop": "AvengeMedia/dgop",
              "x11-misc/matugen": "strzelewicz/matugen",
              "games-util/protonplus-bin": "Vysp3r/ProtonPlus"
          }

          def get_latest(repo):
              try:
                  r = requests.get(f"https://api.github.com/repos/{repo}/releases/latest", 
                                   headers={"Authorization": f"token {os.environ['GITHUB_TOKEN']}"},
                                   timeout=15)
                  if r.status_code == 200:
                      return r.json().get('tag_name', '').lstrip('v')
              except: pass
              return None

          # Corrected loop handling Path objects correctly
          for path, repo in TARGETS.items():
              pkg_dir = Path(path)
              if not pkg_dir.exists(): continue
              ebuilds = list(pkg_dir.glob("*.ebuild"))
              if not ebuilds: continue
              
              # FIX: Explicitly access the first file object in the list
              current_ebuild_path = ebuilds 
              
              # Extract version from filename (e.g., dgop-1.0.0.ebuild -> 1.0.0)
              match = re.search(r'-(.*)\.ebuild', current_ebuild_path.name)
              if not match: continue
              curr_ver = match.group(1)
              
              # Extract package name part
              pkgname = current_ebuild_path.name.replace(f"-{curr_ver}.ebuild", "")
              
              latest_ver = get_latest(repo)
              if latest_ver and latest_ver != curr_ver:
                  print(f"✨ Bumping {pkgname}: {curr_ver} -> {latest_ver}")
                  # FIX: Call rename on the Path object, not the list
                  current_ebuild_path.rename(pkg_dir / f"{pkgname}-{latest_ver}.ebuild")

          # RootApp Versioning (Special Logic for AppImage extraction)
          root_dir = Path("app-misc/rootapp-bin")
          if root_dir.exists():
              ebs = list(root_dir.glob("*.ebuild"))
              if ebs:
                  # Extraction logic to find the real version inside the AppImage
                  os.system("curl -sL -o Root.AppImage https://installer.rootapp.com/installer/Linux/X64/Root.AppImage")
                  os.system("chmod +x Root.AppImage && ./Root.AppImage --appimage-extract > /dev/null")
                  ver_file = Path("squashfs-root/usr/bin/sq.version")
                  if ver_file.exists():
                      with open(ver_file, 'r') as f:
                          content = f.read()
                          v_match = re.search(r'[0-9]+\.[0-9]+\.[0-9]+', content)
                          if v_match:
                              v = v_match.group(0)
                              if v not in ebs.name:
                                  # FIX: Call rename on the first item
                                  ebs.rename(root_dir / f"rootapp-bin-{v}.ebuild")
                  os.system("rm -rf Root.AppImage squashfs-root")
          EOF

      - name: 2. Generate Manifests (Gentoo Docker)
        run: |
          docker run --rm -v ${{ github.workspace }}:/overlay -w /overlay gentoo/stage3 sh -c "
            mkdir -p /var/db/repos/gentoo && emerge-webrsync -q
            echo -e '[overlay]\nlocation = /overlay\nmasters = gentoo' > /etc/portage/repos.conf/overlay.conf
            # Force manifest for mangowc 12.7 as requested
            [ -f gui-wm/mangowc/mangowc-12.7.ebuild ] && ebuild gui-wm/mangowc/mangowc-12.7.ebuild manifest
            find . -name '*.ebuild' -exec ebuild {} manifest \;
            chown -R $(id -u):$(id -g) .
          "

      - name: 3. Commit and Rebase
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "bot: update upstream versions and manifests"
            git pull --rebase origin main && git push
          fi

  build-binaries:
    needs: update-and-manifest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Matrix covers both Live and Stable packages in your repo
        package: [gui-wm/niri, gui-wm/mangowc, gui-wm/dank-material-shell, x11-base/xwayland-satellite, app-misc/dgop, x11-misc/matugen]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check for Existing Binary Asset
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG_NAME=$(echo "${{ matrix.package }}" | cut -d'/' -f2)
          # Use GH CLI to check if a binary already exists in the release tag
          EXISTS=$(gh release view binaries-latest --json assets --jq ".assets[].name" 2>/dev/null | grep "^${PKG_NAME}-" || echo "NOT_FOUND")
          
          if [[ "$EXISTS" != "NOT_FOUND" ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Binary for ${{ matrix.package }} already exists. Skipping build."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Binary Asset (Gentoo Docker)
        if: steps.check_release.outputs.skip == 'false'
        run: |
          docker run --rm -v ${{ github.workspace }}:/overlay gentoo/stage3 sh -c "
            emerge-webrsync -q && emerge --noreplace dev-lang/rust-bin
            echo 'USE=\"wayland vulkan pipewire -X -systemd\"' >> /etc/portage/make.conf
            echo -e '[overlay]\nlocation = /overlay\nmasters = gentoo' > /etc/portage/repos.conf/overlay.conf
            # Build and create the standard Gentoo .gpkg binary package
            emerge --autounmask=y --autounmask-write --buildpkg ${{ matrix.package }}
            mkdir -p /overlay/binaries
            cp -r /var/cache/binpkgs/* /overlay/binaries/
          "

      - name: Upload Binaries to Release
        if: steps.check_release.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: binaries-latest
          files: binaries/**/*
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
