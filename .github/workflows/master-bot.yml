name: Gentoo Nexus Master Bot

on:
  schedule:
    - cron: '0 */2 * * *'
  push:
    paths:
      - '**/*.ebuild'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 1. Deep Version Scan
        id: scanner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import os, re, requests
          from pathlib import Path

          TARGETS = {
              "app-misc/dgop": "AvengeMedia/dgop",
              "x11-misc/matugen": "strzelewicz/matugen",
              "games-util/protonplus-bin": "Vysp3r/ProtonPlus"
          }

          def get_latest(repo):
              r = requests.get(f"https://api.github.com/repos/{repo}/releases/latest", 
                               headers={"Authorization": f"token {os.environ['GITHUB_TOKEN']}"})
              return r.json().get('tag_name', '').lstrip('v') if r.status_code == 200 else None

          # FIXED: Line-by-line list object handling
          for path, repo in TARGETS.items():
              pkg_dir = Path(path)
              if not pkg_dir.exists(): continue
              ebuilds = list(pkg_dir.glob("*.ebuild"))
              if not ebuilds: continue
              
              current_ebuild = ebuilds # THE FIX: Explicitly get the first file object
              match = re.search(r'-(.*)\.ebuild', current_ebuild.name)
              if not match: continue
              curr_ver = match.group(1)
              pkgname = current_ebuild.name.replace(f"-{curr_ver}.ebuild", "")
              
              latest_ver = get_latest(repo)
              if latest_ver and latest_ver != curr_ver:
                  print(f"✨ Bumping {pkgname}: {curr_ver} -> {latest_ver}")
                  current_ebuild.rename(pkg_dir / f"{pkgname}-{latest_ver}.ebuild")

          # RootApp Versioning (Verified Category: app-misc/rootapp-bin)
          root_dir = Path("app-misc/rootapp-bin")
          if root_dir.exists():
              ebs = list(root_dir.glob("*.ebuild"))
              if ebs:
                  os.system("curl -sL -o Root.AppImage https://installer.rootapp.com/installer/Linux/X64/Root.AppImage")
                  os.system("chmod +x Root.AppImage && ./Root.AppImage --appimage-extract > /dev/null")
                  ver_file = Path("squashfs-root/usr/bin/sq.version")
                  if ver_file.exists():
                      with open(ver_file, 'r') as f:
                          v = re.search(r'[0-9]+\.[0-9]+\.[0-9]+', f.read()).group(0)
                          if v not in ebs.name: # THE FIX: Access first item in list
                              ebs.rename(root_dir / f"rootapp-bin-{v}.ebuild")
                  os.system("rm -rf Root.AppImage squashfs-root")
          EOF

      - name: 2. Generate Manifests (Gentoo Docker)
        run: |
          docker run --rm -v ${{ github.workspace }}:/overlay -w /overlay gentoo/stage3 sh -c "
            mkdir -p /var/db/repos/gentoo && emerge-webrsync -q
            echo -e '[overlay]\nlocation = /overlay\nmasters = gentoo' > /etc/portage/repos.conf/overlay.conf
            # Force indexing for mangowc 12.7
            [ -f gui-wm/mangowc/mangowc-12.7.ebuild ] && ebuild gui-wm/mangowc/mangowc-12.7.ebuild manifest
            find . -name '*.ebuild' -exec ebuild {} manifest \;
            chown -R $(id -u):$(id -g) .
          "

      - name: 3. Commit and Rebase
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "bot: sync upstream versions and manifests"
            git pull --rebase origin main && git push
          fi

  build-and-deploy:
    needs: update-and-manifest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [gui-wm/niri, gui-wm/mangowc, gui-wm/dank-material-shell, x11-base/xwayland-satellite, app-misc/dgop, x11-misc/matugen]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build & Index Binaries
        run: |
          docker run --rm -v ${{ github.workspace }}:/overlay gentoo/stage3 sh -c "
            emerge-webrsync -q && emerge --noreplace dev-lang/rust-bin
            echo 'USE=\"wayland vulkan pipewire -X -systemd\"' >> /etc/portage/make.conf
            echo -e '[overlay]\nlocation = /overlay\nmasters = gentoo' > /etc/portage/repos.conf/overlay.conf
            # Build and create .gpkg
            emerge --autounmask=y --autounmask-write --buildpkg ${{ matrix.package }}
            mkdir -p /overlay/public_binhost
            cp -r /var/cache/binpkgs/* /overlay/public_binhost/
            # THE CRITICAL STEP: Create the Portage Binhost Index
            cd /overlay/public_binhost && emaint binhost --fix
            touch .nojekyll
            chown -R $(id -u):$(id -g) /overlay/public_binhost
          "

      - name: Upload Binhost Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public_binhost/

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages (Pure File Server Mode)
        id: deployment
        uses: actions/deploy-pages@v4
