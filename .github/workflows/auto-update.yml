name: RootApp Auto-Updater

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Check for Updates
        id: updater
        run: |
          # 1. Read the current version from your ebuild's filename
          CURRENT_VER=$(ls app-misc/rootapp-bin/rootapp-bin-*.ebuild | sed -E 's/.*rootapp-bin-(.*)\.ebuild/\1/')
          echo "Current version in repo is: $CURRENT_VER"

          # 2. Download the absolute latest AppImage from the developer
          echo "Downloading latest AppImage..."
          curl -sL -o Root.AppImage "https://installer.rootapp.com/installer/Linux/X64/Root.AppImage"
          chmod +x Root.AppImage

          # 3. Extract the AppImage and read the internal version file
          ./Root.AppImage --appimage-extract > /dev/null
          
          # Use regex to strictly grab the semantic version number (e.g., 0.9.108)
          LATEST_VER=$(cat squashfs-root/usr/bin/sq.version | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "Latest upstream version is: $LATEST_VER"

          # 4. Compare and decide if we need to update
          if [ -z "$LATEST_VER" ]; then
            echo "Error: Could not extract version number."
            exit 1
          fi

          if [ "$CURRENT_VER" != "$LATEST_VER" ]; then
            echo "🚨 UPDATE FOUND! Moving $CURRENT_VER -> $LATEST_VER"
            
            # Rename the ebuild to the new version
            git mv app-misc/rootapp-bin/rootapp-bin-${CURRENT_VER}.ebuild app-misc/rootapp-bin/rootapp-bin-${LATEST_VER}.ebuild
            
            # Save the variables so the next steps know an update happened
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "new_ver=$LATEST_VER" >> $GITHUB_OUTPUT
          else
            echo "✅ Repo is already up to date."
            echo "update_needed=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate New Security Manifest
        if: steps.updater.outputs.update_needed == 'true'
        run: |
          # We use the Gentoo Docker container to generate the new hashes
          docker run --rm \
            -v ${{ github.workspace }}:/overlay \
            -w /overlay \
            gentoo/stage3 sh -c "
              mkdir -p /var/db/repos/gentoo
              echo 'FEATURES=\"-userfetch\"' >> /etc/portage/make.conf
              emerge-webrsync -q
              mkdir -p /etc/portage/repos.conf
              echo '[overlay]' > /etc/portage/repos.conf/overlay.conf
              echo 'location = /overlay' >> /etc/portage/repos.conf/overlay.conf
              echo 'masters = gentoo' >> /etc/portage/repos.conf/overlay.conf
              echo 'auto-sync = no' >> /etc/portage/repos.conf/overlay.conf
              
              cd app-misc/rootapp-bin
              ebuild rootapp-bin-${{ steps.updater.outputs.new_ver }}.ebuild manifest
              chown -R $(id -u):$(id -g) .
            "

      - name: Commit and Push to Repo
        if: steps.updater.outputs.update_needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "app-misc/rootapp-bin: auto-bump to ${{ steps.updater.outputs.new_ver }}"
          git push
