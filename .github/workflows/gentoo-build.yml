name: Gentoo Build Relay

on:
  workflow_dispatch:
    inputs:
      package_list:
        description: 'Space-separated list of package atoms to build'
        required: true
      force_rebuild:
        description: 'List of specific packages to force rebuild (or "true" for all)'
        type: string
        required: false
        default: ""

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Prepare Workspace
        run: |
          mkdir -p binpkgs overlay distfiles ccache
          chmod -R 777 binpkgs overlay distfiles ccache

      - name: Prepare Overlay with Full Repo Structure
        run: |
          rsync -a --exclude='.git' --exclude='binpkgs' --exclude='overlay' ./ overlay/
          mkdir -p overlay/metadata
          cat > overlay/metadata/layout.conf << 'LAYOUTEOF'
          masters = gentoo
          thin-manifests = true
          sign-manifests = false
          LAYOUTEOF
          mkdir -p overlay/profiles
          echo "gentoo-nexus" > overlay/profiles/repo_name
          chmod -R 777 overlay/

      - name: Download Release Binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo ">>> Downloading existing .gpkg.tar and Packages from rolling release..."
          gh release download rolling \
            -p "*.gpkg.tar" -p "Packages*" \
            --repo ${{ github.repository }} \
            --dir binpkgs --clobber 2>/dev/null || true

          echo ">>> Scanning for and removing corrupted/incomplete downloads..."
          for f in binpkgs/*.gpkg.tar; do
            [ -e "$f" ] || continue
            if ! tar -tf "$f" >/dev/null 2>&1; then
              echo "Removed corrupted file to protect indexer: $f"
              rm -f "$f"
            fi
          done

      - name: Restore GPKG Layout using Overlay Mapping
        run: |
          echo ">>> Restoring GPKG folder strict-layout via Overlay Mapping..."
          docker run --rm \
            -v "${{ github.workspace }}/binpkgs:/var/cache/binpkgs:rw" \
            -v "${{ github.workspace }}/overlay:/var/db/repos/gentoo-nexus:ro" \
            gentoo/stage3:amd64-desktop-openrc \
            python3 -c "
          import os, shutil
          from portage.versions import pkgsplit

          pkgdir = '/var/cache/binpkgs'

          # Sync portage tree so we can map upstream packages too
          os.system('emerge-webrsync -q')

          repos = ['/var/db/repos/gentoo-nexus', '/var/db/repos/gentoo']
          pn_to_cat = {}

          # Map every package name to its true category
          for repo in repos:
              if not os.path.exists(repo): continue
              for cat in os.listdir(repo):
                  if cat.startswith('.') or cat in ['metadata', 'profiles', 'eclass', 'scripts']: continue
                  cat_path = os.path.join(repo, cat)
                  if not os.path.isdir(cat_path): continue
                  for pn in os.listdir(cat_path):
                      if pn not in pn_to_cat:
                          pn_to_cat[pn] = cat

          for f in os.listdir(pkgdir):
              if not f.endswith('.gpkg.tar'): continue

              path = os.path.join(pkgdir, f)

              # Strip .gpkg.tar suffix, then strip trailing build ID (-1)
              base = f[:-9]
              if '-' in base:
                  base = base.rsplit('-', 1)[0]

              split_res = pkgsplit(base)
              if not split_res:
                  split_res = pkgsplit(f[:-9])

              if split_res:
                  pn = split_res[0]
                  if pn in pn_to_cat:
                      cat = pn_to_cat[pn]
                      target_dir = os.path.join(pkgdir, cat, pn)
                      target_path = os.path.join(target_dir, f)

                      if path != target_path:
                          os.makedirs(target_dir, exist_ok=True)
                          shutil.move(path, target_path)
                          print(f'Restored: {cat}/{pn}/{f}')
                  else:
                      print(f'Warning: Could not resolve category for {pn}')
              else:
                  print(f'Warning: pkgsplit could not parse: {base}')
          "

      - name: Pre-fetch webkit-gtk from official binhost if missing
        run: |
          if ls binpkgs/*/webkit-gtk/*.gpkg.tar >/dev/null 2>&1; then
            echo "✓ webkit-gtk binary already cached."
          else
            echo ">>> webkit-gtk not in release – fetching from official Gentoo binhost..."
            docker run --rm \
              -v "${{ github.workspace }}/binpkgs:/var/cache/binpkgs:rw" \
              gentoo/stage3:amd64-desktop-openrc \
              bash -c '
                set -euo pipefail
                mkdir -p /var/db/repos/gentoo /etc/portage/repos.conf /etc/portage/package.accept_keywords
                emerge-webrsync -q
                cat > /etc/portage/make.conf << EOF
          ACCEPT_KEYWORDS="~amd64"
          ACCEPT_LICENSE="*"
          FEATURES="getbinpkg -binpkg-verify-signature"
          EMERGE_DEFAULT_OPTS="--getbinpkgonly --quiet-build=y"
          BINPKG_FORMAT="gpkg"
          PKGDIR="/var/cache/binpkgs"
          EOF
                rm -rf /etc/portage/binrepos.conf/
                mkdir -p /etc/portage/binrepos.conf
                cat > /etc/portage/binrepos.conf/gentoo.conf << BINHOST
          [DEFAULT]
          verify-signature = false
          [gentoo]
          priority = 9999
          sync-uri = https://distfiles.gentoo.org/releases/amd64/binpackages/23.0/x86-64/
          BINHOST
                echo "net-libs/webkit-gtk -~amd64 amd64" > /etc/portage/package.accept_keywords/stable
                emerge net-libs/webkit-gtk
              '
          fi

      - name: Fix Workspace Permissions (Pre-Build)
        run: sudo chown -R "$(id -u):$(id -g)" "${{ github.workspace }}"

      - name: Parse Queue
        id: queue
        run: |
          read -r -a PKGS <<< "${{ github.event.inputs.package_list }}"
          echo "TARGET_PKG=${PKGS[0]:-}" >> "$GITHUB_OUTPUT"
          echo "REMAINING_PKGS=${PKGS[*]:1}" >> "$GITHUB_OUTPUT"

      - name: Check Binary Exists
        id: check_bin
        run: |
          TARGET="${{ steps.queue.outputs.TARGET_PKG }}"
          [ -z "$TARGET" ] && { echo "skip_compile=true" >> "$GITHUB_OUTPUT"; exit 0; }

          CPV="${TARGET#=}"

          python3 -c "
          import os, shutil, re
          cpv = '${CPV}'
          parts = cpv.split('/')
          cat = parts[0]
          pkg_ver = parts[1] if len(parts) > 1 else parts[0]
          pn_parts = re.split(r'-[0-9]', pkg_ver, 1)
          pn = pn_parts[0]
          target_dir = os.path.join('binpkgs', cat, pn)

          # Always rebuild live ebuilds (version == 9999) because the source
          # or ebuild may have changed without a version bump.
          if pkg_ver == '9999':
              print(f'Live ebuild detected for {cpv}. Forcing rebuild.')
              if os.path.exists(target_dir): shutil.rmtree(target_dir)
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('skip_compile=false\n')
              exit(0)

          force_input = '${{ github.event.inputs.force_rebuild }}'
          force = False
          if force_input.lower() == 'true':
              force = True
          else:
              for fp in force_input.split():
                  if fp.replace('=', '') in cpv:
                      force = True

          if force:
              print(f'Force rebuild triggered for {cpv}. Purging: {target_dir}')
              if os.path.exists(target_dir): shutil.rmtree(target_dir)
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('skip_compile=false\n')
          else:
              skip = False
              if os.path.exists('binpkgs/Packages'):
                  with open('binpkgs/Packages', 'r') as f:
                      if f'CPV: {cpv}' in f.read(): skip = True

              if skip:
                  print(f'Binary {cpv} already in Packages index. Skipping compile.')
                  with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                      f.write('skip_compile=true\n')
              else:
                  print(f'Binary {cpv} not found. Will compile from source.')
                  if os.path.exists(target_dir):
                      shutil.rmtree(target_dir)
                      print(f'Purged older versions from {target_dir} before compile')
                  with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                      f.write('skip_compile=false\n')
          "

      - name: Write Docker Build Script to File
        if: steps.check_bin.outputs.skip_compile != 'true'
        run: |
          TARGET="${{ steps.queue.outputs.TARGET_PKG }}"
          cat > build_inside_docker.sh << 'BUILDSCRIPT'
          #!/bin/bash
          set -euo pipefail

          mkdir -p /var/db/repos/gentoo
          emerge-webrsync -q

          eselect profile set default/linux/amd64/23.0/desktop 2>/dev/null || \
            eselect profile list 2>/dev/null | grep -m1 desktop | awk '{print $1}' | tr -d '[]' | xargs -r eselect profile set || \
            eselect profile set 1

          getuto 2>/dev/null || emerge -q --oneshot app-crypt/gentoo-keys 2>/dev/null || true

          cat > /etc/portage/make.conf << 'MAKECONF'
          COMMON_FLAGS="-O2 -march=x86-64 -pipe"
          VIDEO_CARDS="amdgpu radeonsi"
          CFLAGS="${COMMON_FLAGS}"
          CXXFLAGS="${COMMON_FLAGS}"
          USE="vaapi vdpau vulkan amdgpu ffmpeg encode elogind egl -systemd -cups abi_x86_32"
          FEATURES="buildpkg parallel-install -binpkg-verify-signature -sandbox -usersandbox -ipc-sandbox -network-sandbox -pid-sandbox"
          BINPKG_FORMAT="gpkg"
          PKGDIR="/var/cache/binpkgs"
          DISTDIR="/var/cache/distfiles"
          ACCEPT_LICENSE="*"
          ACCEPT_KEYWORDS="~amd64"
          EMERGE_DEFAULT_OPTS="--usepkg --buildpkg --binpkg-respect-use=y --quiet-build=y --jobs=4 --load-average=4 --keep-going"
          MAKEOPTS="-j4"
          MAKECONF

          mkdir -p /etc/portage/repos.conf
          cat > /etc/portage/repos.conf/gentoo-nexus.conf << 'REPOCONF'
          [gentoo-nexus]
          location = /var/db/repos/gentoo-nexus
          masters = gentoo
          priority = 9999
          auto-sync = no
          REPOCONF

          mkdir -p /etc/portage/package.accept_keywords
          echo '*/*::gentoo-nexus **' > /etc/portage/package.accept_keywords/nexus
          echo 'net-libs/webkit-gtk -~amd64 amd64' > /etc/portage/package.accept_keywords/stable-binary

          mkdir -p /etc/portage/package.use
          echo 'media-libs/opus abi_x86_64' > /etc/portage/package.use/opus
          echo 'gui-libs/gtk introspection' > /etc/portage/package.use/gtk
          echo 'sys-auth/seatd builtin server' > /etc/portage/package.use/seatd
          echo 'sys-kernel/installkernel dracut' > /etc/portage/package.use/installkernel
          echo 'sys-libs/minizip-ng compat' > /etc/portage/package.use/minizip-ng
          echo 'sys-apps/dbus -systemd elogind' > /etc/portage/package.use/dbus
          echo 'media-video/pipewire -systemd elogind' > /etc/portage/package.use/pipewire
          echo 'dev-libs/libdbusmenu gtk3' > /etc/portage/package.use/libdbusmenu

          # Fix known circular dependency (ncurses - gpm)
          echo 'sys-libs/ncurses -gpm' > /etc/portage/package.use/ncurses-gpm

          # REQUIRED_USE: pipewire[ffmpeg] requires pipewire[extra] (verified: Gentoo Wiki,
          # https://wiki.gentoo.org/wiki/PipeWire#USE_flags, and multiple Gentoo Forums reports)
          echo 'media-video/pipewire extra' > /etc/portage/package.use/pipewire-extra

          # Fix slot conflict: cargo-c requires libgit2-1.9.2, mask newer
          mkdir -p /etc/portage/package.mask
          echo '>=dev-libs/libgit2-1.9.3' > /etc/portage/package.mask/libgit2

          # Ensure zlib-ng is used as the virtual/zlib provider (matching consumer system)
          # Per gentoo-dev: virtual/zlib covers both sys-libs/zlib and sys-libs/zlib-ng[compat]
          # (https://public-inbox.gentoo.org/gentoo-dev/87tszdnbyg.fsf@gentoo.org/)
          echo 'sys-libs/zlib-ng abi_x86_32 abi_x86_64 compat' > /etc/portage/package.use/zlib-ng

          echo ">>> Regenerating Packages index to map loaded binaries..."
          emaint binhost --fix

          echo ">>> Generating Manifests for local ebuilds..."
          for ebuild_file in $(find /var/db/repos/gentoo-nexus -mindepth 2 -maxdepth 3 -name "*.ebuild"); do
             ebuild "$ebuild_file" manifest >/dev/null 2>&1 || {
               echo "WARNING: Manifest generation failed for $(basename "$ebuild_file")"
             }
          done

          # Ensure wayland and wayland-scanner meet Mesa's configure requirement (>=1.25.0)
          # They are tightly coupled; upgrade both together to avoid soft block.
          echo ">>> Pre-upgrading wayland & wayland-scanner for Mesa compatibility..."
          emerge --oneshot --usepkg --buildpkg --quiet-build=y \
            '>=dev-libs/wayland-1.25.0' '>=dev-util/wayland-scanner-1.25.0' || true

          # Switch to zlib-ng as the virtual/zlib provider so binary packages
          # record dependencies compatible with consumer systems that use zlib-ng[compat]
          echo ">>> Switching virtual/zlib provider to sys-libs/zlib-ng[compat]..."
          emerge --oneshot --usepkg --buildpkg --quiet-build=y \
            'sys-libs/zlib-ng' || true

          echo ">>> Building: $1"
          emerge --oneshot --usepkg --buildpkg --binpkg-respect-use=y --quiet-build=y --keep-going \
            --autounmask=y --autounmask-write --autounmask-continue=y "$1" || {
            echo ">>> WARNING: emerge exited with non-zero code, continuing to save partial binaries..."
          }

          echo ">>> Finalising Packages index..."
          emaint binhost --fix
          BUILDSCRIPT

          chmod +x build_inside_docker.sh
          echo "TARGET=$TARGET" >> "$GITHUB_ENV"

      - name: Mark Build Start Time
        if: steps.check_bin.outputs.skip_compile != 'true'
        run: touch build_start_marker

      - name: Build Package in Docker
        if: steps.check_bin.outputs.skip_compile != 'true'
        run: |
          docker run --rm --privileged \
            -v "${{ github.workspace }}/binpkgs:/var/cache/binpkgs:rw" \
            -v "${{ github.workspace }}/overlay:/var/db/repos/gentoo-nexus:rw" \
            -v "${{ github.workspace }}/distfiles:/var/cache/distfiles:rw" \
            -v "${{ github.workspace }}/ccache:/var/cache/ccache:rw" \
            -v "${{ github.workspace }}/build_inside_docker.sh:/build.sh:ro" \
            gentoo/stage3:amd64-desktop-openrc \
            bash /build.sh "${{ env.TARGET }}"

      - name: Fix Workspace Permissions (Post-Build)
        if: steps.check_bin.outputs.skip_compile != 'true'
        run: sudo chown -R "$(id -u):$(id -g)" "${{ github.workspace }}"

      - name: Upload to GitHub Release
        if: steps.check_bin.outputs.skip_compile != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh release view rolling --repo "$REPO" 2>/dev/null || \
            gh release create rolling \
              --repo "$REPO" \
              --title "Nexus Rolling Binaries" \
              --notes "Automated Gentoo Binhost - GPKG format" \
              --prerelease

          retry_upload() {
            local file="$1"
            local max_retries=3
            for i in $(seq 1 $max_retries); do
              if gh release upload rolling "$file" --repo "$REPO" --clobber 2>&1; then
                return 0
              fi
              sleep 5
            done
            echo "::error::Failed to upload $file after $max_retries attempts"
            return 1
          }

          echo ">>> Flattening PATH and URI fields for flat GitHub Release store..."
          sed -i -E \
            -e 's|^PATH: .*/([^/]+\.gpkg\.tar)$|PATH: \1|' \
            -e 's|^URI: .*/([^/]+\.gpkg\.tar)$|URI: \1|' \
            binpkgs/Packages

          echo ">>> Removing acct-group/acct-user entries to prevent 404 traps..."
          python3 -c "
          import re
          with open('binpkgs/Packages', 'r') as f:
              content = f.read()
          blocks = content.split('\n\n')
          filtered = [b for b in blocks if not re.search(r'^CPV: acct-(group|user)/', b, re.MULTILINE)]
          with open('binpkgs/Packages', 'w') as f:
              f.write('\n\n'.join(filtered))
          print(f'Filtered {len(blocks) - len(filtered)} acct-* entries from index')
          "

          echo ">>> Compressing Packages index..."
          rm -f binpkgs/Packages.gz
          gzip -c binpkgs/Packages > binpkgs/Packages.gz

          echo ">>> Uploading Packages indexes..."
          shopt -s nullglob
          for file in binpkgs/Packages*; do
            [ -f "$file" ] && retry_upload "$file"
          done

          echo ">>> Scanning for newly compiled binaries to upload..."
          NEW_BINARIES=$(find binpkgs -type f -name '*.gpkg.tar' -newer build_start_marker 2>/dev/null || echo "")

          if [ -n "$NEW_BINARIES" ]; then
            for file in $NEW_BINARIES; do
              # binpkgs/cat/pn/pkg-ver-1.gpkg.tar — field 3 is pn
              PN=$(echo "$file" | awk -F'/' '{print $3}')

              echo ">>> Processing new package: $PN"

              # Delete older versions of this package from the release before uploading
              python3 -c "
          import re, subprocess
          pn = '${PN}'
          repo = '${REPO}'
          try:
              out = subprocess.check_output([
                  'gh', 'release', 'view', 'rolling',
                  '--repo', repo, '--json', 'assets', '-q', '.assets[].name'
              ])
              assets = out.decode().strip().split('\n')
              for asset in assets:
                  if not asset: continue
                  if re.match(rf'^{re.escape(pn)}-[0-9].*\.gpkg\.tar\$', asset):
                      print(f'>>> Deleting old asset: {asset}')
                      subprocess.run([
                          'gh', 'release', 'delete-asset', 'rolling', asset,
                          '--repo', repo, '-y'
                      ], check=False)
          except Exception as e:
              print(f'Cleanup error: {e}')
          "
              retry_upload "$file"
            done
          else
            echo "No new binaries found to upload."
          fi

      - name: Fix Workspace Permissions (Final)
        if: always()
        run: sudo chown -R "$(id -u):$(id -g)" "${{ github.workspace }}"

      - name: Trigger Relay for Next Package
        if: steps.queue.outputs.REMAINING_PKGS != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Relaying to: ${{ steps.queue.outputs.REMAINING_PKGS }}"
          gh workflow run "${{ github.workflow }}" \
            --ref "${GITHUB_REF_NAME}" \
            --repo ${{ github.repository }} \
            -f package_list="${{ steps.queue.outputs.REMAINING_PKGS }}" \
            -f force_rebuild="${{ github.event.inputs.force_rebuild }}"
