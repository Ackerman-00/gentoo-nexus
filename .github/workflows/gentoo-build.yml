name: Gentoo Build Relay

on:
  workflow_dispatch:
    inputs:
      package_list:
        description: 'Space-separated list of package atoms to build'
        required: true
      force_rebuild:
        description: 'Force compile from source (ignores Release binaries)'
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Prepare Workspace
        run: |
          mkdir -p binpkgs overlay distfiles ccache
          chmod -R 777 binpkgs overlay distfiles ccache

      - name: Fetch Steam Overlay
        run: |
          git clone --depth 1 https://github.com/anyc/steam-overlay.git steam-overlay 2>/dev/null || true

      - name: Prepare Overlay with Full Repo Structure
        run: |
          rsync -a --exclude='.git' --exclude='binpkgs' --exclude='overlay' ./ overlay/
          mkdir -p overlay/metadata
          cat > overlay/metadata/layout.conf << 'LAYOUTEOF'
          masters = gentoo
          thin-manifests = true
          sign-manifests = false
          LAYOUTEOF
          mkdir -p overlay/profiles
          echo "gentoo-nexus" > overlay/profiles/repo_name
          chmod -R 777 overlay/

      - name: Download Release Binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo ">>> Downloading existing .gpkg.tar from rolling release..."
          gh release download rolling \
            -p "*.gpkg.tar" -p "Packages*" \
            --repo ${{ github.repository }} \
            --dir binpkgs --clobber 2>/dev/null || true

      - name: Parse Queue
        id: queue
        run: |
          read -r -a PKGS <<< "${{ github.event.inputs.package_list }}"
          echo "TARGET_PKG=${PKGS[0]:-}" >> "$GITHUB_OUTPUT"
          echo "REMAINING_PKGS=${PKGS[*]:1}" >> "$GITHUB_OUTPUT"

      - name: Check Binary Exists
        id: check_bin
        run: |
          TARGET="${{ steps.queue.outputs.TARGET_PKG }}"
          [ -z "$TARGET" ] && { echo "skip_compile=true" >> "$GITHUB_OUTPUT"; exit 0; }
          PN=$(echo "$TARGET" | sed -E 's/^=//' | awk -F/ '{print $NF}' | sed -E 's/-[0-9].*//')
          if [ "${{ github.event.inputs.force_rebuild }}" == "true" ]; then
            echo "Force rebuild: Will compile $TARGET"
            echo "skip_compile=false" >> "$GITHUB_OUTPUT"
            echo ">>> Removing stale binaries to force fresh compilation..."
            rm -f binpkgs/${PN}-*.gpkg.tar
            # Delete ALL known bad packages (ABI-incompatible with fresh stage3)
            rm -f binpkgs/opus-*.gpkg.tar
            rm -f binpkgs/ell-*.gpkg.tar
            rm -f binpkgs/mpg123-base-*.gpkg.tar
            rm -f binpkgs/libxmlb-*.gpkg.tar
            rm -f binpkgs/seatd-*.gpkg.tar
            rm -f binpkgs/gtk-*.gpkg.tar
            rm -f binpkgs/Crypt-URandom-*.gpkg.tar
            rm -f binpkgs/wireless-regdb-*.gpkg.tar
            rm -f binpkgs/mobile-broadband-provider-info-*.gpkg.tar
            rm -f binpkgs/jemalloc-*.gpkg.tar
            rm -f binpkgs/nss-*.gpkg.tar
            rm -f binpkgs/libmbim-*.gpkg.tar
            rm -f binpkgs/libqrtr-glib-*.gpkg.tar
          elif ls binpkgs/${PN}-*.gpkg.tar >/dev/null 2>&1; then
            echo "Binary ${PN}-*.gpkg.tar exists. Skipping compile."
            echo "skip_compile=true" >> "$GITHUB_OUTPUT"
          else
            echo "No binary for $PN. Will compile from source."
            echo "skip_compile=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write Docker Build Script to File
        if: steps.check_bin.outputs.skip_compile != 'true'
        run: |
          TARGET="${{ steps.queue.outputs.TARGET_PKG }}"
          cat > build_inside_docker.sh << 'BUILDSCRIPT'
          #!/bin/bash
          set -euo pipefail

          mkdir -p /var/db/repos/gentoo
          emerge-webrsync -q

          eselect profile set default/linux/amd64/23.0/desktop 2>/dev/null || \
            eselect profile list 2>/dev/null | grep -m1 desktop | awk '{print $1}' | tr -d '[]' | xargs -r eselect profile set || \
            eselect profile set 1

          getuto 2>/dev/null || emerge -q --oneshot app-crypt/gentoo-keys 2>/dev/null || true

          rm -rf /etc/portage/binrepos.conf/
          mkdir -p /etc/portage/binrepos.conf
          cat > /etc/portage/binrepos.conf/gentoobinhost.conf << 'BINHOST'
          [DEFAULT]
          verify-signature = false

          [gentoo]
          priority = 9999
          sync-uri = https://distfiles.gentoo.org/releases/amd64/binpackages/23.0/x86-64/
          BINHOST

          cat > /etc/portage/make.conf << 'MAKECONF'
          COMMON_FLAGS="-O2 -march=x86-64 -pipe"
          CFLAGS="${COMMON_FLAGS}"
          CXXFLAGS="${COMMON_FLAGS}"
          # No global ABI_X86 – every non‑Steam package stays 64‑bit only.
          FEATURES="buildpkg parallel-install getbinpkg -binpkg-verify-signature -sandbox -usersandbox -ipc-sandbox -network-sandbox -pid-sandbox"
          BINPKG_FORMAT="gpkg"
          PKGDIR="/var/cache/binpkgs"
          DISTDIR="/var/cache/distfiles"
          ACCEPT_LICENSE="*"
          ACCEPT_KEYWORDS="~amd64"
          # Drop --newuse/--changed-use entirely – no more cascading rebuilds.
          EMERGE_DEFAULT_OPTS="--getbinpkg --usepkg --buildpkg --quiet-build=y --jobs=4 --load-average=4 --keep-going"
          MAKEOPTS="-j4"
          PORTAGE_BINPKG_SIGVERIFY="0"
          MAKECONF

          mkdir -p /etc/portage/repos.conf
          cat > /etc/portage/repos.conf/gentoo-nexus.conf << 'REPOCONF'
          [gentoo-nexus]
          location = /var/db/repos/gentoo-nexus
          masters = gentoo
          priority = 9999
          auto-sync = no
          REPOCONF

          cat > /etc/portage/repos.conf/steam-overlay.conf << 'REPOCONF'
          [steam-overlay]
          location = /var/db/repos/steam-overlay
          masters = gentoo
          priority = 50
          auto-sync = no
          REPOCONF

          mkdir -p /etc/portage/package.accept_keywords
          echo '*/*::gentoo-nexus **' > /etc/portage/package.accept_keywords/nexus
          echo '*/*::steam-overlay **' >> /etc/portage/package.accept_keywords/nexus
          echo 'net-libs/webkit-gtk -~amd64 amd64' > /etc/portage/package.accept_keywords/stable-binary

          # ----- USE flag fixes (non‑Steam) -----
          mkdir -p /etc/portage/package.use
          echo 'media-libs/opus abi_x86_64' > /etc/portage/package.use/opus
          echo 'gui-libs/gtk introspection' > /etc/portage/package.use/gtk
          echo 'sys-auth/seatd builtin server' > /etc/portage/package.use/seatd
          echo 'net-libs/webkit-gtk -avif -jpegxl -lcms -pdf -spell -wayland -jumbo-build' > /etc/portage/package.use/webkit-gtk
          echo 'sys-kernel/installkernel dracut' > /etc/portage/package.use/installkernel

          # ----- Steam‑only 32‑bit ABI (completely separate) -----
          echo 'games-util/steam-launcher steamruntime' > /etc/portage/package.use/steam-launcher
          echo 'sys-libs/zlib minizip' >> /etc/portage/package.use/steam-launcher
          echo 'sys-libs/zlib-ng compat' >> /etc/portage/package.use/steam-launcher
          echo 'sys-libs/minizip-ng compat' >> /etc/portage/package.use/steam-launcher
          # Only the packages that Steam actually requires get abi_x86_32.
          # Based on the Gentoo Wiki list (see https://wiki.gentoo.org/wiki/Steam).
          cat > /etc/portage/package.use/steam-abi << 'STEAMABI'
          media-libs/fontconfig abi_x86_32
          media-libs/freetype abi_x86_32
          media-libs/mesa abi_x86_32
          media-libs/libglvnd abi_x86_32
          media-libs/alsa-lib abi_x86_32
          media-libs/libpng abi_x86_32
          media-libs/libogg abi_x86_32
          media-libs/libvorbis abi_x86_32
          media-libs/flac abi_x86_32
          media-libs/libsndfile abi_x86_32
          media-libs/libpulse abi_x86_32
          media-libs/opus abi_x86_32
          media-libs/harfbuzz abi_x86_32
          media-libs/lcms abi_x86_32
          media-libs/tiff abi_x86_32
          media-libs/libwebp abi_x86_32
          media-libs/graphite2 abi_x86_32
          media-libs/libepoxy abi_x86_32
          media-libs/libdisplay-info abi_x86_32
          media-libs/libva abi_x86_32
          media-libs/libvdpau abi_x86_32
          media-libs/vulkan-loader abi_x86_32
          media-libs/vulkan-layers abi_x86_32
          media-libs/openal abi_x86_32
          media-libs/glu abi_x86_32
          media-libs/libsdl2 abi_x86_32
          media-sound/mpg123-base abi_x86_32
          media-sound/lame abi_x86_32
          media-video/pipewire abi_x86_32
          x11-libs/libX11 abi_x86_32
          x11-libs/libXau abi_x86_32
          x11-libs/libxcb abi_x86_32
          x11-libs/libXdmcp abi_x86_32
          x11-libs/libXext abi_x86_32
          x11-libs/libXfixes abi_x86_32
          x11-libs/libXrender abi_x86_32
          x11-libs/libXrandr abi_x86_32
          x11-libs/libXcursor abi_x86_32
          x11-libs/libXi abi_x86_32
          x11-libs/libXcomposite abi_x86_32
          x11-libs/libXdamage abi_x86_32
          x11-libs/libXinerama abi_x86_32
          x11-libs/libXScrnSaver abi_x86_32
          x11-libs/libXxf86vm abi_x86_32
          x11-libs/libXft abi_x86_32
          x11-libs/libdrm abi_x86_32
          x11-libs/libpciaccess abi_x86_32
          x11-libs/libxshmfence abi_x86_32
          x11-libs/pixman abi_x86_32
          x11-libs/cairo abi_x86_32
          x11-libs/gdk-pixbuf abi_x86_32
          x11-libs/gtk+ abi_x86_32
          x11-libs/pango abi_x86_32
          x11-libs/libxkbcommon abi_x86_32
          x11-libs/libICE abi_x86_32
          x11-libs/libSM abi_x86_32
          x11-libs/libXtst abi_x86_32
          x11-libs/extest abi_x86_32
          x11-libs/xcb-util-keysyms abi_x86_32
          x11-misc/colord abi_x86_32
          dev-libs/glib abi_x86_32
          dev-libs/expat abi_x86_32
          dev-libs/elfutils abi_x86_32
          dev-libs/libffi abi_x86_32
          dev-libs/fribidi abi_x86_32
          dev-libs/gmp abi_x86_32
          dev-libs/icu abi_x86_32
          dev-libs/libtasn1 abi_x86_32
          dev-libs/libunistring abi_x86_32
          dev-libs/libxml2 abi_x86_32
          dev-libs/lzo abi_x86_32
          dev-libs/nettle abi_x86_32
          dev-libs/nspr abi_x86_32
          dev-libs/nss abi_x86_32
          dev-libs/openssl abi_x86_32
          dev-libs/wayland abi_x86_32
          dev-libs/libevdev abi_x86_32
          dev-libs/libgudev abi_x86_32
          dev-libs/libgusb abi_x86_32
          dev-libs/libusb abi_x86_32
          dev-libs/libpcre2 abi_x86_32
          dev-libs/dbus-glib abi_x86_32
          dev-libs/json-glib abi_x86_32
          dev-libs/libgcrypt abi_x86_32
          dev-libs/libgpg-error abi_x86_32
          dev-libs/leancrypto abi_x86_32
          dev-db/sqlite abi_x86_32
          dev-lang/rust abi_x86_32
          dev-lang/rust-bin abi_x86_32
          dev-util/glslang abi_x86_32
          dev-util/spirv-tools abi_x86_32
          dev-util/vulkan-utility-libraries abi_x86_32
          dev-util/sysprof-capture abi_x86_32
          llvm-core/clang abi_x86_32
          llvm-core/llvm abi_x86_32
          app-arch/bzip2 abi_x86_32
          app-arch/lz4 abi_x86_32
          app-arch/xz-utils abi_x86_32
          app-arch/zstd abi_x86_32
          app-crypt/p11-kit abi_x86_32
          app-accessibility/at-spi2-core abi_x86_32
          gnome-base/librsvg abi_x86_32
          gui-libs/libdecor abi_x86_32
          net-dns/c-ares abi_x86_32
          net-dns/libidn2 abi_x86_32
          net-libs/gnutls abi_x86_32
          net-libs/libasyncns abi_x86_32
          net-libs/libndp abi_x86_32
          net-libs/libpsl abi_x86_32
          net-libs/nghttp2 abi_x86_32
          net-libs/nghttp3 abi_x86_32
          net-libs/ngtcp2 abi_x86_32
          net-misc/curl abi_x86_32
          net-misc/networkmanager abi_x86_32
          net-print/cups abi_x86_32
          sys-apps/dbus abi_x86_32
          sys-apps/lm-sensors abi_x86_32
          sys-apps/systemd abi_x86_32
          sys-apps/systemd-utils abi_x86_32
          sys-apps/util-linux abi_x86_32
          sys-libs/gdbm abi_x86_32
          sys-libs/gpm abi_x86_32
          sys-libs/libcap abi_x86_32
          sys-libs/libudev-compat abi_x86_32
          sys-libs/ncurses abi_x86_32
          sys-libs/pam abi_x86_32
          sys-libs/readline abi_x86_32
          sys-libs/zlib abi_x86_32
          virtual/glu abi_x86_32
          virtual/libelf abi_x86_32
          virtual/libiconv abi_x86_32
          virtual/libintl abi_x86_32
          virtual/libudev abi_x86_32
          virtual/libusb abi_x86_32
          virtual/opengl abi_x86_32
          virtual/zlib abi_x86_32
          STEAMABI

          # ----- ncurses circular dep fix (Gentoo Wiki) -----
          echo 'sys-libs/ncurses -gpm' > /etc/portage/package.use/ncurses-gpm

          # ----- Purge known stale binaries (pre-ABI_X86="32 64") -----
          echo ">>> Purging known stale binaries..."
          rm -f /var/cache/binpkgs/Crypt-URandom-*.gpkg.tar
          rm -f /var/cache/binpkgs/ell-*.gpkg.tar
          rm -f /var/cache/binpkgs/mpg123-base-*.gpkg.tar
          rm -f /var/cache/binpkgs/opus-*.gpkg.tar
          rm -f /var/cache/binpkgs/libxmlb-*.gpkg.tar
          rm -f /var/cache/binpkgs/seatd-*.gpkg.tar
          rm -f /var/cache/binpkgs/gtk-*.gpkg.tar
          rm -f /var/cache/binpkgs/wireless-regdb-*.gpkg.tar
          rm -f /var/cache/binpkgs/mobile-broadband-provider-info-*.gpkg.tar
          rm -f /var/cache/binpkgs/jemalloc-*.gpkg.tar
          rm -f /var/cache/binpkgs/nss-*.gpkg.tar
          rm -f /var/cache/binpkgs/libmbim-*.gpkg.tar
          rm -f /var/cache/binpkgs/libqrtr-glib-*.gpkg.tar

          # ----- Regenerate Manifests -----
          echo ">>> Generating Manifests for overlay..."
          for ebuild_file in $(find /var/db/repos/gentoo-nexus -mindepth 2 -maxdepth 3 -name "*.ebuild"); do
             ebuild "$ebuild_file" manifest >/dev/null 2>&1 || {
               echo "WARNING: Manifest generation failed for $(basename "$ebuild_file")"
             }
          done

          echo ">>> Building: $1"
          emerge --autounmask=y --autounmask-write --autounmask-continue=y "$1" || {
            echo ">>> WARNING: emerge exited with non-zero code, but continuing to save partial binaries..."
          }

          echo ">>> Regenerating Packages index..."
          emaint binhost --fix
          BUILDSCRIPT

          chmod +x build_inside_docker.sh
          echo "TARGET=$TARGET" >> "$GITHUB_ENV"

      - name: Build Package in Docker
        if: steps.check_bin.outputs.skip_compile != 'true'
        run: |
          docker run --rm --privileged \
            -v "${{ github.workspace }}/binpkgs:/var/cache/binpkgs:rw" \
            -v "${{ github.workspace }}/overlay:/var/db/repos/gentoo-nexus:rw" \
            -v "${{ github.workspace }}/steam-overlay:/var/db/repos/steam-overlay:rw" \
            -v "${{ github.workspace }}/distfiles:/var/cache/distfiles:rw" \
            -v "${{ github.workspace }}/ccache:/var/cache/ccache:rw" \
            -v "${{ github.workspace }}/build_inside_docker.sh:/build.sh:ro" \
            gentoo/stage3:amd64-desktop-openrc \
            bash /build.sh "${{ env.TARGET }}"

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh release view rolling --repo "$REPO" 2>/dev/null || \
            gh release create rolling \
              --repo "$REPO" \
              --title "Nexus Rolling Binaries" \
              --notes "Automated Gentoo Binhost - GPKG format" \
              --prerelease

          retry_upload() {
            local file="$1"
            local max_retries=3
            for i in $(seq 1 $max_retries); do
              if gh release upload rolling "$file" --repo "$REPO" --clobber 2>&1; then
                return 0
              fi
              sleep 5
            done
            echo "::error::Failed to upload $file after $max_retries attempts"
            return 1
          }

          shopt -s nullglob
          for file in binpkgs/Packages*; do
            [ -f "$file" ] && retry_upload "$file"
          done
          find binpkgs -name '*.gpkg.tar' | while read -r file; do
            retry_upload "$file"
          done

      - name: Fix Workspace Permissions
        if: always()
        run: sudo chown -R "$(id -u):$(id -g)" "${{ github.workspace }}"

      - name: Trigger Relay for Next Package
        if: steps.queue.outputs.REMAINING_PKGS != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Relaying to: ${{ steps.queue.outputs.REMAINING_PKGS }}"
          gh workflow run "${{ github.workflow }}" \
            --ref "${GITHUB_REF_NAME}" \
            --repo ${{ github.repository }} \
            -f package_list="${{ steps.queue.outputs.REMAINING_PKGS }}" \
            -f force_rebuild="${{ github.event.inputs.force_rebuild }}"
