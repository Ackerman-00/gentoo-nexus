name: Gentoo Build Relay

on:
  workflow_dispatch:
    inputs:
      package_list:
        description: 'Space-separated list of package atoms to build'
        required: true
      force_rebuild:
        description: 'List of specific packages to force rebuild (or "true" for all)'
        type: string
        required: false
        default: ""

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── Workspace Preparation ──────────────────────────────────────
      - name: Prepare Workspace & Overlay
        run: |
          mkdir -p binpkgs overlay/metadata overlay/profiles distfiles ccache
          chmod -R 777 binpkgs overlay distfiles ccache
          rsync -a --exclude='.git' --exclude='binpkgs' --exclude='overlay' ./ overlay/

          cat > overlay/metadata/layout.conf << 'LAYOUT'
          masters = gentoo
          thin-manifests = true
          sign-manifests = false
          LAYOUT
          echo "gentoo-nexus" > overlay/profiles/repo_name

      # ── Download existing binaries from GitHub Release ─────────────
      - name: Download Release Binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download rolling \
            -p "*.gpkg.tar" -p "Packages*" \
            --repo ${{ github.repository }} \
            --dir binpkgs --clobber 2>/dev/null || true
          for f in binpkgs/*.gpkg.tar; do
            [ -e "$f" ] || continue
            if ! tar -tf "$f" >/dev/null 2>&1; then rm -f "$f"; fi
          done

      # ── Restore GPKG Layout (category/package/ structure) ──────────
      - name: Restore GPKG Layout
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/binpkgs:/var/cache/binpkgs:rw" \
            -v "${{ github.workspace }}/overlay:/var/db/repos/gentoo-nexus:ro" \
            gentoo/stage3:amd64-desktop-openrc \
            python3 -c "
          import os, shutil
          from portage.versions import pkgsplit
          os.system('emerge-webrsync -q')
          pn_to_cat = {}
          for repo in ['/var/db/repos/gentoo-nexus', '/var/db/repos/gentoo']:
              if not os.path.exists(repo): continue
              for cat in os.listdir(repo):
                  cat_path = os.path.join(repo, cat)
                  if not os.path.isdir(cat_path) or cat.startswith('.'): continue
                  if cat in ['metadata','profiles','eclass','scripts']: continue
                  for pn in os.listdir(cat_path):
                      pn_to_cat[pn] = cat
          for f in os.listdir('/var/cache/binpkgs'):
              if not f.endswith('.gpkg.tar'): continue
              base = f[:-9]
              if '-' in base: base = base.rsplit('-', 1)[0]
              split_res = pkgsplit(base) or pkgsplit(f[:-9])
              if split_res and split_res[0] in pn_to_cat:
                  cat = pn_to_cat[split_res[0]]
                  target_dir = os.path.join('/var/cache/binpkgs', cat, split_res[0])
                  src = os.path.join('/var/cache/binpkgs', f)
                  dst = os.path.join(target_dir, f)
                  if src != dst:
                      os.makedirs(target_dir, exist_ok=True)
                      shutil.move(src, dst)
          "

      - name: Fix Workspace Permissions
        run: sudo chown -R "$(id -u):$(id -g)" "${{ github.workspace }}"

      # ── Queue Parsing ─────────────────────────────────────────────
      - name: Parse Queue & Target Evaluation
        id: queue
        run: |
          read -r -a PKGS <<< "${{ github.event.inputs.package_list }}"
          TARGET="${PKGS[0]:-}"
          echo "TARGET_PKG=$TARGET" >> "$GITHUB_OUTPUT"
          echo "REMAINING_PKGS=${PKGS[*]:1}" >> "$GITHUB_OUTPUT"

          [ -z "$TARGET" ] && { echo "skip_compile=true" >> "$GITHUB_OUTPUT"; exit 0; }
          CPV="${TARGET#=}"

          # Always rebuild live ebuilds (9999)
          if [[ "$CPV" == *"-9999" ]]; then
             echo "skip_compile=false" >> "$GITHUB_OUTPUT"
             exit 0
          fi

          FORCE="${{ github.event.inputs.force_rebuild }}"
          if [[ "$FORCE" == "true" || "$FORCE" == *"${CPV}"* ]]; then
             rm -rf "binpkgs/${CPV%/*}" 2>/dev/null || true
             echo "skip_compile=false" >> "$GITHUB_OUTPUT"
             exit 0
          fi

          if grep -q "^CPV: ${CPV}$" binpkgs/Packages 2>/dev/null; then
             echo "skip_compile=true" >> "$GITHUB_OUTPUT"
          else
             rm -rf "binpkgs/${CPV%/*}" 2>/dev/null || true
             echo "skip_compile=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Write the monolithic build script ─────────────────────────
      - name: Write Build Script
        if: steps.queue.outputs.skip_compile != 'true'
        run: |
          cat > build.sh << 'BUILDSCRIPT'
          #!/bin/bash
          set -euo pipefail

          echo ">>> Syncing Gentoo ebuild repository..."
          mkdir -p /var/db/repos/gentoo /etc/portage/repos.conf
          emerge-webrsync -q

          eselect profile set default/linux/amd64/23.0/desktop 2>/dev/null || \
            eselect profile list 2>/dev/null | grep -m1 desktop | awk '{print $1}' | tr -d '[]' | xargs -r eselect profile set || \
            eselect profile set 1

          getuto 2>/dev/null || emerge -q --oneshot app-crypt/gentoo-keys 2>/dev/null || true

          # ── make.conf: Binary-first configuration ──────────────
          cat > /etc/portage/make.conf << 'MAKECONF'
          COMMON_FLAGS="-O2 -march=x86-64-v3 -mtune=znver3 -pipe"
          VIDEO_CARDS="amdgpu radeonsi nvidia nouveau"
          CFLAGS="${COMMON_FLAGS}"
          CXXFLAGS="${COMMON_FLAGS}"
          USE="vaapi vdpau vulkan amdgpu ffmpeg encode nvenc elogind egl -systemd -cups abi_x86_32"
          FEATURES="getbinpkg buildpkg parallel-install -binpkg-verify-signature -sandbox -usersandbox -ipc-sandbox -network-sandbox -pid-sandbox"
          BINPKG_FORMAT="gpkg"
          PKGDIR="/var/cache/binpkgs"
          DISTDIR="/var/cache/distfiles"
          ACCEPT_LICENSE="*"
          ACCEPT_KEYWORDS="~amd64"
          EMERGE_DEFAULT_OPTS="--usepkg --getbinpkg --buildpkg --binpkg-respect-use=n --quiet-build=y --jobs=4 --load-average=4 --keep-going"
          MAKEOPTS="-j4"
          MAKECONF

          # ── Repository configuration ──────────────────────────
          cat > /etc/portage/repos.conf/gentoo-nexus.conf << 'REPO'
          [gentoo-nexus]
          location = /var/db/repos/gentoo-nexus
          masters = gentoo
          priority = 9999
          auto-sync = no
          REPO

          # ── Official Gentoo binhost (permanent, priority 1) ──
          mkdir -p /etc/portage/binrepos.conf
          cat > /etc/portage/binrepos.conf/gentoo-official.conf << 'BINHOST'
          [gentoo-official]
          priority = 1
          sync-uri = https://distfiles.gentoo.org/releases/amd64/binpackages/23.0/x86-64/
          verify-signature = false
          BINHOST

          # ── Package keywords ──────────────────────────────────
          mkdir -p /etc/portage/package.accept_keywords
          echo '*/*::gentoo-nexus **' > /etc/portage/package.accept_keywords/nexus
          echo 'net-libs/webkit-gtk -~amd64 amd64' > /etc/portage/package.accept_keywords/stable-binary

          # ── Package USE flags ─────────────────────────────────
          mkdir -p /etc/portage/package.use
          cat > /etc/portage/package.use/nexus << 'USES'
          media-libs/opus abi_x86_64
          gui-libs/gtk introspection
          sys-auth/seatd builtin server
          sys-kernel/installkernel dracut
          sys-libs/minizip-ng compat
          sys-apps/dbus -systemd elogind
          media-video/pipewire -systemd elogind extra
          dev-libs/libdbusmenu gtk3
          net-misc/networkmanager -modemmanager -bluetooth
          sys-libs/ncurses -gpm
          sys-libs/zlib-ng abi_x86_32 abi_x86_64 compat
          USES

          # ── libgit2 mask for cargo-c/rustup compatibility ────
          mkdir -p /etc/portage/package.mask
          echo '>=dev-libs/libgit2-1.9.3' > /etc/portage/package.mask/libgit2

          # ── Regenerate binhost index from loaded binaries ────
          echo ">>> Regenerating Packages index..."
          emaint binhost --fix

          # ── Generate manifests for custom ebuilds ─────────────
          echo ">>> Generating Manifests..."
          for ebuild_file in $(find /var/db/repos/gentoo-nexus -mindepth 2 -maxdepth 3 -name "*.ebuild"); do
              ebuild "$ebuild_file" manifest >/dev/null 2>&1 || true
          done

          # ═══════════════════════════════════════════════════════
          # STEP 1: Try binary-only first (fast path)
          # ═══════════════════════════════════════════════════════
          echo ">>> Attempting binary-only install of: $1"
          if emerge --usepkgonly --getbinpkg --binpkg-respect-use=n "$1" 2>&1; then
              echo ">>> SUCCESS: Target installed entirely from binary cache."
              emaint binhost --fix
              exit 0
          fi

          # ═══════════════════════════════════════════════════════
          # STEP 2: Binary-only failed. Check for circular deps.
          #         Only bootstrap if Portage reports a cycle.
          # ═══════════════════════════════════════════════════════
          echo ">>> Binary-only failed. Checking for circular dependencies..."
          if emerge --pretend --usepkg --getbinpkg "$1" 2>&1 | grep -q "circular dependencies"; then
              echo ">>> Circular dependency detected — applying 4-step bootstrap..."

              # Step 1: libsdl2 without pipewire
              echo ">>> [BOOTSTRAP 1/4] libsdl2 without pipewire..."
              USE="-pipewire" emerge --oneshot --usepkg --getbinpkg --buildpkg --quiet-build=y \
                media-libs/libsdl2 || true

              # Step 2: ffmpeg with SDL (no pipewire in libsdl2 yet)
              echo ">>> [BOOTSTRAP 2/4] ffmpeg with SDL..."
              emerge --oneshot --usepkg --getbinpkg --buildpkg --quiet-build=y \
                media-video/ffmpeg || true

              # Step 3: pipewire with ffmpeg (cycle broken)
              echo ">>> [BOOTSTRAP 3/4] pipewire with ffmpeg..."
              emerge --oneshot --usepkg --getbinpkg --buildpkg --quiet-build=y \
                media-video/pipewire || true

              # Step 4: libsdl2 restored with pipewire
              echo ">>> [BOOTSTRAP 4/4] libsdl2 with pipewire..."
              emerge --oneshot --usepkg --getbinpkg --buildpkg --quiet-build=y \
                media-libs/libsdl2 || true
          else
              echo ">>> No circular dependency detected. Proceeding with normal build."
          fi

          # ═══════════════════════════════════════════════════════
          # STEP 3: Build the target (binary-first, source fallback)
          # ═══════════════════════════════════════════════════════
          echo ">>> Building target: $1"
          emerge --oneshot --usepkg --getbinpkg --buildpkg --binpkg-respect-use=n \
            --quiet-build=y --keep-going \
            --autounmask=y --autounmask-write --autounmask-continue=y "$1" || {
            echo ">>> WARNING: emerge exited with non-zero code. Saving partial binaries..."
          }

          echo ">>> Finalising Packages index..."
          emaint binhost --fix
          BUILDSCRIPT

          chmod +x build.sh
          echo "TARGET=${{ steps.queue.outputs.TARGET_PKG }}" >> "$GITHUB_ENV"

      # ── Execute Build ────────────────────────────────────────────
      - name: Build Package in Docker
        if: steps.queue.outputs.skip_compile != 'true'
        run: |
          touch build_start_marker
          docker run --rm --privileged \
            -v "${{ github.workspace }}/binpkgs:/var/cache/binpkgs:rw" \
            -v "${{ github.workspace }}/overlay:/var/db/repos/gentoo-nexus:rw" \
            -v "${{ github.workspace }}/distfiles:/var/cache/distfiles:rw" \
            -v "${{ github.workspace }}/ccache:/var/cache/ccache:rw" \
            -v "${{ github.workspace }}/build.sh:/build.sh:ro" \
            gentoo/stage3:amd64-desktop-openrc \
            bash /build.sh "${{ env.TARGET }}"

      - name: Fix Permissions Post-Build
        if: steps.queue.outputs.skip_compile != 'true'
        run: sudo chown -R "$(id -u):$(id -g)" "${{ github.workspace }}"

      # ── Upload to GitHub Release ────────────────────────────────
      - name: Upload to GitHub Release
        if: steps.queue.outputs.skip_compile != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh release view rolling --repo "$REPO" 2>/dev/null || \
            gh release create rolling \
              --repo "$REPO" \
              --title "Nexus Rolling Binaries" \
              --prerelease

          retry_upload() {
            for i in 1 2 3; do
              gh release upload rolling "$1" --repo "$REPO" --clobber 2>&1 && return 0
              sleep 5
            done
            return 1
          }

          sed -i -E \
            -e 's|^PATH: .*/([^/]+\.gpkg\.tar)$|PATH: \1|' \
            -e 's|^URI: .*/([^/]+\.gpkg\.tar)$|URI: \1|' \
            binpkgs/Packages

          awk '/^CPV: acct-(group|user)\//{skip=1} /^$/{if(skip){skip=0; next}} !skip' \
            binpkgs/Packages > binpkgs/Packages.tmp && mv binpkgs/Packages.tmp binpkgs/Packages

          rm -f binpkgs/Packages.gz
          gzip -c binpkgs/Packages > binpkgs/Packages.gz

          shopt -s nullglob
          for file in binpkgs/Packages*; do
            [ -f "$file" ] && retry_upload "$file"
          done

          for file in $(find binpkgs -type f -name '*.gpkg.tar' -newer build_start_marker 2>/dev/null); do
            PN=$(echo "$file" | awk -F'/' '{print $3}')
            OLD_ASSETS=$(gh release view rolling --json assets --jq ".assets[].name" --repo "$REPO" | grep -E "^${PN}-[0-9].*\.gpkg\.tar$" || true)
            for asset in $OLD_ASSETS; do
              gh release delete-asset rolling "$asset" --repo "$REPO" -y || true
            done
            retry_upload "$file"
          done

      # ── Trigger Next Package in Queue ────────────────────────────
      - name: Trigger Relay for Next Package
        if: always() && steps.queue.outputs.REMAINING_PKGS != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "${{ github.workflow }}" \
            --ref "${GITHUB_REF_NAME}" \
            --repo ${{ github.repository }} \
            -f package_list="${{ steps.queue.outputs.REMAINING_PKGS }}" \
            -f force_rebuild="${{ github.event.inputs.force_rebuild }}"
