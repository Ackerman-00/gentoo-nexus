name: Gentoo Build Relay

on:
  workflow_dispatch:
    inputs:
      package_list:
        description: 'Space-separated package atoms to compile'
        required: true
      force_rebuild:
        description: 'Packages to force rebuild (or "true" for all)'
        type: string
        required: false
        default: ""

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Allocate ZRAM Swap
        run: |
          sudo modprobe zram 2>/dev/null || { echo "ZRAM not available, skipping"; free -h; exit 0; }
          sudo zramctl --find --size 12G --algorithm lz4
          sudo mkswap /dev/zram0
          sudo swapon /dev/zram0 --priority 100
          free -h

      - name: Free Disk Space for Docker
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          df -h /

      - name: Persistent CCache Setup
        uses: actions/cache@v5
        with:
          path: ccache
          key: gentoo-ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            gentoo-ccache-${{ runner.os }}-

      - name: Prepare Workspace & Overlay
        run: |
          mkdir -p binpkgs overlay/metadata overlay/profiles distfiles ccache
          chmod -R 777 binpkgs overlay distfiles ccache
          rsync -a --exclude='.git' --exclude='binpkgs' --exclude='overlay' ./ overlay/
          printf 'masters = gentoo\nthin-manifests = true\nsign-manifests = false\n' > overlay/metadata/layout.conf
          echo "gentoo-nexus" > overlay/profiles/repo_name

      - name: Download Release Binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo ">>> Downloading existing .gpkg.tar and Packages from rolling release..."
          gh release download rolling \
            -p "*.gpkg.tar" -p "Packages*" \
            --repo ${{ github.repository }} \
            --dir binpkgs --clobber 2>/dev/null || true

          for f in binpkgs/*.gpkg.tar; do
            [ -e "$f" ] || continue
            if ! tar -tf "$f" >/dev/null 2>&1; then
              rm -f "$f"
            fi
          done

      - name: Restore GPKG Layout using Portage Tree Mapping
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/binpkgs:/var/cache/binpkgs:rw" \
            -v "${{ github.workspace }}/overlay:/var/db/repos/gentoo-nexus:ro" \
            gentoo/stage3:amd64-desktop-openrc \
            python3 -c "
          import os, shutil, re
          from portage.versions import pkgsplit

          pkgdir = '/var/cache/binpkgs'
          os.makedirs('/var/db/repos/gentoo', exist_ok=True)
          os.system('emerge-webrsync -q')

          repos = ['/var/db/repos/gentoo-nexus', '/var/db/repos/gentoo']
          pn_to_cat = {}

          for repo in repos:
              if not os.path.exists(repo): continue
              for cat in os.listdir(repo):
                  if cat.startswith('.') or cat in ['metadata', 'profiles', 'eclass', 'scripts']: continue
                  cat_path = os.path.join(repo, cat)
                  if not os.path.isdir(cat_path): continue
                  for pn in os.listdir(cat_path):
                      if pn not in pn_to_cat:
                          pn_to_cat[pn] = cat

          for f in os.listdir(pkgdir):
              if not f.endswith('.gpkg.tar'): continue
              path = os.path.join(pkgdir, f)
              base = re.sub(r'-\d+$', '', f.replace('.gpkg.tar', ''))
              split_res = pkgsplit(base)
              if not split_res: split_res = pkgsplit(f.replace('.gpkg.tar', ''))

              if split_res:
                  pn, pvr, rev = split_res
                  if pn in pn_to_cat:
                      cat = pn_to_cat[pn]
                      target_dir = os.path.join(pkgdir, cat, pn)
                      target_path = os.path.join(target_dir, f)
                      if path != target_path:
                          os.makedirs(target_dir, exist_ok=True)
                          shutil.move(path, target_path)
          "

      - name: Fix Workspace Permissions
        run: sudo chown -R "$(id -u):$(id -g)" "${{ github.workspace }}"

      - name: Parse Queue & Normalize Targets
        id: queue
        run: |
          raw_input="${{ github.event.inputs.package_list }}"
          read -r -a RAW_PKGS <<< "$raw_input"

          normalize_target() {
            local t="$1"
            if [[ "$t" == https://gitweb.gentoo.org/*/tree/* ]]; then
              echo "$t" | sed -E 's|.*/tree/([^/]+)/([^/]+)/\2-([^/]+)\.ebuild$|=\1/\2-\3|'
              return
            fi
            if [[ "$t" == =* ]]; then echo "$t"; return; fi
            if echo "$t" | grep -qE '^[a-z][a-z0-9_+-]+/[a-zA-Z0-9_+.-]+-[0-9]'; then
              echo "=${t}"; return
            fi
            echo "$t"
          }

          NORMALIZED=()
          for raw in "${RAW_PKGS[@]}"; do
            NORMALIZED+=("$(normalize_target "$raw")")
          done

          TARGET="${NORMALIZED:-}"
          REMAINING="${NORMALIZED[*]:1}"

          echo "TARGET_PKG=$TARGET" >> "$GITHUB_OUTPUT"
          echo "REMAINING_PKGS=$REMAINING" >> "$GITHUB_OUTPUT"

          if [ -z "$TARGET" ]; then
            echo "skip_compile=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CPV="${TARGET#=}"

          if [[ "$CPV" == *"-9999" ]] || [[ "$TARGET" != =* ]]; then
            echo "skip_compile=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          FORCE="${{ github.event.inputs.force_rebuild }}"
          if [[ "$FORCE" == "true" ]]; then
            echo "skip_compile=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          for atom in $FORCE; do
            atom="${atom#=}"
            if [[ "$CPV" == "$atom"* ]]; then
              echo "skip_compile=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          if grep -qF "CPV: ${CPV}" binpkgs/Packages 2>/dev/null; then
            echo "skip_compile=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_compile=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write Monolithic Docker Build Script
        if: steps.queue.outputs.skip_compile != 'true'
        run: |
          cat > build.sh << 'BUILDSCRIPT'
          #!/bin/bash
          set -euo pipefail

          RAW_TARGET="$1"

          echo ">>> Syncing Gentoo ebuild repository..."
          mkdir -p /var/db/repos/gentoo /etc/portage/repos.conf
          emerge-webrsync -q

          eselect profile set default/linux/amd64/23.0/desktop 2>/dev/null || \
            eselect profile list 2>/dev/null | grep -m1 desktop | awk '{print $1}' | tr -d '[]' | xargs -r eselect profile set || \
            eselect profile set 1

          getuto 2>/dev/null || emerge -q --oneshot app-crypt/gentoo-keys 2>/dev/null || true

          cat > /etc/portage/make.conf << 'MAKECONF'
          COMMON_FLAGS="-O2 -march=x86-64 -pipe"
          CFLAGS="${COMMON_FLAGS}"
          CXXFLAGS="${COMMON_FLAGS}"
          FCFLAGS="${COMMON_FLAGS}"
          FFLAGS="${COMMON_FLAGS}"
          VIDEO_CARDS="amdgpu radeonsi"
          USE="elogind -systemd dbus wayland egl vaapi vdpau vulkan amdgpu ffmpeg encode"
          
          FEATURES="getbinpkg buildpkg parallel-install ccache binpkg-ignore-signature -sandbox -usersandbox -ipc-sandbox -network-sandbox -pid-sandbox"
          CCACHE_DIR="/var/cache/ccache"
          BINPKG_FORMAT="gpkg"
          PKGDIR="/var/cache/binpkgs"
          DISTDIR="/var/cache/distfiles"
          
          ACCEPT_LICENSE="*"
          ACCEPT_KEYWORDS="~amd64"
          ACCEPT_PROPERTIES="*"
          ACCEPT_RESTRICT="*"
          ACCEPT_CHOSTS="x86_64-pc-linux-gnu"
          CONFIG_PROTECT_MASK="/etc"
          EMERGE_DEFAULT_OPTS="--usepkg --getbinpkg --buildpkg --binpkg-respect-use=y --jobs=4 --load-average=4 --keep-going"
          MAKEOPTS="-j4"
          LC_MESSAGES=C.UTF-8
          MAKECONF

          cat > /etc/portage/repos.conf/gentoo-nexus.conf << 'REPO'
          [gentoo-nexus]
          location = /var/db/repos/gentoo-nexus
          masters = gentoo
          priority = 9999
          auto-sync = no
          REPO

          mkdir -p /etc/portage/binrepos.conf
          cat > /etc/portage/binrepos.conf/gentoo-official.conf << 'BINHOST'
          [gentoo-official-v3]
          priority = 5
          sync-uri = https://distfiles.gentoo.org/releases/amd64/binpackages/23.0/x86-64-v3/
          verify-signature = true

          [gentoo-official]
          priority = 1
          sync-uri = https://distfiles.gentoo.org/releases/amd64/binpackages/23.0/x86-64/
          verify-signature = true
          BINHOST

          echo ">>> Updating Portage to latest version..."
          emerge --oneshot --getbinpkg --usepkg sys-apps/portage
          quickpkg sys-apps/portage 2>/dev/null || true

          mkdir -p /etc/portage/package.accept_keywords
          echo '*/*::gentoo-nexus **' > /etc/portage/package.accept_keywords/nexus
          echo 'net-libs/webkit-gtk -~amd64 amd64' > /etc/portage/package.accept_keywords/stable-binary

          mkdir -p /etc/portage/package.use
          cat > /etc/portage/package.use/nexus << 'USES'
          media-libs/opus abi_x86_64
          gui-libs/gtk introspection
          sys-auth/seatd builtin server
          sys-kernel/installkernel dracut
          sys-libs/minizip-ng compat
          sys-apps/dbus -systemd elogind
          media-video/pipewire -systemd elogind extra
          dev-libs/libdbusmenu gtk3
          net-misc/networkmanager -modemmanager -bluetooth
          sys-libs/ncurses -gpm
          sys-libs/zlib-ng abi_x86_32 abi_x86_64 compat
          USES

          cat > /etc/portage/package.use/gaming << 'GAMING'
          media-libs/mesa abi_x86_32
          media-libs/vulkan-loader abi_x86_32
          media-libs/alsa-lib abi_x86_32
          x11-libs/libX11 abi_x86_32
          x11-libs/libxcb abi_x86_32
          x11-libs/libXext abi_x86_32
          virtual/opengl abi_x86_32
          sys-libs/zlib abi_x86_32
          GAMING

          mkdir -p /etc/portage/package.mask
          echo '>=dev-libs/libgit2-1.9.3' > /etc/portage/package.mask/libgit2

          emaint binhost --fix

          while IFS= read -r -d '' ebuild_file; do
              ebuild "$ebuild_file" manifest >/dev/null 2>&1 || true
          done < <(find /var/db/repos/gentoo-nexus -mindepth 2 -maxdepth 3 -name "*.ebuild" -print0)

          TARGET="$RAW_TARGET"
          if [[ "$TARGET" != =* && "$TARGET" != *"-9999" ]]; then
            RESOLVED=$(portageq best_visible / "$TARGET" 2>/dev/null || true)
            if [ -n "$RESOLVED" ] && [[ "$RESOLVED" == */* ]]; then
              TARGET="=${RESOLVED}"
            fi
          fi

          emerge --oneshot --getbinpkg --backtrack=30 --quiet-build=y '>=dev-libs/gobject-introspection-1.86.0' 2>/dev/null || true
          emerge --oneshot --getbinpkg --backtrack=30 --quiet-build=y '>=dev-util/gdbus-codegen-2.88.1' 2>/dev/null || true

          if echo "${TARGET}" | grep -qE "media-libs/mesa|media-libs/libsdl2|media-video/ffmpeg|media-video/pipewire|x11-libs/gtk|gui-libs/libdecor|gui-wm/"; then
              emerge --oneshot --getbinpkg --backtrack=30 --quiet-build=y "dev-libs/wayland" "dev-util/wayland-scanner" 2>/dev/null || {
                  emerge --oneshot --usepkg --getbinpkg --buildpkg --backtrack=30 --quiet-build=y "dev-libs/wayland" "dev-util/wayland-scanner" || true
              }
          fi

          set +e
          emerge --oneshot --usepkg --getbinpkg --buildpkg --backtrack=30 \
            --binpkg-respect-use=y --quiet-build=y --keep-going \
            --autounmask=y --autounmask-write --autounmask-continue=y \
            "${TARGET}" > /tmp/emerge.log 2>&1
          BUILD_EXIT=$?
          cat /tmp/emerge.log
          set -e

          if [ "$BUILD_EXIT" -ne 0 ]; then
            if grep -q "circular dependencies" /tmp/emerge.log; then
              USE="-pipewire" emerge --oneshot --usepkg --getbinpkg --buildpkg --backtrack=30 --quiet-build=y media-libs/libsdl2 || true
              emerge --oneshot --usepkg --getbinpkg --buildpkg --backtrack=30 --quiet-build=y media-video/ffmpeg || true
              emerge --oneshot --usepkg --getbinpkg --buildpkg --backtrack=30 --quiet-build=y media-video/pipewire || true
              USE="pipewire" emerge --oneshot --usepkg --getbinpkg --buildpkg --backtrack=30 --quiet-build=y media-libs/libsdl2 || true

              emerge --oneshot --usepkg --getbinpkg --buildpkg --backtrack=30 \
                --binpkg-respect-use=y --quiet-build=y --keep-going \
                --autounmask=y --autounmask-write --autounmask-continue=y \
                "${TARGET}" || true
            fi
          fi

          emaint binhost --fix
          BUILDSCRIPT

          chmod +x build.sh
          echo "TARGET=${{ steps.queue.outputs.TARGET_PKG }}" >> "$GITHUB_ENV"

      - name: Build Package in Docker
        if: steps.queue.outputs.skip_compile != 'true'
        run: |
          touch build_start_marker
          docker run --rm --privileged \
            -v "${{ github.workspace }}/binpkgs:/var/cache/binpkgs:rw" \
            -v "${{ github.workspace }}/overlay:/var/db/repos/gentoo-nexus:rw" \
            -v "${{ github.workspace }}/distfiles:/var/cache/distfiles:rw" \
            -v "${{ github.workspace }}/ccache:/var/cache/ccache:rw" \
            -v "${{ github.workspace }}/build.sh:/build.sh:ro" \
            gentoo/stage3:amd64-desktop-openrc \
            bash /build.sh "${{ env.TARGET }}"

      - name: Fix Permissions Post-Build
        if: steps.queue.outputs.skip_compile != 'true'
        run: sudo chown -R "$(id -u):$(id -g)" "${{ github.workspace }}"

      - name: Upload to GitHub Release
        if: steps.queue.outputs.skip_compile != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh release view rolling --repo "$REPO" 2>/dev/null || \
            gh release create rolling \
              --repo "$REPO" \
              --title "Nexus Rolling Binaries" \
              --prerelease

          retry_upload() {
            for i in 1 2 3; do
              gh release upload rolling "$1" --repo "$REPO" --clobber 2>&1 && return 0
              sleep 5
            done
            return 1
          }

          sed -i -E \
            -e 's|^PATH: .*/([^/]+\.gpkg\.tar)$|PATH: \1|' \
            -e 's|^URI: .*/([^/]+\.gpkg\.tar)$|URI: \1|' \
            binpkgs/Packages

          awk '/^CPV: acct-(group|user)\//{skip=1} /^$/{if(skip){skip=0; next}} !skip' \
            binpkgs/Packages > binpkgs/Packages.tmp && mv binpkgs/Packages.tmp binpkgs/Packages

          rm -f binpkgs/Packages.gz
          gzip -c binpkgs/Packages > binpkgs/Packages.gz

          shopt -s nullglob
          for file in binpkgs/Packages*; do
            [ -f "$file" ] && retry_upload "$file"
          done

          while IFS= read -r -d '' file; do
            PN=$(echo "$file" | awk -F'/' '{print $3}')
            OLD_ASSETS=$(gh release view rolling --json assets \
              --jq ".assets[].name" --repo "$REPO" \
              | grep -E "^${PN}-[0-9].*\.gpkg\.tar$" || true)
            for asset in $OLD_ASSETS; do
              gh release delete-asset rolling "$asset" --repo "$REPO" -y || true
            done
            retry_upload "$file"
          done < <(find binpkgs -type f -name '*.gpkg.tar' -newer build_start_marker -print0 2>/dev/null)

      - name: Trigger Relay for Next Package
        if: always() && steps.queue.outputs.REMAINING_PKGS != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "${{ github.workflow }}" \
            --ref "${GITHUB_REF_NAME}" \
            --repo ${{ github.repository }} \
            -f package_list="${{ steps.queue.outputs.REMAINING_PKGS }}" \
            -f force_rebuild="${{ github.event.inputs.force_rebuild }}"
