name: Gentoo Build Relay

on:
  workflow_dispatch:
    inputs:
      package_list:
        description: 'Space-separated list of package atoms to build'
        required: true
      force_rebuild:
        description: 'List of specific packages to force rebuild (or "true" for all)'
        type: string
        required: false
        default: ""

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Prepare Workspace & Overlay
        run: |
          mkdir -p binpkgs overlay/metadata overlay/profiles distfiles ccache
          chmod -R 777 binpkgs overlay distfiles ccache
          rsync -a --exclude='.git' --exclude='binpkgs' --exclude='overlay' ./ overlay/
          
          echo "masters = gentoo" > overlay/metadata/layout.conf
          echo "thin-manifests = true" >> overlay/metadata/layout.conf
          echo "sign-manifests = false" >> overlay/metadata/layout.conf
          echo "gentoo-nexus" > overlay/profiles/repo_name

      - name: Download Release Binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download rolling -p "*.gpkg.tar" -p "Packages*" --repo ${{ github.repository }} --dir binpkgs --clobber 2>/dev/null || true
          for f in binpkgs/*.gpkg.tar; do
            [ -e "$f" ] || continue
            if ! tar -tf "$f" >/dev/null 2>&1; then rm -f "$f"; fi
          done

      - name: Restore Native GPKG Layout
        run: |
          python3 -c "
          import os, shutil, re
          if os.path.exists('binpkgs/Packages'):
              with open('binpkgs/Packages', 'r') as f:
                  for block in f.read().split('\n\n'):
                      cpv = next((l.split(' ', 1) for l in block.split('\n') if l.startswith('CPV: ')), None)
                      uri = next((l.split(' ', 1) for l in block.split('\n') if l.startswith('URI: ')), None)
                      if cpv and uri:
                          cat, pn_ver = cpv.split('/', 1)
                          pn = re.split(r'-(?=\d)', pn_ver)
                          src, dest_dir = f'binpkgs/{uri}', f'binpkgs/{cat}/{pn}'
                          if os.path.exists(src):
                              os.makedirs(dest_dir, exist_ok=True)
                              shutil.move(src, f'{dest_dir}/{uri}')
          "

      - name: Fix Workspace Permissions
        run: sudo chown -R "$(id -u):$(id -g)" "${{ github.workspace }}"

      - name: Parse Queue & Target Evaluation
        id: queue
        run: |
          read -r -a PKGS <<< "${{ github.event.inputs.package_list }}"
          TARGET="${PKGS:-}"
          echo "TARGET_PKG=$TARGET" >> "$GITHUB_OUTPUT"
          echo "REMAINING_PKGS=${PKGS[*]:1}" >> "$GITHUB_OUTPUT"
          
          [ -z "$TARGET" ] && { echo "skip_compile=true" >> "$GITHUB_OUTPUT"; exit 0; }
          CPV="${TARGET#=}"

          if [[ "$CPV" == *"-9999" ]]; then
             echo "skip_compile=false" >> "$GITHUB_OUTPUT"
             exit 0
          fi

          FORCE="${{ github.event.inputs.force_rebuild }}"
          if [[ "$FORCE" == "true" || "$FORCE" == *"${CPV}"* ]]; then
             rm -rf "binpkgs/${CPV%/*}" 2>/dev/null || true
             echo "skip_compile=false" >> "$GITHUB_OUTPUT"
             exit 0
          fi

          if grep -q "^CPV: ${CPV}$" binpkgs/Packages 2>/dev/null; then
             echo "skip_compile=true" >> "$GITHUB_OUTPUT"
          else
             rm -rf "binpkgs/${CPV%/*}" 2>/dev/null || true
             echo "skip_compile=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write Monolithic Docker Build Script
        if: steps.queue.outputs.skip_compile != 'true'
        run: |
          cat > build_inside_docker.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          mkdir -p /var/db/repos/gentoo /etc/portage/repos.conf /etc/portage/package.{accept_keywords,use,mask}
          emerge-webrsync -q

          eselect profile set default/linux/amd64/23.0/desktop 2>/dev/null || eselect profile set 1
          getuto 2>/dev/null || emerge -q --oneshot app-crypt/gentoo-keys 2>/dev/null || true

          cat > /etc/portage/make.conf << 'MAKECONF'
          COMMON_FLAGS="-O2 -march=x86-64-v3 -mtune=znver3 -pipe"
          VIDEO_CARDS="amdgpu radeonsi nvidia nouveau"
          CFLAGS="${COMMON_FLAGS}"
          CXXFLAGS="${COMMON_FLAGS}"
          USE="vaapi vdpau vulkan amdgpu ffmpeg encode nvenc elogind egl -systemd -cups abi_x86_32"
          FEATURES="buildpkg parallel-install -binpkg-verify-signature -sandbox -usersandbox -ipc-sandbox -network-sandbox -pid-sandbox"
          BINPKG_FORMAT="gpkg"
          PKGDIR="/var/cache/binpkgs"
          DISTDIR="/var/cache/distfiles"
          ACCEPT_LICENSE="*"
          ACCEPT_KEYWORDS="~amd64"
          EMERGE_DEFAULT_OPTS="--usepkg --buildpkg --binpkg-respect-use=y --quiet-build=y --jobs=4 --load-average=4 --keep-going"
          MAKEOPTS="-j4"
          MAKECONF

          cat > /etc/portage/repos.conf/gentoo-nexus.conf << 'REPOCONF'
          [gentoo-nexus]
          location = /var/db/repos/gentoo-nexus
          masters = gentoo
          priority = 9999
          auto-sync = no
          REPOCONF

          cat > /etc/portage/package.accept_keywords/nexus << 'KEYS'
          */*::gentoo-nexus **
          net-libs/webkit-gtk -~amd64 amd64
          KEYS

          cat > /etc/portage/package.use/nexus << 'USES'
          media-libs/opus abi_x86_64
          gui-libs/gtk introspection
          sys-auth/seatd builtin server
          sys-kernel/installkernel dracut
          sys-libs/minizip-ng compat
          sys-apps/dbus -systemd elogind
          media-video/pipewire -systemd elogind extra
          dev-libs/libdbusmenu gtk3
          net-misc/networkmanager -modemmanager -bluetooth
          sys-libs/ncurses -gpm
          sys-libs/zlib-ng abi_x86_32 abi_x86_64 compat
          USES

          echo '>=dev-libs/libgit2-1.9.3' > /etc/portage/package.mask/libgit2

          if ! ls /var/cache/binpkgs/*/webkit-gtk/*.gpkg.tar >/dev/null 2>&1; then
              mkdir -p /etc/portage/binrepos.conf
              cat > /etc/portage/binrepos.conf/gentoo.conf << 'BINHOST'
          [gentoo]
          priority = 1
          sync-uri = https://distfiles.gentoo.org/releases/amd64/binpackages/23.0/x86-64/
          BINHOST
              emerge --getbinpkgonly --quiet-build=y net-libs/webkit-gtk || true
              rm -f /etc/portage/binrepos.conf/gentoo.conf
          fi

          emaint binhost --fix

          for e in $(find /var/db/repos/gentoo-nexus -mindepth 2 -maxdepth 3 -name "*.ebuild"); do
              ebuild "$e" manifest >/dev/null 2>&1 || true
          done

          emerge --oneshot --autounmask=y --autounmask-write --autounmask-continue=y "$1" || true

          emaint binhost --fix
          EOF
          chmod +x build_inside_docker.sh

      - name: Build Package in Docker
        if: steps.queue.outputs.skip_compile != 'true'
        run: |
          touch build_start_marker
          docker run --rm --privileged \
            -v "${{ github.workspace }}/binpkgs:/var/cache/binpkgs:rw" \
            -v "${{ github.workspace }}/overlay:/var/db/repos/gentoo-nexus:rw" \
            -v "${{ github.workspace }}/distfiles:/var/cache/distfiles:rw" \
            -v "${{ github.workspace }}/ccache:/var/cache/ccache:rw" \
            -v "${{ github.workspace }}/build_inside_docker.sh:/build.sh:ro" \
            gentoo/stage3:amd64-desktop-openrc \
            bash /build.sh "${{ steps.queue.outputs.TARGET_PKG }}"

      - name: Upload to GitHub Release
        if: steps.queue.outputs.skip_compile != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          sudo chown -R "$(id -u):$(id -g)" "${{ github.workspace }}"
          
          gh release view rolling --repo "$REPO" 2>/dev/null || gh release create rolling --repo "$REPO" --title "Nexus Rolling Binaries" --prerelease

          sed -i -E -e 's|^PATH: .*/([^/]+\.gpkg\.tar)$|PATH: \1|' -e 's|^URI: .*/([^/]+\.gpkg\.tar)$|URI: \1|' binpkgs/Packages
          awk '/^CPV: acct-(group|user)\//{skip=1} /^$/{if(skip){skip=0; next}} !skip' binpkgs/Packages > binpkgs/Packages.tmp && mv binpkgs/Packages.tmp binpkgs/Packages
          
          rm -f binpkgs/Packages.gz
          gzip -c binpkgs/Packages > binpkgs/Packages.gz

          retry_upload() {
            for i in 1 2 3; do gh release upload rolling "$1" --repo "$REPO" --clobber 2>&1 && return 0 || sleep 5; done; return 1;
          }

          shopt -s nullglob
          for file in binpkgs/Packages*; do retry_upload "$file"; done

          for file in $(find binpkgs -type f -name '*.gpkg.tar' -newer build_start_marker 2>/dev/null); do
            PN=$(echo "$file" | awk -F'/' '{print $3}')
            OLD_ASSETS=$(gh release view rolling --json assets --jq ".assets[].name" --repo "$REPO" | grep -E "^${PN}-[0-9].*\.gpkg\.tar$" || true)
            for asset in $OLD_ASSETS; do gh release delete-asset rolling "$asset" --repo "$REPO" -y || true; done
            retry_upload "$file"
          done

      - name: Trigger Relay for Next Package
        if: always() && steps.queue.outputs.REMAINING_PKGS != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "${{ github.workflow }}" \
            --ref "${GITHUB_REF_NAME}" \
            --repo ${{ github.repository }} \
            -f package_list="${{ steps.queue.outputs.REMAINING_PKGS }}" \
            -f force_rebuild="${{ github.event.inputs.force_rebuild }}"
