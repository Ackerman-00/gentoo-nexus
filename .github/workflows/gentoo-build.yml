name: Gentoo Build Relay

on:
  workflow_dispatch:
    inputs:
      package_list:
        description: 'Space-separated list of package atoms to build'
        required: true
      force_rebuild:
        description: 'Force compile from source (ignores Release binaries)'
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 120  # Reduced: binaries = fast!
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Directories
        run: mkdir -p binpkgs overlay

      - name: Checkout Custom Ebuilds
        run: |
          # Copy your custom ebuilds to overlay/
          find . -maxdepth 2 -name "*.ebuild" -exec dirname {} \; | sort -u | while read dir; do
            [ -d "$dir" ] && cp -r "$dir" overlay/
          done

      - name: Download Release Binaries (Primary Repo)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo ">>> Downloading existing .gpkg.tar from rolling release..."
          gh release download rolling -p "*.gpkg.tar" -p "Packages" \
            --repo ${{ github.repository }} --dir binpkgs --clobber || true

      - name: Parse & Check Queue
        id: queue
        run: |
          read -r -a PKGS <<< "${{ github.event.inputs.package_list }}"
          TARGET_PKG="${PKGS[0]}"
          REMAINING="${PKGS[@]:1}"
          
          echo "TARGET_PKG=$TARGET_PKG" >> $GITHUB_OUTPUT
          echo "REMAINING_PKGS=$REMAINING" >> $GITHUB_OUTPUT

      - name: Check if Binary Exists (Void-Style Skip)
        id: check_bin
        run: |
          TARGET="${{ steps.queue.outputs.TARGET_PKG }}"
          PN=$(echo "$TARGET" | sed 's/^=//' | awk -F/ '{print $NF}' | sed -E 's/-[0-9]+(\.[0-9]+)*(_[a-z0-9]+)?(-r[0-9]+)?$//')
          
          if [ "${{ github.event.inputs.force_rebuild }}" == "true" ]; then
            echo "Force rebuild: Always compile $TARGET"
            echo "skip_compile=false" >> $GITHUB_OUTPUT
          elif ls binpkgs/${PN}-*.gpkg.tar >/dev/null 2>&1; then
            echo "✓ Binary ${PN}-*.gpkg.tar exists in Release. Skipping compile."
            echo "skip_compile=true" >> $GITHUB_OUTPUT
          else
            echo "❌ No binary for $PN. Will compile."
            echo "skip_compile=false" >> $GITHUB_OUTPUT
          fi

      - name: Minimal Portage Setup & Build
        if: steps.check_bin.outputs.skip_compile != 'true'
        run: |
          docker run --rm --privileged \
            -v ${{ github.workspace }}/binpkgs:/var/cache/binpkgs \
            -v ${{ github.workspace }}/overlay:/var/db/repos/gentoo-nexus \
            gentoo/stage3:amd64-desktop-openrc bash -c '
            set -euo pipefail
            # Ultra-minimal: Just sync + emerge
            emerge-webrsync -q
            eselect profile set default/linux/amd64/23.0/desktop 2>/dev/null || eselect profile set 1
            
            # Config: Prefer binpkgs, no GPG, build if missing
            cat > /etc/portage/make.conf << EOF
            EMERGE_DEFAULT_OPTS="--getbinpkg --usepkg --buildpkg --quiet-build=y --jobs=4"
            PKGDIR=/var/cache/binpkgs
            PORTAGE_BINPKG_SIGVERIFY=0
            ACCEPT_LICENSE="*"
            ACCEPT_KEYWORDS="~amd64"
            EOF
            
            # Nexus repo
            mkdir -p /var/db/repos/gentoo-nexus/metadata
            echo "masters = gentoo" > /var/db/repos/gentoo-nexus/metadata/layout.conf
            echo "gentoo-nexus" > /var/db/repos/gentoo-nexus/profiles/repo_name
            
            emerge --autounmask=y --autounmask-write ${{ steps.queue.outputs.TARGET_PKG }}
          '

      - name: Generate Packages Index
        run: |
          if ls binpkgs/*.gpkg.tar >/dev/null 2>&1; then
            docker run --rm \
              -v ${{ github.workspace }}/binpkgs:/mnt \
              gentoo/stage3:amd64-desktop-openrc \
              emaint --quiet binhost -f /mnt
          fi

      - name: Upload to GitHub Release (Infinite Storage!)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create/update release
          gh release view rolling --repo ${{ github.repository }} 2>/dev/null || \
            gh release create rolling --title "Nexus Rolling Binaries" \
              --notes "Automated Gentoo Binhost" --prerelease \
              --repo ${{ github.repository }}
          
          # Upload EVERYTHING one-by-one (no 2GB limit issues)
          for file in binpkgs/*; do
            [ -f "$file" ] || continue
            echo "Uploading $file..."
            gh release upload rolling "$file" --clobber --repo ${{ github.repository }}
          done

      - name: Relay Next Package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: steps.queue.outputs.REMAINING_PKGS != ''
        run: |
          gh workflow run "Gentoo Build Relay" \
            --ref "${GITHUB_REF_NAME}" \
            -f package_list="${{ steps.queue.outputs.REMAINING_PKGS }}" \
            -f force_rebuild="${{ github.event.inputs.force_rebuild }}" \
            --repo ${{ github.repository }}
