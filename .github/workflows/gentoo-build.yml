name: Gentoo Build Relay

on:
  workflow_dispatch:
    inputs:
      package_list:
        description: |
          Space-separated package atoms. Accepts any of:
            app-editors/zed                    → latest ~amd64 from portage tree
            =app-editors/zed-1.3.5            → exact version
            sys-devel/gcc-16.1.0              → cat/pn-ver shorthand (= is added)
            https://gitweb.gentoo.org/...ebuild → full gitweb URL
        required: true
      force_rebuild:
        description: 'Packages to force rebuild (or "true" for all)'
        type: string
        required: false
        default: ""

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Allocate Swap Space (OOM Prevention)
        run: |
          sudo fallocate -l 10G /mnt/10g.swap || sudo dd if=/dev/zero of=/mnt/10g.swap bs=1G count=10 status=none
          sudo chmod 600 /mnt/10g.swap
          sudo mkswap /mnt/10g.swap
          sudo swapon /mnt/10g.swap
          free -h

      - name: Free Disk Space for Docker
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          df -h /

      - name: Prepare Workspace & Overlay
        run: |
          mkdir -p binpkgs overlay/metadata overlay/profiles distfiles ccache
          chmod -R 777 binpkgs overlay distfiles ccache
          rsync -a --exclude='.git' --exclude='binpkgs' --exclude='overlay' ./ overlay/
          printf 'masters = gentoo\nthin-manifests = true\nsign-manifests = false\n' > overlay/metadata/layout.conf
          echo "gentoo-nexus" > overlay/profiles/repo_name

      - name: Download Release Binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download rolling \
            -p "*.gpkg.tar" -p "Packages*" \
            --repo ${{ github.repository }} \
            --dir binpkgs --clobber 2>/dev/null || true
          for f in binpkgs/*.gpkg.tar; do
            [ -e "$f" ] || continue
            tar -tf "$f" >/dev/null 2>&1 || { echo "Removing corrupt: $f"; rm -f "$f"; }
          done

      - name: Restore GPKG Layout from Packages Index
        run: |
          python3 << 'PYEOF'
          import os, shutil, re

          pkg_index = 'binpkgs/Packages'
          if not os.path.exists(pkg_index):
              print("No Packages index found, skipping layout restore.")
              exit(0)

          with open(pkg_index, 'r') as f:
              content = f.read()

          moved = 0
          for block in content.split('\n\n'):
              cpv_m = re.search(r'^CPV: (.+)$', block, re.MULTILINE)
              uri_m = re.search(r'^URI: ([^\s/]+\.gpkg\.tar)$', block, re.MULTILINE)
              if not (cpv_m and uri_m):
                  continue
              cpv = cpv_m.group(1).strip()
              uri = uri_m.group(1).strip()
              if '/' not in cpv:
                  continue
              cat, pn_ver = cpv.split('/', 1)
              pn_m = re.match(r'^([a-zA-Z0-9_+.-]+?)(?:-\d)', pn_ver)
              pn = pn_m.group(1) if pn_m else pn_ver
              src = os.path.join('binpkgs', uri)
              dest_dir = os.path.join('binpkgs', cat, pn)
              dest = os.path.join(dest_dir, uri)
              if not os.path.exists(src) or src == dest:
                  continue
              os.makedirs(dest_dir, exist_ok=True)
              shutil.move(src, dest)
              print(f"  Restored: {cat}/{pn}/{uri}")
              moved += 1

          print(f"Layout restore: {moved} files repositioned.")
          PYEOF

      - name: Fix Workspace Permissions
        run: sudo chown -R "$(id -u):$(id -g)" "${{ github.workspace }}"

      - name: Parse Queue & Normalize Targets
        id: queue
        run: |
          raw_input="${{ github.event.inputs.package_list }}"
          read -r -a RAW_PKGS <<< "$raw_input"

          normalize_target() {
            local t="$1"

            # Form 1: Full gitweb URL
            # https://gitweb.gentoo.org/repo/gentoo.git/tree/cat/pn/pn-ver.ebuild
            if [[ "$t" == https://gitweb.gentoo.org/*/tree/* ]]; then
              t=$(echo "$t" | sed -E 's|.*/tree/([^/]+)/([^/]+)/\2-([^/]+)\.ebuild$|=\1/\2-\3|')
              echo "$t"
              return
            fi

            # Form 2: Already prefixed with =
            if [[ "$t" == =* ]]; then
              echo "$t"
              return
            fi

            # Form 3: cat/pn-version shorthand (has a version number, no =)
            # e.g. sys-devel/gcc-16.1.0  or  app-editors/zed-1.3.5
            if echo "$t" | grep -qE '^[a-z][a-z0-9_+-]+/[a-zA-Z0-9_+.-]+-[0-9]'; then
              echo "=${t}"
              return
            fi

            # Form 4: Bare category/package — "always latest" mode
            # e.g. app-editors/zed, dev-util/rustup
            # Pass as-is; the build container will resolve via portageq best_visible
            # using the full ~amd64 portage tree (not the stale official binhost index)
            echo "$t"
          }

          NORMALIZED=()
          for raw in "${RAW_PKGS[@]}"; do
            norm=$(normalize_target "$raw")
            NORMALIZED+=("$norm")
          done

          TARGET="${NORMALIZED[0]:-}"
          REMAINING="${NORMALIZED[*]:1}"

          echo "TARGET_PKG=$TARGET" >> "$GITHUB_OUTPUT"
          echo "REMAINING_PKGS=$REMAINING" >> "$GITHUB_OUTPUT"

          if [ -z "$TARGET" ]; then
            echo "skip_compile=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CPV="${TARGET#=}"

          # Live ebuilds always rebuild
          if [[ "$CPV" == *"-9999" ]]; then
            echo "skip_compile=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Bare atom — always build (version unknown until container resolves it)
          if [[ "$TARGET" != =* ]]; then
            echo "skip_compile=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          FORCE="${{ github.event.inputs.force_rebuild }}"
          if [[ "$FORCE" == "true" || "$FORCE" == *"${CPV%%/*}"* ]]; then
            CAT="${CPV%%/*}"
            PN_VER="${CPV#*/}"
            PN="${PN_VER%%-[0-9]*}"
            rm -rf "binpkgs/${CAT}/${PN}" 2>/dev/null || true
            echo "skip_compile=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if grep -q "^CPV: ${CPV}$" binpkgs/Packages 2>/dev/null; then
            echo "skip_compile=true" >> "$GITHUB_OUTPUT"
          else
            CAT="${CPV%%/*}"
            PN_VER="${CPV#*/}"
            PN="${PN_VER%%-[0-9]*}"
            rm -rf "binpkgs/${CAT}/${PN}" 2>/dev/null || true
            echo "skip_compile=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write Monolithic Docker Build Script
        if: steps.queue.outputs.skip_compile != 'true'
        run: |
          cat > build.sh << 'BUILDSCRIPT'
          #!/bin/bash
          set -euo pipefail

          RAW_TARGET="$1"

          echo ">>> Syncing Gentoo ebuild repository..."
          mkdir -p /var/db/repos/gentoo /etc/portage/repos.conf
          emerge-webrsync -q

          eselect profile set default/linux/amd64/23.0/desktop 2>/dev/null || \
            eselect profile list 2>/dev/null | grep -m1 desktop | awk '{print $1}' | tr -d '[]' | xargs -r eselect profile set || \
            eselect profile set 1

          getuto 2>/dev/null || emerge -q --oneshot app-crypt/gentoo-keys 2>/dev/null || true

          cat > /etc/portage/make.conf << 'MAKECONF'
          COMMON_FLAGS="-O2 -march=x86-64-v3 -mtune=znver3 -pipe"
          VIDEO_CARDS="amdgpu radeonsi nvidia nouveau"
          CFLAGS="${COMMON_FLAGS}"
          CXXFLAGS="${COMMON_FLAGS}"
          USE="vaapi vdpau vulkan amdgpu ffmpeg encode nvenc elogind egl -systemd -cups abi_x86_32"
          FEATURES="getbinpkg buildpkg parallel-install -binpkg-verify-signature -sandbox -usersandbox -ipc-sandbox -network-sandbox -pid-sandbox"
          BINPKG_FORMAT="gpkg"
          PKGDIR="/var/cache/binpkgs"
          DISTDIR="/var/cache/distfiles"
          ACCEPT_LICENSE="*"
          ACCEPT_KEYWORDS="~amd64"
          ACCEPT_PROPERTIES="*"
          ACCEPT_RESTRICT="*"
          ACCEPT_CHOSTS="x86_64-pc-linux-gnu"
          CONFIG_PROTECT_MASK="/etc"
          EMERGE_DEFAULT_OPTS="--usepkg --getbinpkg --buildpkg --binpkg-respect-use=n --quiet-build=y --jobs=4 --load-average=4 --keep-going"
          MAKEOPTS="-j4"
          MAKECONF

          cat > /etc/portage/repos.conf/gentoo-nexus.conf << 'REPO'
          [gentoo-nexus]
          location = /var/db/repos/gentoo-nexus
          masters = gentoo
          priority = 9999
          auto-sync = no
          REPO

          mkdir -p /etc/portage/binrepos.conf
          cat > /etc/portage/binrepos.conf/gentoo-official.conf << 'BINHOST'
          [gentoo-official-v3]
          priority = 5
          sync-uri = https://distfiles.gentoo.org/releases/amd64/binpackages/23.0/x86-64-v3/
          verify-signature = false

          [gentoo-official]
          priority = 1
          sync-uri = https://distfiles.gentoo.org/releases/amd64/binpackages/23.0/x86-64/
          verify-signature = false
          BINHOST

          mkdir -p /etc/portage/package.accept_keywords
          echo '*/*::gentoo-nexus **' > /etc/portage/package.accept_keywords/nexus
          echo 'net-libs/webkit-gtk -~amd64 amd64' > /etc/portage/package.accept_keywords/stable-binary

          mkdir -p /etc/portage/package.use
          cat > /etc/portage/package.use/nexus << 'USES'
          media-libs/opus abi_x86_64
          gui-libs/gtk introspection
          sys-auth/seatd builtin server
          sys-kernel/installkernel dracut
          sys-libs/minizip-ng compat
          sys-apps/dbus -systemd elogind
          media-video/pipewire -systemd elogind extra
          dev-libs/libdbusmenu gtk3
          net-misc/networkmanager -modemmanager -bluetooth
          sys-libs/ncurses -gpm
          sys-libs/zlib-ng abi_x86_32 abi_x86_64 compat
          USES

          mkdir -p /etc/portage/package.mask
          echo '>=dev-libs/libgit2-1.9.3' > /etc/portage/package.mask/libgit2

          echo ">>> Regenerating Packages index..."
          emaint binhost --fix

          echo ">>> Generating Manifests for overlay ebuilds..."
          while IFS= read -r -d '' ebuild_file; do
              ebuild "$ebuild_file" manifest >/dev/null 2>&1 || true
          done < <(find /var/db/repos/gentoo-nexus -mindepth 2 -maxdepth 3 -name "*.ebuild" -print0)

          # ── Resolve "always latest" bare atoms via the portage tree ──────────────
          # This queries the LIVE portage tree (post emerge-webrsync), not the stale
          # official binhost index. So app-editors/zed resolves to 1.3.5, not 0.230.1.
          TARGET="$RAW_TARGET"
          if [[ "$TARGET" != =* && "$TARGET" != *"-9999" ]]; then
            echo ">>> Bare atom detected: $TARGET — resolving latest ~amd64 version..."
            RESOLVED=$(portageq best_visible / "$TARGET" 2>/dev/null || true)
            if [ -n "$RESOLVED" ] && [[ "$RESOLVED" == */* ]]; then
              TARGET="=${RESOLVED}"
              echo ">>> Resolved to: $TARGET"
            else
              echo ">>> WARNING: portageq could not resolve $TARGET — using as-is"
            fi
          fi

          echo ">>> Pre-resolving common soft blocks..."
          emerge --oneshot --getbinpkg --backtrack=30 --quiet-build=y \
            '>=dev-libs/gobject-introspection-1.86.0' 2>/dev/null || true
          emerge --oneshot --getbinpkg --backtrack=30 --quiet-build=y \
            '>=dev-util/gdbus-codegen-2.88.1' 2>/dev/null || true

          # ── STEP 1: Binary-only fast path ────────────────────────────────────────
          echo ">>> Attempting binary-only install of: ${TARGET}"
          if emerge --usepkgonly --getbinpkg --backtrack=30 --binpkg-respect-use=n "${TARGET}" 2>&1; then
            echo ">>> SUCCESS: Installed entirely from binary cache."
            emaint binhost --fix
            exit 0
          fi
          echo ">>> Binary-only path failed — falling back to full source build..."

          # ── STEP 2: Full build with circular-dep detection ───────────────────────
          set +e
          emerge --oneshot --usepkg --getbinpkg --buildpkg --backtrack=30 \
            --binpkg-respect-use=n --quiet-build=y --keep-going \
            --autounmask=y --autounmask-write --autounmask-continue=y \
            "${TARGET}" 2>&1 | tee /tmp/emerge.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e

          if [ "$BUILD_EXIT" -ne 0 ]; then
            if grep -q "circular dependencies" /tmp/emerge.log; then
              echo ">>> Circular dependency detected — applying multimedia bootstrap..."
              USE="-pipewire" emerge --oneshot --usepkg --getbinpkg --buildpkg \
                --backtrack=30 --quiet-build=y media-libs/libsdl2 || true
              emerge --oneshot --usepkg --getbinpkg --buildpkg \
                --backtrack=30 --quiet-build=y media-video/ffmpeg || true
              emerge --oneshot --usepkg --getbinpkg --buildpkg \
                --backtrack=30 --quiet-build=y media-video/pipewire || true
              emerge --oneshot --usepkg --getbinpkg --buildpkg \
                --backtrack=30 --quiet-build=y media-libs/libsdl2 || true
              echo ">>> Retrying target after bootstrap..."
              emerge --oneshot --usepkg --getbinpkg --buildpkg --backtrack=30 \
                --binpkg-respect-use=n --quiet-build=y --keep-going \
                --autounmask=y --autounmask-write --autounmask-continue=y \
                "${TARGET}" || echo ">>> WARNING: Build failed after bootstrap. Saving partial binaries."
            else
              echo ">>> WARNING: emerge exited ${BUILD_EXIT}. Saving any partial binaries."
            fi
          fi

          echo ">>> Finalising Packages index..."
          emaint binhost --fix
          BUILDSCRIPT

          chmod +x build.sh
          echo "TARGET=${{ steps.queue.outputs.TARGET_PKG }}" >> "$GITHUB_ENV"

      - name: Build Package in Docker
        if: steps.queue.outputs.skip_compile != 'true'
        run: |
          touch build_start_marker
          docker run --rm --privileged \
            -v "${{ github.workspace }}/binpkgs:/var/cache/binpkgs:rw" \
            -v "${{ github.workspace }}/overlay:/var/db/repos/gentoo-nexus:rw" \
            -v "${{ github.workspace }}/distfiles:/var/cache/distfiles:rw" \
            -v "${{ github.workspace }}/ccache:/var/cache/ccache:rw" \
            -v "${{ github.workspace }}/build.sh:/build.sh:ro" \
            gentoo/stage3:amd64-desktop-openrc \
            bash /build.sh "${{ env.TARGET }}"

      - name: Fix Permissions Post-Build
        if: steps.queue.outputs.skip_compile != 'true'
        run: sudo chown -R "$(id -u):$(id -g)" "${{ github.workspace }}"

      - name: Upload to GitHub Release
        if: steps.queue.outputs.skip_compile != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh release view rolling --repo "$REPO" 2>/dev/null || \
            gh release create rolling \
              --repo "$REPO" \
              --title "Nexus Rolling Binaries" \
              --prerelease

          retry_upload() {
            for i in 1 2 3; do
              gh release upload rolling "$1" --repo "$REPO" --clobber 2>&1 && return 0
              sleep 5
            done
            echo "::error::Upload failed after 3 attempts: $1"
            return 1
          }

          sed -i -E \
            -e 's|^PATH: .*/([^/]+\.gpkg\.tar)$|PATH: \1|' \
            -e 's|^URI: .*/([^/]+\.gpkg\.tar)$|URI: \1|' \
            binpkgs/Packages

          awk '/^CPV: acct-(group|user)\//{skip=1} /^$/{if(skip){skip=0; next}} !skip' \
            binpkgs/Packages > binpkgs/Packages.tmp && mv binpkgs/Packages.tmp binpkgs/Packages

          rm -f binpkgs/Packages.gz
          gzip -c binpkgs/Packages > binpkgs/Packages.gz

          shopt -s nullglob
          for file in binpkgs/Packages*; do
            [ -f "$file" ] && retry_upload "$file"
          done

          while IFS= read -r -d '' file; do
            PN=$(echo "$file" | awk -F'/' '{print $3}')
            OLD_ASSETS=$(gh release view rolling --json assets \
              --jq ".assets[].name" --repo "$REPO" \
              | grep -E "^${PN}-[0-9].*\.gpkg\.tar$" || true)
            for asset in $OLD_ASSETS; do
              gh release delete-asset rolling "$asset" --repo "$REPO" -y || true
            done
            retry_upload "$file"
          done < <(find binpkgs -type f -name '*.gpkg.tar' -newer build_start_marker -print0 2>/dev/null)

      - name: Trigger Relay for Next Package
        if: always() && steps.queue.outputs.REMAINING_PKGS != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "${{ github.workflow }}" \
            --ref "${GITHUB_REF_NAME}" \
            --repo ${{ github.repository }} \
            -f package_list="${{ steps.queue.outputs.REMAINING_PKGS }}" \
            -f force_rebuild="${{ github.event.inputs.force_rebuild }}"
