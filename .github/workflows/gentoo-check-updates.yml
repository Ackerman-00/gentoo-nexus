name: Gentoo Check Updates

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: gentoo-check-updates-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  check-updates:
    name: Scan & Update Ebuilds
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests packaging

      - name: Phase 1 - Scan Local Ebuilds & Bump Versions
        id: scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import os, re, requests, subprocess, stat, shutil
          from pathlib import Path
          from packaging.version import parse as parse_version

          updated_atoms = set()
          gh_token = os.environ.get('GITHUB_TOKEN')
          hdrs = {"Authorization": f"Bearer {gh_token}"} if gh_token else {}

          def get_latest_github_release(repo):
              try:
                  r = requests.get(f"https://api.github.com/repos/{repo}/releases/latest", headers=hdrs, timeout=15)
                  if r.status_code == 200:
                      tag = r.json().get("tag_name", "").lstrip("v")
                      if tag and re.match(r'^[0-9]', tag): return tag
                  r2 = requests.get(f"https://api.github.com/repos/{repo}/tags", headers=hdrs, timeout=15)
                  if r2.status_code == 200 and r2.json():
                      for tag in r2.json():
                          name = tag.get("name", "").lstrip("v")
                          if re.match(r'^[0-9]', name): return name
              except Exception as e:
                  print(f"API Error for {repo}: {e}")
              return None

          def get_latest_commit(repo_url):
              try:
                  out = subprocess.check_output(["git", "ls-remote", repo_url, "HEAD"], timeout=30, stderr=subprocess.DEVNULL).decode()
                  m = re.search(r"([a-f0-9]{40})", out)
                  if m: return m.group(1)[:12]
              except Exception: pass
              return None

          for ebuild_path in Path('.').rglob('*.ebuild'):
              if any(x in ebuild_path.parts for x in ['cache', 'job_out', 'binpkgs', 'distfiles', 'ccache', '.github', '.git']): continue
              pkg_dir = ebuild_path.parent
              if len(pkg_dir.parts) < 2: continue
              cat_name, pkg_name = pkg_dir.parts[-2], pkg_dir.parts[-1]
              pkg_cat_name = f"{cat_name}/{pkg_name}"

              content = ebuild_path.read_text(encoding="utf-8")
              
              # ✅ FIX: Strictly checks the filename, ignoring internal git-r3 fallback logic!
              is_live = ebuild_path.name.endswith('9999.ebuild')

              repo_m = re.search(r'github\.com/([A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+?)(?:\.git|/archive|/releases|/tarball|["\s\'])', content)
              if not repo_m: continue
              repo = repo_m.group(1).rstrip('.')

              print(f"--- Scanning {pkg_cat_name} ({repo}) ---")

              if is_live:
                  repo_url = f"https://github.com/{repo}.git"
                  new_commit = get_latest_commit(repo_url)
                  if new_commit:
                      new_content = content
                      if re.search(r'^EGIT_COMMIT=', new_content, re.MULTILINE):
                          new_content = re.sub(r'(EGIT_COMMIT=["\']?)[a-fA-F0-9]{7,40}(["\']?)', r"\g<1>" + new_commit + r"\2", new_content)
                      if new_content != content:
                          ebuild_path.write_text(new_content, encoding="utf-8")
                          updated_atoms.add(pkg_cat_name)
                          print(f"  [+] Bumped live commit to: {new_commit}")
                      else:
                          print("  [-] Commit hash already up to date.")
              else:
                  curr_ver_m = re.search(rf'{re.escape(pkg_name)}-(\d+(?:\.\d+)*(?:_(?:alpha|beta|pre|rc|p)\d*)?(?:-r\d+)?)\.ebuild$', ebuild_path.name)
                  if not curr_ver_m: 
                      print("  [!] Could not extract current version from filename.")
                      continue
                  curr_ver = curr_ver_m.group(1)

                  latest_ver = get_latest_github_release(repo)
                  if latest_ver:
                      if pkg_name == "mangowc" and latest_ver.startswith("12."): latest_ver = "0." + latest_ver
                      try: is_newer = parse_version(latest_ver) > parse_version(curr_ver)
                      except: is_newer = (latest_ver != curr_ver)
                      
                      print(f"  [*] Current: {curr_ver} | Upstream Latest: {latest_ver}")

                      if is_newer:
                          new_path = pkg_dir / f"{pkg_name}-{latest_ver}.ebuild"
                          ebuild_path.rename(new_path)
                          updated_atoms.add(pkg_cat_name)
                          print(f"  [+] Renamed to: {new_path.name}")
                      else:
                          print("  [-] Already up to date.")
                  else:
                      print("  [!] Failed to find latest version on GitHub API.")

          changed_list = sorted(updated_atoms)
          if changed_list:
              Path('changed_packages.txt').write_text('\n'.join(changed_list) + '\n', encoding="utf-8")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"changed_packages={'true' if changed_list else 'false'}\n")
          EOF

      - name: Phase 2 - Commit and Push Updates
        run: |
          if [ -f changed_packages.txt ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            if ! git diff --cached --quiet; then
              git commit -m "auto-update: ebuild refresh $(date -u '+%Y-%m-%d')"
              git pull --rebase origin ${{ github.ref_name }}
              git push origin HEAD:${{ github.ref_name }}
            fi
          fi

      - name: Phase 3 - Resolve Latest State via Portage
        run: |
          cat > resolve_state.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail
          
          mkdir -p /etc/portage/repos.conf /var/db/repos/{gentoo,steam-overlay} /etc/portage/package.accept_keywords
          echo 'ACCEPT_KEYWORDS="~amd64"' > /etc/portage/make.conf
          
          echo ">>> Syncing base Gentoo tree..."
          emerge-webrsync -q || true
          
          echo ">>> Installing Git to fetch overlays..."
          emerge --oneshot --quiet dev-vcs/git
          
          echo ">>> Fetching Steam Overlay..."
          git clone --depth 1 https://github.com/anyc/steam-overlay.git /var/db/repos/steam-overlay 2>/dev/null
          
          mkdir -p /overlay/metadata
          echo "masters = gentoo" > /overlay/metadata/layout.conf
          
          cat > /etc/portage/repos.conf/gentoo-nexus.conf << 'REPOEOF'
          [gentoo-nexus]
          location = /overlay
          masters = gentoo
          priority = 9999
          REPOEOF
          
          cat > /etc/portage/repos.conf/steam-overlay.conf << 'REPOEOF'
          [steam-overlay]
          location = /var/db/repos/steam-overlay
          masters = gentoo
          priority = 50
          REPOEOF
          
          cat > /etc/portage/package.accept_keywords/nexus << 'KEYW'
          media-libs/mesa ~amd64
          media-libs/vulkan-loader ~amd64
          sys-kernel/gentoo-kernel ~amd64
          virtual/dist-kernel ~amd64
          KEYW
          
          # ✅ FIX: Generate fresh manifests for the overlay so Portage recognizes bumped ebuilds!
          echo ">>> Generating Manifests for local overlay..."
          for ebuild_file in $(find /overlay -mindepth 2 -maxdepth 3 -name "*.ebuild"); do
             ebuild "$ebuild_file" manifest >/dev/null 2>&1 || true
          done
          
          LOCAL_PKGS=$(find /overlay -mindepth 2 -maxdepth 3 -name "*.ebuild" | awk -F/ '{print $(NF-2)"/"$(NF-1)}' | sort -u || true)
          UPSTREAM_PKGS="media-libs/mesa media-libs/vulkan-loader sys-kernel/gentoo-kernel virtual/dist-kernel games-util/steam-launcher"
          
          > /overlay/desired_state.txt
          echo ">>> Querying emerge for exact target versions..."
          for pkg in $LOCAL_PKGS $UPSTREAM_PKGS; do
             # Bulletproof AWK parser for emerge output
             RES=$(emerge -pqO --color=n "$pkg" 2>/dev/null | awk '/^\[ebuild/ {for(i=1;i<=NF;i++) if($i ~ /\//) {print $i; break}}' || true)
             if [ -n "$RES" ]; then 
               echo "$RES" >> /overlay/desired_state.txt
               echo "Target resolved: $RES"
             fi
          done
          EOF
          chmod +x resolve_state.sh
          docker run --rm -v "${{ github.workspace }}:/overlay" gentoo/stage3:amd64-desktop-openrc /bin/bash /overlay/resolve_state.sh

      - name: Phase 4 - Binhost Audit
        id: audit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo ">>> Fetching Existing Assets (including Pre-Releases)..."
          # ✅ FIX: Uses GH CLI to bypass the Prerelease API blindness!
          EXISTING_ASSETS=$(gh release view rolling --json assets --jq '.assets[].name' 2>/dev/null || echo "")
          
          CHANGED=$(cat changed_packages.txt 2>/dev/null || echo "")
          > packages_to_build.txt
          FORCE_REQUIRED="false"
          
          while IFS= read -r CPV; do
             [ -z "$CPV" ] && continue
             PN_PV="${CPV#*/}"
             ATOM=$(echo "$CPV" | sed -E 's/-[0-9]+(\.[0-9]+)*(_[a-z0-9]+)?(-r[0-9]+)?$//')
             
             if echo "$CHANGED" | grep -q "^${ATOM}$"; then
                echo "⚠️ $ATOM bumped via script. Forcing build: =$CPV"
                echo "=$CPV" >> packages_to_build.txt
                FORCE_REQUIRED="true"
             elif ! echo "$EXISTING_ASSETS" | grep -q "^${PN_PV}-.*\.gpkg\.tar$"; then
                echo "✗ Missing binary: =$CPV"
                echo "=$CPV" >> packages_to_build.txt
             else
                echo "✓ Binary already deployed: =$CPV"
             fi
          done < desired_state.txt
          
          echo "build_list=$(tr '\n' ' ' < packages_to_build.txt | xargs)" >> "$GITHUB_OUTPUT"
          echo "force_required=$FORCE_REQUIRED" >> "$GITHUB_OUTPUT"

      - name: Phase 5 - Trigger Relay
        if: steps.audit.outputs.build_list != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo ">>> Queueing the following for compilation: ${{ steps.audit.outputs.build_list }}"
          gh workflow run "Gentoo Build Relay" \
            --ref "${GITHUB_REF_NAME}" \
            -f package_list="${{ steps.audit.outputs.build_list }}" \
            -f force_rebuild="${{ steps.audit.outputs.force_required }}"
