name: Gentoo Check Updates

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: gentoo-check-updates-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  check-updates:
    name: Scan & Update Ebuilds
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests packaging

      # ═══════════════════════════════════════════════════════════════
      # PHASE 1: Scan local ebuilds for version bumps
      # ═══════════════════════════════════════════════════════════════
      - name: Phase 1 - Scan Local Ebuilds & Bump Versions
        id: scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > scan.py << 'EOF'
          import os, re, requests, subprocess, tempfile
          from pathlib import Path
          from packaging.version import parse as parse_version

          updated_atoms = set()
          gh_token = os.environ.get('GITHUB_TOKEN')
          hdrs = {"Authorization": f"Bearer {gh_token}", "Accept": "application/vnd.github.v3+json"} if gh_token else {}

          def get_latest_github_release(repo):
              best_ver = None
              try:
                  r = requests.get(f"https://api.github.com/repos/{repo}/releases/latest", headers=hdrs, timeout=15)
                  if r.status_code == 200:
                      tag = r.json().get("tag_name", "").lstrip("v")
                      if tag and re.match(r'^[0-9]', tag): best_ver = tag
                  r2 = requests.get(f"https://api.github.com/repos/{repo}/tags?per_page=100", headers=hdrs, timeout=15)
                  if r2.status_code == 200 and r2.json():
                      for tag_obj in r2.json():
                          name = tag_obj.get("name", "").lstrip("v")
                          if re.match(r'^[0-9]', name):
                              if not best_ver or (parse_version(name) > parse_version(best_ver)):
                                  best_ver = name
              except Exception as e:
                  print(f"  [!] API Error for {repo}: {e}")
              return best_ver

          def get_latest_commit(repo_url, branch="HEAD"):
              try:
                  out = subprocess.check_output(["git", "ls-remote", repo_url, branch], timeout=30, stderr=subprocess.DEVNULL).decode()
                  m = re.search(r"([a-f0-9]{40})", out)
                  if m: return m.group(1)[:12]
              except: pass
              return None

          def extract_appimage_version(appimage_path):
              try:
                  subprocess.run(['chmod', '+x', appimage_path], check=True)
                  res = subprocess.run([appimage_path, '--appimage-version'], capture_output=True, text=True, timeout=30)
                  if res.returncode == 0 and res.stdout.strip(): return res.stdout.strip()
              except: pass
              try:
                  with tempfile.TemporaryDirectory() as tmpdir:
                      subprocess.run([appimage_path, '--appimage-extract'], cwd=tmpdir, capture_output=True, timeout=120)
                      extracted_dir = Path(tmpdir) / 'squashfs-root'
                      if extracted_dir.is_dir():
                          for d_file in extracted_dir.glob('*.desktop'):
                              content = d_file.read_text(encoding='utf-8', errors='ignore')
                              match = re.search(r'^X-AppImage-Version=(.+)', content, re.MULTILINE) or re.search(r'^Version=(.+)', content, re.MULTILINE)
                              if match: return match.group(1).strip()
              except: pass
              return None

          for ebuild_path in Path('.').rglob('*.ebuild'):
              if any(x in ebuild_path.parts for x in ['cache', 'job_out', 'binpkgs', 'distfiles', 'ccache', '.github', '.git']): continue
              pkg_dir = ebuild_path.parent
              if len(pkg_dir.parts) < 2: continue
              pkg_cat_name = f"{pkg_dir.parts[-2]}/{pkg_dir.parts[-1]}"
              content = ebuild_path.read_text(encoding="utf-8")

              # Special: rootapp-bin AppImage
              if pkg_dir.parts[-1] == "rootapp-bin":
                  print(f"--- Scanning {pkg_cat_name} (AppImage) ---")
                  curr_ver_m = re.search(rf'{re.escape(pkg_dir.parts[-1])}-(\d+(?:\.\d+)*[a-z]?(?:_(?:alpha|beta|pre|rc|p)\d*)?(?:-r\d+)?)\.ebuild$', ebuild_path.name)
                  if not curr_ver_m: continue
                  curr_ver = curr_ver_m.group(1)
                  with tempfile.NamedTemporaryFile(delete=False, suffix=".AppImage") as tmp: tmp_path = tmp.name
                  try:
                      subprocess.run(['curl', '-sSL', '-o', tmp_path, "https://installer.rootapp.com/installer/Linux/X64/Root.AppImage"], timeout=120)
                      new_ver = extract_appimage_version(tmp_path)
                  finally:
                      if os.path.exists(tmp_path): os.unlink(tmp_path)
                  if new_ver and (parse_version(new_ver) > parse_version(curr_ver)):
                      new_path = pkg_dir / f"{pkg_dir.parts[-1]}-{new_ver}.ebuild"
                      ebuild_path.rename(new_path)
                      updated_atoms.add(pkg_cat_name)
                      print(f"  [+] Renamed to: {new_path.name}")
                  else:
                      print("  [-] Already up to date.")
                  continue

              repo_m = re.search(r'github\.com/([A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+?)(?:\.git|/archive|/releases|/tarball|["\s\'])', content)
              if not repo_m: continue
              repo = repo_m.group(1).rstrip('.')

              print(f"--- Scanning {pkg_cat_name} ({repo}) ---")

              # Live ebuilds (9999): bump commit hash
              if ebuild_path.name.endswith('9999.ebuild'):
                  branch_m = re.search(r'^EGIT_BRANCH=["\']?([^"\']+)["\']?', content, re.MULTILINE)
                  branch = branch_m.group(1) if branch_m else "HEAD"
                  new_commit = get_latest_commit(f"https://github.com/{repo}.git", branch)
                  if new_commit:
                      new_content = re.sub(r'(EGIT_COMMIT=["\']?)[a-fA-F0-9]{7,40}(["\']?)', r"\g<1>" + new_commit + r"\2", content)
                      if new_content != content:
                          ebuild_path.write_text(new_content, encoding="utf-8")
                          updated_atoms.add(pkg_cat_name)
                          print(f"  [+] Bumped live commit on {branch} to: {new_commit}")
                      else:
                          print(f"  [-] Commit hash for {branch} already up to date.")
              else:
                  # Versioned ebuilds: check GitHub releases
                  curr_ver_m = re.search(rf'{re.escape(pkg_dir.parts[-1])}-(\d+(?:\.\d+)*[a-z]?(?:_(?:alpha|beta|pre|rc|p)\d*)?(?:-r\d+)?)\.ebuild$', ebuild_path.name)
                  if not curr_ver_m:
                      print("  [!] Could not extract current version from filename.")
                      continue
                  curr_ver = curr_ver_m.group(1)
                  latest_ver = get_latest_github_release(repo)
                  if latest_ver:
                      if pkg_dir.parts[-1] == "mangowc" and latest_ver.startswith("12."): latest_ver = "0." + latest_ver
                      if parse_version(latest_ver) > parse_version(curr_ver):
                          new_path = pkg_dir / f"{pkg_dir.parts[-1]}-{latest_ver}.ebuild"
                          ebuild_path.rename(new_path)
                          updated_atoms.add(pkg_cat_name)
                          print(f"  [+] Renamed to: {new_path.name}")
                      else:
                          print("  [-] Already up to date.")
                  else:
                      print("  [!] Failed to find latest version on GitHub API.")

          changed_list = sorted(updated_atoms)
          if changed_list:
              Path('changed_packages.txt').write_text('\n'.join(changed_list) + '\n', encoding="utf-8")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"changed_packages={'true' if changed_list else 'false'}\n")
          EOF

          python3 -u scan.py

      # ═══════════════════════════════════════════════════════════════
      # PHASE 2: Combined Portage Operations (Manifests & Resolution)
      #           Single Docker container - no redundant spin-ups.
      # ═══════════════════════════════════════════════════════════════
      - name: Phase 2 - Combined Portage Operations
        run: |
          cat > gentoo_ops.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          mkdir -p /var/db/repos/gentoo /etc/portage/repos.conf /etc/portage/package.{accept_keywords,use}
          emerge-webrsync -q || true

          cat > /etc/portage/repos.conf/gentoo.conf << 'REPOEOF'
          [gentoo]
          location = /var/db/repos/gentoo
          auto-sync = yes
          priority = -1000
          REPOEOF

          mkdir -p /overlay/metadata /overlay/profiles
          echo "masters = gentoo" > /overlay/metadata/layout.conf
          find /overlay -mindepth 1 -maxdepth 1 -type d | grep -v -E '\.git|\.github|metadata|profiles|binpkgs|distfiles|ccache' | sed 's|/overlay/||' > /overlay/profiles/categories

          cat > /etc/portage/repos.conf/gentoo-nexus.conf << 'REPOEOF'
          [gentoo-nexus]
          location = /overlay
          masters = gentoo
          priority = 9999
          auto-sync = no
          REPOEOF

          # Generate manifests for custom ebuilds
          echo ">>> Generating Manifests..."
          for e in $(find /overlay -mindepth 2 -maxdepth 3 -name "*.ebuild"); do
              ebuild "$e" manifest >/dev/null 2>&1 || echo "WARNING: Manifest failed for $(basename "$e")"
          done

          echo ">>> Generating md5-cache..."
          egencache --update --repo gentoo-nexus --jobs 4

          # ── Portage state resolution ──────────────────────────
          cat > /etc/portage/make.conf << 'MAKECONF'
          ACCEPT_KEYWORDS="~amd64"
          ACCEPT_LICENSE="*"
          MAKECONF

          cat > /etc/portage/package.use/global << 'USECONF'
          sys-libs/zlib minizip
          media-video/pipewire extra
          media-video/ffmpeg -sdl
          sys-libs/ncurses -gpm
          dev-libs/openssl -bindist
          dev-libs/libdbusmenu gtk3
          USECONF

          cat > /etc/portage/package.accept_keywords/nexus << 'KEYW'
          */*::gentoo-nexus **
          media-libs/mesa ~amd64
          media-libs/vulkan-loader ~amd64
          sys-kernel/gentoo-kernel ~amd64
          virtual/dist-kernel ~amd64
          games-util/heroic-bin ~amd64
          app-editors/zed ~amd64
          dev-util/rustup ~amd64
          KEYW

          # ═══════════════════════════════════════════════════════
          # UPSTREAM_PKGS: Everything pulled from official Gentoo
          # tree (not your overlay) that you want pre-built.
          # Add new packages HERE, not in build.yml.
          # ═══════════════════════════════════════════════════════
          LOCAL_PKGS=$(find /overlay -mindepth 2 -maxdepth 3 -name "*.ebuild" | awk -F/ '{print $(NF-2)"/"$(NF-1)}' | sort -u || true)
          UPSTREAM_PKGS="media-libs/mesa media-libs/vulkan-loader sys-kernel/gentoo-kernel virtual/dist-kernel games-util/heroic-bin app-editors/zed dev-util/rustup"

          ALL_PKGS=$(echo -e "${LOCAL_PKGS}\n${UPSTREAM_PKGS}" | tr ' ' '\n' | sort -u | grep -v '^$')

          > /overlay/desired_state.txt
          for pkg in $ALL_PKGS; do
             RES=$(emerge -pqO --color=n "$pkg" 2>/dev/null | awk '/^\[ebuild/ {for(i=1;i<=NF;i++) if($i ~ /\//) {print $i; break}}' || true)
             if [ -n "$RES" ]; then
               echo "$RES" >> /overlay/desired_state.txt
               echo "Target resolved: $RES"
             fi
          done
          EOF
          chmod +x gentoo_ops.sh
          docker run --rm -v "${{ github.workspace }}:/overlay" gentoo/stage3:amd64-desktop-openrc bash /overlay/gentoo_ops.sh

      # ═══════════════════════════════════════════════════════════════
      # PHASE 3: Commit changes
      # ═══════════════════════════════════════════════════════════════
      - name: Phase 3 - Commit All Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo -e "scan.py\nchanged_packages.txt\npackages_to_build.txt\ngentoo_ops.sh\ndesired_state.txt" > .gitignore
          git rm --cached scan.py changed_packages.txt packages_to_build.txt desired_state.txt 2>/dev/null || true

          git add -A
          if ! git diff --cached --quiet; then
            MSG="auto-update: ebuild refresh, manifests, and cache $(date -u '+%Y-%m-%d')"
            if [ -f changed_packages.txt ]; then
              MSG="auto-update: ebuild bumps ($(tr '\n' ' ' < changed_packages.txt)) $(date -u '+%Y-%m-%d')"
            fi
            git commit -m "$MSG"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          fi

      # ═══════════════════════════════════════════════════════════════
      # PHASE 4: Binhost Audit - check what's missing from release
      # ═══════════════════════════════════════════════════════════════
      - name: Phase 4 - Binhost Audit
        id: audit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          EXISTING_ASSETS=$(gh release view rolling --json assets --jq '.assets[].name' 2>/dev/null || echo "")
          CHANGED=$(cat changed_packages.txt 2>/dev/null || echo "")
          > packages_to_build.txt
          CHANGED_ATOMS=""

          while IFS= read -r CPV; do
             [ -z "$CPV" ] && continue
             PN_PV="${CPV#*/}"
             ATOM=$(echo "$CPV" | sed -E 's/-[0-9]+(\.[0-9]+)*(_[a-z0-9]+)?(-r[0-9]+)?$//')
             if echo "$CHANGED" | grep -q "^${ATOM}$"; then
                echo "⚠️ $ATOM bumped via script. Queueing build: =$CPV"
                echo "=$CPV" >> packages_to_build.txt
                CHANGED_ATOMS="$CHANGED_ATOMS =$CPV"
             elif ! echo "$EXISTING_ASSETS" | grep -q "^${PN_PV}-.*\.gpkg\.tar$"; then
                echo "✗ Missing binary: =$CPV"
                echo "=$CPV" >> packages_to_build.txt
             else
                echo "✓ Binary already deployed: =$CPV"
             fi
          done < desired_state.txt

          UNIQUE_BUILD_LIST=$(tr '\n' ' ' < packages_to_build.txt | tr ' ' '\n' | sort -u | xargs)
          echo "build_list=$UNIQUE_BUILD_LIST" >> "$GITHUB_OUTPUT"

          UNIQUE_CHANGED_ATOMS=$(echo $CHANGED_ATOMS | tr ' ' '\n' | sort -u | xargs)
          echo "force_required=$UNIQUE_CHANGED_ATOMS" >> "$GITHUB_OUTPUT"

      # ═══════════════════════════════════════════════════════════════
      # PHASE 5: Trigger the Build Relay with prioritized order
      # ═══════════════════════════════════════════════════════════════
      - name: Phase 5 - Trigger Relay
        if: steps.audit.outputs.build_list != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ═══════════════════════════════════════════════════════
          # PRIORITY_ORDER: Build order matters.
          # - System packages first (kernel, mesa, vulkan)
          # - Toolchain packages (rustup needed by zed)
          # - Applications last
          # Add new upstream packages here too.
          # ═══════════════════════════════════════════════════════
          PRIORITY_ORDER=(
            "sys-kernel/gentoo-kernel"
            "virtual/dist-kernel"
            "media-libs/mesa"
            "media-libs/vulkan-loader"
            "dev-util/rustup"
            "app-editors/zed"
            "dev-python/icoextract"
            "games-util/heroic-bin"
            "games-util/faugus-launcher"
            "net-im/vesktop-bin"
            "gui-libs/scenefx"
            "gui-apps/quickshell"
            "gui-apps/noctalia-qs"
            "x11-misc/matugen"
            "gui-wm/niri"
            "gui-wm/noctalia-v5"
            "gui-wm/mangowc"
            "app-misc/brightnessctl"
            "app-misc/cliphist"
            "app-misc/dgop"
            "gui-wm/dank-material-shell"
            "sys-apps/danksearch"
            "x11-base/xwayland-satellite"
          )
          RAW_LIST="${{ steps.audit.outputs.build_list }}"
          ORDERED=()
          for priority_pkg in "${PRIORITY_ORDER[@]}"; do
            for exact_pkg in $RAW_LIST; do
              if echo "$exact_pkg" | grep -q "$priority_pkg"; then
                ORDERED+=("$exact_pkg")
              fi
            done
          done
          for exact_pkg in $RAW_LIST; do
            already=false
            for p in "${ORDERED[@]}"; do
              if [ "$p" == "$exact_pkg" ]; then already=true; break; fi
            done
            if [ "$already" = false ]; then ORDERED+=("$exact_pkg"); fi
          done
          FINAL_LIST="${ORDERED[*]}"
          echo ">>> Queueing the following for compilation: $FINAL_LIST"

          gh workflow run "Gentoo Build Relay" \
            --ref "${GITHUB_REF_NAME}" \
            --repo ${{ github.repository }} \
            -f package_list="$FINAL_LIST" \
            -f force_rebuild="${{ steps.audit.outputs.force_required }}"
