name: Gentoo Check Updates

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: gentoo-check-updates-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  check-updates:
    name: Scan & Update Ebuilds
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests packaging

      # (Phase 1 unchanged)
      - name: Phase 1 - Scan Local Ebuilds & Bump Versions
        id: scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ... (identical to your provided Phase 1) ...
          # (I'm omitting the full copy here for brevity; it is identical to what you have)
          python3 << 'EOF'
          import os, re, requests, subprocess, stat, shutil, tempfile
          from pathlib import Path
          from packaging.version import parse as parse_version

          updated_atoms = set()
          gh_token = os.environ.get('GITHUB_TOKEN')
          hdrs = {"Authorization": f"Bearer {gh_token}"} if gh_token else {}

          # ... rest of Phase 1 code ...
          # (unchanged)
          EOF

      - name: Phase 2 - Generate Manifests for All Ebuilds
        run: |
          # (identical to your version)
          # ...

      - name: Phase 3 - Commit All Changes (Ebuilds + Manifests)
        run: |
          # (identical to your version)
          # ...

      - name: Phase 4 - Resolve Latest State via Portage
        run: |
          cat > resolve_state.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail
          mkdir -p /etc/portage/repos.conf /etc/portage/binrepos.conf /var/db/repos/gentoo /etc/portage/package.{accept_keywords,use}
          cat > /etc/portage/make.conf << 'MAKECONF'
          ACCEPT_KEYWORDS="~amd64"
          ACCEPT_LICENSE="*"
          MAKECONF
          cat > /etc/portage/package.use/global << 'USECONF'
          sys-libs/zlib minizip
          media-video/pipewire extra
          media-video/ffmpeg -sdl
          sys-libs/ncurses -gpm
          dev-libs/openssl -bindist
          # NO Steam‑related flags
          USECONF
          emerge-webrsync -q || true
          mkdir -p /overlay/metadata
          echo "masters = gentoo" > /overlay/metadata/layout.conf
          cat > /etc/portage/repos.conf/gentoo-nexus.conf << 'REPOEOF'
          [gentoo-nexus]
          location = /overlay
          masters = gentoo
          priority = 9999
          REPOEOF
          cat > /etc/portage/package.accept_keywords/nexus << 'KEYW'
          */*::gentoo-nexus **
          media-libs/mesa ~amd64
          media-libs/vulkan-loader ~amd64
          sys-kernel/gentoo-kernel ~amd64
          virtual/dist-kernel ~amd64
          KEYW
          LOCAL_PKGS=$(find /overlay -mindepth 2 -maxdepth 3 -name "*.ebuild" | awk -F/ '{print $(NF-2)"/"$(NF-1)}' | sort -u || true)
          # Removed games-util/steam-launcher
          UPSTREAM_PKGS="media-libs/mesa media-libs/vulkan-loader sys-kernel/gentoo-kernel virtual/dist-kernel"
          > /overlay/desired_state.txt
          for pkg in $LOCAL_PKGS $UPSTREAM_PKGS; do
             RES=$(emerge -pqO --color=n "$pkg" 2>/dev/null | awk '/^\[ebuild/ {for(i=1;i<=NF;i++) if($i ~ /\//) {print $i; break}}' || true)
             if [ -n "$RES" ]; then 
               echo "$RES" >> /overlay/desired_state.txt
               echo "Target resolved: $RES"
             fi
          done
          EOF
          chmod +x resolve_state.sh
          docker run --rm -v "${{ github.workspace }}:/overlay" gentoo/stage3:amd64-desktop-openrc bash /overlay/resolve_state.sh

      - name: Phase 5 - Binhost Audit
        id: audit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # (unchanged)
          # ...

      - name: Phase 6 - Trigger Relay
        if: steps.audit.outputs.build_list != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRIORITY_ORDER=(
            "media-libs/mesa"
            "media-libs/vulkan-loader"
            "sys-kernel/gentoo-kernel"
            "virtual/dist-kernel"
            # Removed "games-util/steam-launcher"
            "gui-libs/scenefx"
            "gui-apps/quickshell"
            "gui-apps/noctalia-qs"
            "x11-misc/matugen"
            "gui-wm/niri"
            "gui-wm/mangowc"
            "app-misc/brightnessctl"
            "app-misc/cliphist"
            "app-misc/dgop"
            "gui-wm/noctalia-shell"
            "gui-wm/dank-material-shell"
            "sys-apps/danksearch"
            "x11-base/xwayland-satellite"
          )
          # ... (rest unchanged)
