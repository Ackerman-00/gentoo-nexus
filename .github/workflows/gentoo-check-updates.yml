name: Gentoo Check Updates

on:
  schedule:
    - cron: '0 */6 * * *'  # Runs every 6 hours
  workflow_dispatch:

concurrency:
  group: gentoo-check-updates-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  check-updates:
    name: Scan & Update Ebuilds
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      changed_packages: ${{ steps.scan.outputs.changed_packages }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests packaging

      - name: Scan Ebuilds & Update Versions
        id: scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import os, re, requests, subprocess, stat, shutil
          from pathlib import Path
          from packaging.version import parse as parse_version

          updated_atoms = set()
          gh_token = os.environ.get('GITHUB_TOKEN')
          hdrs = {"Authorization": f"token {gh_token}"} if gh_token else {}

          def get_latest_github_release(repo):
              try:
                  r = requests.get(f"https://api.github.com/repos/{repo}/releases/latest", headers=hdrs, timeout=15)
                  if r.status_code == 200:
                      tag = r.json().get("tag_name", "").lstrip("v")
                      if tag and re.match(r'^[0-9]', tag): return tag
                  r2 = requests.get(f"https://api.github.com/repos/{repo}/tags", headers=hdrs, timeout=15)
                  if r2.status_code == 200:
                      for tag in r2.json():
                          name = tag.get("name", "").lstrip("v")
                          if re.match(r'^[0-9]', name): return name
              except Exception: pass
              return None

          def get_latest_commit(repo_url):
              try:
                  out = subprocess.check_output(["git", "ls-remote", repo_url, "HEAD"], timeout=30, stderr=subprocess.DEVNULL).decode()
                  m = re.search(r"([a-f0-9]{40})", out)
                  if m: return m.group(1)
              except Exception: pass
              return None

          def get_rootapp_version():
              appimage = "/tmp/Root.AppImage"
              subprocess.run(["wget", "-qO", appimage, "https://installer.rootapp.com/installer/Linux/X64/Root.AppImage"])
              if not os.path.exists(appimage): return None
              os.chmod(appimage, stat.S_IRWXU)
              subprocess.run([appimage, "--appimage-extract"], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
              ver = None
              if os.path.exists("squashfs-root"):
                  for d_file in Path("squashfs-root").glob("*.desktop"):
                      txt = d_file.read_text(encoding="utf-8")
                      m = re.search(r'^X-AppImage-Version=(.+)', txt, re.M | re.I)
                      if m: ver = m.group(1).strip()
                      break
                  if ver in (None, "1.0", "1.0.0"):
                      os.system("xvfb-run -a ./squashfs-root/AppRun > /tmp/startup.log 2>&1 & sleep 5 && pkill -f AppRun || true")
                      if os.path.exists("/tmp/startup.log"):
                          log = Path("/tmp/startup.log").read_text(encoding="utf-8")
                          m = re.search(r'Root Version:\s*([0-9]+\.[0-9]+\.[0-9]+)', log, re.I)
                          if m: ver = m.group(1)
                  shutil.rmtree("squashfs-root", ignore_errors=True)
              os.remove(appimage)
              return ver

          def update_egit_commit(content, short_commit):
              if re.search(r'^EGIT_COMMIT=', content, re.MULTILINE):
                  return re.sub(r'(EGIT_COMMIT=["\']?)[a-fA-F0-9]{7,40}(["\']?)', r"\g<1>" + short_commit + r"\2", content)
              else:
                  lines = content.split('\n')
                  func_indices = [i for i, line in enumerate(lines) if re.match(r'^\w+\s*\(\)\s*{', line)]
                  if func_indices:
                      insert_idx = func_indices[0]
                      lines.insert(insert_idx, f'EGIT_COMMIT="{short_commit}"')
                  else:
                      lines.append(f'EGIT_COMMIT="{short_commit}"')
                  return '\n'.join(lines)

          for ebuild_path in Path('.').rglob('*.ebuild'):
              if 'cache' in ebuild_path.parts or 'job_out' in ebuild_path.parts: continue
              pkg_dir = ebuild_path.parent
              *parent_parts, cat_name, pkg_name = pkg_dir.parts
              pkg_cat_name = f"{cat_name}/{pkg_name}"
              
              content = ebuild_path.read_text(encoding="utf-8")
              is_live = ebuild_path.name.endswith('-9999.ebuild') or 'git-r3' in content
              
              if pkg_name == "rootapp-bin":
                  new_ver = get_rootapp_version()
                  if new_ver:
                      curr_ver_m = re.search(rf'/{pkg_name}-(\d+(?:\.\d+)*(?:_(?:alpha|beta|pre|rc|p)\d*)?(?:-r\d+)?)\.ebuild$', str(ebuild_path))
                      curr_ver = curr_ver_m.group(1) if curr_ver_m else None
                      if curr_ver and new_ver != curr_ver:
                          new_path = pkg_dir / f"{pkg_name}-{new_ver}.ebuild"
                          ebuild_path.rename(new_path)
                          updated_atoms.add(pkg_cat_name)
                  continue

              repo_m = re.search(r'https://github\.com/([A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+?)(?:\.git|/archive|/releases|/tarball|["\s])', content)
              if not repo_m: continue
              repo = repo_m.group(1).rstrip('.')

              if is_live:
                  repo_url = f"https://github.com/{repo}.git"
                  new_commit = get_latest_commit(repo_url)
                  if new_commit:
                      new_content = content
                      short_commit = new_commit[:12]
                      new_content = update_egit_commit(new_content, short_commit)
                      if "_commit=" in new_content:
                          new_content = re.sub(r'(_commit=["\']?)[a-fA-F0-9]{7,40}(["\']?)', r"\g<1>" + new_commit + r"\2", new_content)

                      if new_content != content:
                          ebuild_path.write_text(new_content, encoding="utf-8")
                          updated_atoms.add(pkg_cat_name)
              else:
                  curr_ver_m = re.search(rf'/{pkg_name}-(\d+(?:\.\d+)*(?:_(?:alpha|beta|pre|rc|p)\d*)?(?:-r\d+)?)\.ebuild$', str(ebuild_path))
                  if not curr_ver_m: continue
                  curr_ver = curr_ver_m.group(1)
                  
                  latest_ver = get_latest_github_release(repo)
                  if latest_ver:
                      if pkg_name == "mangowc" and latest_ver.startswith("12."): latest_ver = "0." + latest_ver
                      try: is_newer = parse_version(latest_ver) > parse_version(curr_ver)
                      except: is_newer = (latest_ver != curr_ver)
                      
                      if is_newer:
                          new_path = pkg_dir / f"{pkg_name}-{latest_ver}.ebuild"
                          ebuild_path.rename(new_path)
                          updated_atoms.add(pkg_cat_name)

          changed_list = sorted(updated_atoms)
          if changed_list:
              Path('changed_packages.txt').write_text('\n'.join(changed_list) + '\n', encoding="utf-8")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"changed_packages={'true' if changed_list else 'false'}\n")
          EOF

      - name: Regenerate Manifests for Updated Ebuilds
        if: steps.scan.outputs.changed_packages == 'true'
        run: |
          if [ -s changed_packages.txt ]; then
            echo ">>> Regenerating Manifests..."
            cat > manifest_script.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail
          mkdir -p /etc/portage/repos.conf /overlay/distfiles /var/db/repos/gentoo
          cat >> /etc/portage/make.conf << 'MAKECONF'
          FEATURES="-userfetch -userpriv -usersandbox -ipc-sandbox -network-sandbox -pid-sandbox"
          DISTDIR="/overlay/distfiles"
          MAKECONF
          emerge-webrsync -q
          cat > /etc/portage/repos.conf/gentoo-nexus.conf << 'REPOCONF'
          [gentoo-nexus]
          location = /overlay
          masters = gentoo
          REPOCONF
          for pkg_dir in $(cat /overlay/changed_packages.txt); do
            if [ -d "/overlay/$pkg_dir" ]; then
              cd "/overlay/$pkg_dir"
              ebuild $(ls -1v *.ebuild | tail -n 1) manifest || true
            fi
          done
          EOF
            chmod +x manifest_script.sh
            docker run --rm -v "${{ github.workspace }}:/overlay" gentoo/stage3:amd64-desktop-openrc bash /overlay/manifest_script.sh
          fi

      - name: Commit and Push Changes
        if: steps.scan.outputs.changed_packages == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "auto-update: ebuild refresh $(date -u '+%Y-%m-%d')"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin HEAD:"${GITHUB_REF_NAME}"
          fi

      - name: Trigger Build Workflow (Relay Race)
        if: steps.scan.outputs.changed_packages == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGED=$(cat changed_packages.txt)
          echo "Packages to build: $CHANGED"
          gh workflow run "Gentoo Build Relay" \
            --ref "${GITHUB_REF_NAME}" \
            -f package_list="$CHANGED"
