name: Gentoo Check Updates

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: gentoo-check-updates-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  check-updates:
    name: Scan & Update Ebuilds
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests packaging

      - name: Phase 1 - Scan Local Ebuilds & Bump Versions
        id: scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import os, re, requests, subprocess, stat, shutil
          from pathlib import Path
          from packaging.version import parse as parse_version

          updated_atoms = set()
          gh_token = os.environ.get('GITHUB_TOKEN')
          hdrs = {"Authorization": f"token {gh_token}"} if gh_token else {}

          def get_latest_github_release(repo):
              try:
                  r = requests.get(f"https://api.github.com/repos/{repo}/releases/latest", headers=hdrs, timeout=15)
                  if r.status_code == 200:
                      tag = r.json().get("tag_name", "").lstrip("v")
                      if tag and re.match(r'^[0-9]', tag): return tag
                  r2 = requests.get(f"https://api.github.com/repos/{repo}/tags", headers=hdrs, timeout=15)
                  if r2.status_code == 200:
                      for tag in r2.json():
                          name = tag.get("name", "").lstrip("v")
                          if re.match(r'^[0-9]', name): return name
              except Exception: pass
              return None

          def get_latest_commit(repo_url):
              try:
                  out = subprocess.check_output(["git", "ls-remote", repo_url, "HEAD"], timeout=30, stderr=subprocess.DEVNULL).decode()
                  m = re.search(r"([a-f0-9]{40})", out)
                  if m: return m.group(1)[:12]
              except Exception: pass
              return None

          for ebuild_path in Path('.').rglob('*.ebuild'):
              if 'cache' in ebuild_path.parts or 'job_out' in ebuild_path.parts: continue
              pkg_dir = ebuild_path.parent
              *parent_parts, cat_name, pkg_name = pkg_dir.parts
              pkg_cat_name = f"{cat_name}/{pkg_name}"

              content = ebuild_path.read_text(encoding="utf-8")
              is_live = ebuild_path.name.endswith('-9999.ebuild') or 'git-r3' in content

              repo_m = re.search(r'https://github\.com/([A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+?)(?:\.git|/archive|/releases|/tarball|["\s])', content)
              if not repo_m: continue
              repo = repo_m.group(1).rstrip('.')

              if is_live:
                  repo_url = f"https://github.com/{repo}.git"
                  new_commit = get_latest_commit(repo_url)
                  if new_commit:
                      new_content = content
                      if re.search(r'^EGIT_COMMIT=', new_content, re.MULTILINE):
                          new_content = re.sub(r'(EGIT_COMMIT=["\']?)[a-fA-F0-9]{7,40}(["\']?)', r"\g<1>" + new_commit + r"\2", new_content)
                      if new_content != content:
                          ebuild_path.write_text(new_content, encoding="utf-8")
                          updated_atoms.add(pkg_cat_name)
              else:
                  curr_ver_m = re.search(rf'/{pkg_name}-(\d+(?:\.\d+)*(?:_(?:alpha|beta|pre|rc|p)\d*)?(?:-r\d+)?)\.ebuild$', str(ebuild_path))
                  if not curr_ver_m: continue
                  curr_ver = curr_ver_m.group(1)

                  latest_ver = get_latest_github_release(repo)
                  if latest_ver:
                      if pkg_name == "mangowc" and latest_ver.startswith("12."): latest_ver = "0." + latest_ver
                      try: is_newer = parse_version(latest_ver) > parse_version(curr_ver)
                      except: is_newer = (latest_ver != curr_ver)

                      if is_newer:
                          new_path = pkg_dir / f"{pkg_name}-{latest_ver}.ebuild"
                          ebuild_path.rename(new_path)
                          updated_atoms.add(pkg_cat_name)

          changed_list = sorted(updated_atoms)
          if changed_list:
              Path('changed_packages.txt').write_text('\n'.join(changed_list) + '\n', encoding="utf-8")
          EOF

      - name: Phase 2 - Commit and Push Updates
        run: |
          if [ -f changed_packages.txt ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            if ! git diff --cached --quiet; then
              git commit -m "auto-update: ebuild refresh $(date -u '+%Y-%m-%d')"
              git pull --rebase origin ${{ github.ref_name }}
              git push origin HEAD:${{ github.ref_name }}
            fi
          fi

      - name: Phase 3 - Resolve Latest State via Portage
        run: |
          cat > resolve_state.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail
          
          echo ">>> Setting up minimal Portage to query Gentoo Tree..."
          mkdir -p /etc/portage/repos.conf /var/db/repos/{gentoo,steam-overlay} /etc/portage/package.accept_keywords
          cat > /etc/portage/make.conf << 'MAKECONF'
          ACCEPT_KEYWORDS="~amd64"
          MAKECONF
          
          emerge-webrsync -q
          
          git clone --depth 1 https://github.com/anyc/steam-overlay.git /var/db/repos/steam-overlay 2>/dev/null
          cat > /etc/portage/repos.conf/steam-overlay.conf << 'REPOEOF'
          [steam-overlay]
          location = /var/db/repos/steam-overlay
          masters = gentoo
          priority = 50
          REPOEOF
          
          cat > /etc/portage/repos.conf/gentoo-nexus.conf << 'REPOEOF'
          [gentoo-nexus]
          location = /overlay
          masters = gentoo
          priority = 9999
          REPOEOF
          
          # Exact keyword masks required to see the latest upstream versions
          cat > /etc/portage/package.accept_keywords/nexus << 'KEYW'
          media-libs/mesa ~amd64
          media-libs/vulkan-loader ~amd64
          dev-util/mesa_clc ~amd64
          dev-util/spirv-tools ~amd64
          dev-util/spirv-headers ~amd64
          dev-util/vulkan-headers ~amd64
          dev-util/glslang ~amd64
          dev-util/vulkan-utility-libraries ~amd64
          sys-kernel/gentoo-kernel ~amd64
          sys-kernel/linux-firmware ~amd64
          virtual/dist-kernel ~amd64
          KEYW
          
          # 1. Gather all local custom packages
          LOCAL_PKGS=$(find /overlay -mindepth 2 -maxdepth 3 -name "*.ebuild" | awk -F/ '{print $(NF-2)"/"$(NF-1)}' | sed 's/\.ebuild$//' | sed -E 's/-[0-9]+(\.[0-9]+)*(_[a-z0-9]+)?(-r[0-9]+)?$//' | sort -u || true)
          
          # 2. Hardcoded Upstream Tracking List
          UPSTREAM_PKGS="media-libs/mesa media-libs/vulkan-loader dev-util/mesa_clc dev-util/spirv-tools dev-util/spirv-headers dev-util/vulkan-headers dev-util/glslang dev-util/vulkan-utility-libraries sys-kernel/gentoo-kernel sys-kernel/linux-firmware virtual/dist-kernel games-util/steam-launcher"
          
          > /overlay/desired_state.txt
          echo ">>> Querying Portage for exact latest versions..."
          for pkg in $LOCAL_PKGS $UPSTREAM_PKGS; do
             # Portage outputs exact CPV (e.g. media-libs/mesa-24.0.5)
             RES=$(emerge -pqO "$pkg" 2>/dev/null | grep -oP '(?<=\] )[^ ]+' || true)
             if [ -n "$RES" ]; then
               echo "$RES" >> /overlay/desired_state.txt
             fi
          done
          EOF
          chmod +x resolve_state.sh
          docker run --rm -v "${{ github.workspace }}:/overlay" gentoo/stage3:amd64-desktop-openrc bash /overlay/resolve_state.sh

      - name: Phase 4 - Binhost Audit (Zero-Compile Check)
        id: audit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo ">>> Auditing Desired State against GitHub Releases..."
          EXISTING_ASSETS=$(gh api "/repos/$REPO/releases/tags/rolling" --jq '.assets[].name' 2>/dev/null || echo "")
          
          CHANGED=""
          [ -f changed_packages.txt ] && CHANGED=$(cat changed_packages.txt)
          
          > packages_to_build.txt
          FORCE_REQUIRED="false"
          
          while IFS= read -r CPV; do
             [ -z "$CPV" ] && continue
             PN_PV="${CPV#*/}"
             # Extract raw package name (e.g. gui-wm/niri) from CPV (gui-wm/niri-9999)
             ATOM=$(echo "$CPV" | sed -E 's/-[0-9]+(\.[0-9]+)*(_[a-z0-9]+)?(-r[0-9]+)?$//')
             
             FORCE_THIS=false
             if echo "$CHANGED" | grep -q "^${ATOM}$"; then
                FORCE_THIS=true
                FORCE_REQUIRED="true"
             fi
             
             if [ "$FORCE_THIS" == "true" ]; then
                echo "⚠️ $ATOM changed in Git. Queuing force build: =$CPV"
                echo "=$CPV" >> packages_to_build.txt
             # Check if Release has PN_PV-*.gpkg.tar (e.g. mesa-24.0.5-1.gpkg.tar)
             elif ! echo "$EXISTING_ASSETS" | grep -q "^${PN_PV}-.*\.gpkg\.tar$"; then
                echo "✗ Missing binary. Queuing build: =$CPV"
                echo "=$CPV" >> packages_to_build.txt
             else
                echo "✓ Existing binary found for $CPV."
             fi
          done < desired_state.txt
          
          BUILD_LIST=$(tr '\n' ' ' < packages_to_build.txt | xargs)
          echo "build_list=$BUILD_LIST" >> "$GITHUB_OUTPUT"
          echo "force_required=$FORCE_REQUIRED" >> "$GITHUB_OUTPUT"

      - name: Phase 5 - Trigger Relay Race
        if: steps.audit.outputs.build_list != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Same priority queuing logic from Void
          PRIORITY_ORDER=(
            "gui-libs/scenefx"
            "gui-apps/quickshell"
            "gui-apps/noctalia-qs"
            "x11-misc/matugen"
            "gui-wm/niri"
            "gui-wm/mangowc"
            "gui-wm/noctalia-shell"
            "gui-wm/dank-material-shell"
            "sys-apps/danksearch"
            "x11-base/xwayland-satellite"
          )
          
          RAW_LIST="${{ steps.audit.outputs.build_list }}"
          ORDERED=()
          
          for priority_pkg in "${PRIORITY_ORDER[@]}"; do
            for exact_pkg in $RAW_LIST; do
              if echo "$exact_pkg" | grep -q "$priority_pkg"; then
                ORDERED+=("$exact_pkg")
              fi
            done
          done
          
          for exact_pkg in $RAW_LIST; do
            already=false
            for p in "${ORDERED[@]}"; do
              if [ "$p" == "$exact_pkg" ]; then already=true; break; fi
            done
            if [ "$already" = false ]; then ORDERED+=("$exact_pkg"); fi
          done
          
          FINAL_LIST="${ORDERED[*]}"
          echo ">>> Starting Relay Race with: $FINAL_LIST"
          
          gh workflow run "Gentoo Build Relay" \
            --ref "${GITHUB_REF_NAME}" \
            -f package_list="$FINAL_LIST" \
            -f force_rebuild="${{ steps.audit.outputs.force_required }}"
