name: Build Relay

on:
  workflow_dispatch:
    inputs:
      package_list:
        description: 'Space-separated package atoms to compile'
        required: true
      force_rebuild:
        description: 'Packages to force rebuild (or "true" for all)'
        type: string
        required: false
        default: ""

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 360
    outputs:
      remaining: ${{ steps.queue.outputs.REMAINING_PKGS }}
      force_rebuild: ${{ github.event.inputs.force_rebuild }}
    steps:

      # ---- topic: environment-setup ----
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Allocate ZRAM Swap
        run: |
          sudo modprobe zram 2>/dev/null || { echo "ZRAM not available, skipping"; free -h; exit 0; }
          sudo zramctl --find --size 12G --algorithm lz4
          sudo mkswap /dev/zram0
          sudo swapon /dev/zram0 --priority 100
          free -h

      - name: Free Disk Space for Docker
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          df -h /

      # ---- topic: ccache ----
      - name: Persistent CCache Setup
        uses: actions/cache@v5
        with:
          path: ccache
          key: gentoo-ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            gentoo-ccache-${{ runner.os }}-

      # ---- topic: workspace-overlay ----
      - name: Prepare Workspace & Overlay
        run: |
          mkdir -p binpkgs overlay/metadata overlay/profiles distfiles ccache
          chmod -R 777 binpkgs overlay distfiles ccache
          rsync -a --exclude='.git' --exclude='binpkgs' --exclude='overlay' ./ overlay/
          printf 'masters = gentoo\nthin-manifests = true\nsign-manifests = false\nmanifest-required-hashes = BLAKE2B SHA512\ncache-formats = md5-dict\nprofile-formats = portage-2\n' > overlay/metadata/layout.conf
          echo "gentoo-nexus" > overlay/profiles/repo_name

      - name: Download Release Binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo ">>> Downloading existing .gpkg.tar and Packages from rolling release..."
          gh release download rolling \
            -p "*.gpkg.tar" -p "Packages*" \
            --repo ${{ github.repository }} \
            --dir binpkgs --clobber 2>/dev/null || true

          for f in binpkgs/*.gpkg.tar; do
            [ -e "$f" ] || continue
            if ! tar -tf "$f" >/dev/null 2>&1; then
              rm -f "$f"
            fi
          done

      - name: Restore GPKG Layout using Portage Tree Mapping
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/binpkgs:/var/cache/binpkgs:rw" \
            -v "${{ github.workspace }}:/var/db/repos/gentoo-nexus:ro" \
            gentoo/stage3:amd64-desktop-openrc \
            python3 -c "
          import os, shutil, re
          from portage.versions import pkgsplit

          pkgdir = '/var/cache/binpkgs'
          os.makedirs('/var/db/repos/gentoo', exist_ok=True)

          # Try emerge-webrsync; fallback gracefully if it fails
          ret = os.system('emerge-webrsync -q 2>/dev/null')
          if ret != 0:
              ret = os.system('emerge-webrsync 2>/dev/null')

          repos = ['/var/db/repos/gentoo-nexus', '/var/db/repos/gentoo']
          pn_to_cat = {}

          skip_top = {'metadata', 'profiles', 'eclass', 'scripts', 'binpkgs', 'distfiles', 'ccache', '.github'}
          for repo in repos:
              if not os.path.exists(repo): continue
              for cat in os.listdir(repo):
                  if cat.startswith('.') or cat in skip_top: continue
                  cat_path = os.path.join(repo, cat)
                  if not os.path.isdir(cat_path): continue
                  for pn in os.listdir(cat_path):
                      if pn not in pn_to_cat:
                          pn_to_cat[pn] = cat

          # Fallback: parse Packages file for pn_to_cat (for any pn still missing)
          packages_file = os.path.join(pkgdir, 'Packages')
          if os.path.exists(packages_file):
              with open(packages_file) as f:
                  for line in f:
                      if line.startswith('CPV: '):
                          cpv = line[5:].strip()
                          if '/' in cpv:
                              cat, pn_version = cpv.split('/', 1)
                              split = pkgsplit(pn_version)
                              if split:
                                  pn, _, _ = split
                                  if pn not in pn_to_cat:
                                      pn_to_cat[pn] = cat

          for f in os.listdir(pkgdir):
              if not f.endswith('.gpkg.tar'): continue
              path = os.path.join(pkgdir, f)
              base = re.sub(r'-\d+$', '', f.replace('.gpkg.tar', ''))
              split_res = pkgsplit(base)
              if not split_res: split_res = pkgsplit(f.replace('.gpkg.tar', ''))

              if split_res:
                  pn, pvr, rev = split_res
                  if pn in pn_to_cat:
                      cat = pn_to_cat[pn]
                      target_dir = os.path.join(pkgdir, cat, pn)
                      target_path = os.path.join(target_dir, f)
                      if path != target_path:
                          os.makedirs(target_dir, exist_ok=True)
                          shutil.move(path, target_path)
          "

      - name: Fix Workspace Permissions
        run: sudo chown -R "$(id -u):$(id -g)" "${{ github.workspace }}"

      # ---- topic: queue-and-build-script ----
      - name: Parse Queue & Normalize Targets
        id: queue
        run: |
          raw_input="${{ github.event.inputs.package_list }}"
          read -r -a RAW_PKGS <<< "$raw_input"

          normalize_target() {
            local t="$1"
            if [[ "$t" == https://gitweb.gentoo.org/*/tree/* ]]; then
              echo "$t" | sed -E 's|.*/tree/([^/]+)/([^/]+)/\2-([^/]+)\.ebuild$|=\1/\2-\3|'
              return
            fi
            if [[ "$t" == =* ]]; then echo "$t"; return; fi
            if echo "$t" | grep -qE '^[a-z][a-z0-9_+-]+/[a-zA-Z0-9_+.-]+-[0-9]'; then
              echo "=${t}"; return
            fi
            echo "$t"
          }

          NORMALIZED=()
          for raw in "${RAW_PKGS[@]}"; do
            NORMALIZED+=("$(normalize_target "$raw")")
          done

          TARGET="${NORMALIZED:-}"
          REMAINING="${NORMALIZED[*]:1}"

          echo "TARGET_PKG=$TARGET" >> "$GITHUB_OUTPUT"
          echo "REMAINING_PKGS=$REMAINING" >> "$GITHUB_OUTPUT"

          if [ -z "$TARGET" ]; then
            echo "skip_compile=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CPV="${TARGET#=}"
          echo "CPV=[${CPV}]"

          if [[ "$CPV" == *"-9999" ]] || [[ "$TARGET" != =* ]]; then
            echo ">>> Live ebuild or unversioned — skip_compile=false"
            echo "skip_compile=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          FORCE="${{ github.event.inputs.force_rebuild }}"
          echo "FORCE=[${FORCE}]"
          if [[ "$FORCE" == "true" ]]; then
            echo ">>> FORCE=true — skip_compile=false"
            echo "skip_compile=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          for atom in $FORCE; do
            atom="${atom#=}"
            if [[ "$CPV" == "$atom"* ]]; then
              echo ">>> FORCE atom [${atom}] matches CPV — skip_compile=false"
              echo "skip_compile=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          IN_PACKAGES=false
          if grep -qF "CPV: ${CPV}" binpkgs/Packages 2>/dev/null; then
            IN_PACKAGES=true
            echo ">>> CPV ${CPV} FOUND in binpkgs/Packages"
          else
            echo ">>> CPV ${CPV} NOT found in binpkgs/Packages"
          fi

          PN="${CPV%%-*}"
          GPKG_EXISTS=false
          GPKG_PATH=$(find binpkgs -name "${PN}-[0-9]*.gpkg.tar" -print -quit 2>/dev/null || true)
          if [ -n "$GPKG_PATH" ]; then
            GPKG_EXISTS=true
            echo ">>> Found .gpkg.tar: ${GPKG_PATH}"
          else
            echo ">>> No .gpkg.tar found for ${PN}"
          fi

          if [[ "$IN_PACKAGES" == "true" && "$GPKG_EXISTS" == "true" ]]; then
            echo ">>> Both Packages and .gpkg.tar exist — skip_compile=true"
            echo "skip_compile=true" >> "$GITHUB_OUTPUT"
          else
            echo ">>> Package missing (Packages=$IN_PACKAGES, gpkg=$GPKG_EXISTS) — skip_compile=false"
            echo "skip_compile=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write Monolithic Docker Build Script
        if: steps.queue.outputs.skip_compile != 'true'
        run: |
          cat > build.sh << 'BUILDSCRIPT'
          #!/bin/bash
          set -euo pipefail

          RAW_TARGET="$1"
          FORCE="${2:-}"

          echo ">>> Syncing Gentoo ebuild repository..."
          mkdir -p /var/db/repos/gentoo /etc/portage/repos.conf
          emerge-webrsync -q

          eselect profile set default/linux/amd64/23.0/desktop/gnome 2>/dev/null || \
            eselect profile list 2>/dev/null | grep -m1 desktop | awk '{print $1}' | tr -d '[]' | xargs -r eselect profile set || \
            eselect profile set 1

          getuto 2>/dev/null || emerge -q --oneshot app-crypt/gentoo-keys 2>/dev/null || true

          cat > /etc/portage/make.conf << 'MAKECONF'
          COMMON_FLAGS="-O2 -pipe -march=x86-64-v3"
          CFLAGS="${COMMON_FLAGS}"
          CXXFLAGS="${COMMON_FLAGS}"
          FCFLAGS="${COMMON_FLAGS}"
          FFLAGS="${COMMON_FLAGS}"
          VIDEO_CARDS="amdgpu radeonsi"
          CPU_FLAGS_X86="avx avx2 f16c fma3 mmx mmxext popcnt sse sse2 sse3 sse4_1 sse4_2 ssse3"
          # USE flags are inherited from the selected desktop/gnome profile.
          # The official Gentoo x86-64-v3 binhost sets NO custom global USE (only
          # profile defaults + */* CPU_FLAGS_X86), so we match it here for binary
          # compatibility. ffmpeg codec flags are set per-package in package.use below.
          
          FEATURES="getbinpkg buildpkg ccache binpkg-ignore-signature -sandbox -usersandbox -ipc-sandbox -network-sandbox -pid-sandbox"
          CCACHE_DIR="/var/cache/ccache"
          BINPKG_FORMAT="gpkg"
          PKGDIR="/var/cache/binpkgs"
          DISTDIR="/var/cache/distfiles"
          
          ACCEPT_LICENSE="*"
          ACCEPT_KEYWORDS="~amd64"
          ACCEPT_PROPERTIES="*"
          ACCEPT_RESTRICT="*"
          ACCEPT_CHOSTS="x86_64-pc-linux-gnu"
          CONFIG_PROTECT_MASK="/etc"
          EMERGE_DEFAULT_OPTS="--usepkg --getbinpkg --buildpkg --binpkg-respect-use=y --jobs=4 --load-average=4 --keep-going"
          MAKEOPTS="-j4"
          LC_MESSAGES=C.UTF-8
          PORTAGE_BINPKG_TAR_OPTS="--warning=no-unknown-keyword"
          MAKECONF

          cat > /etc/portage/repos.conf/gentoo-nexus.conf << 'REPO'
          [gentoo-nexus]
          location = /var/db/repos/gentoo-nexus
          masters = gentoo
          priority = 9999
          auto-sync = no
          REPO

          echo ">>> Updating Portage to latest version..."
          emaint binhost --fix
          FEATURES="-getbinpkg" emerge --oneshot --usepkg sys-apps/portage
          quickpkg sys-apps/portage 2>/dev/null || true

          echo ">>> Installing ccache..."
          FEATURES="-getbinpkg" emerge --oneshot --usepkg dev-util/ccache 2>/dev/null || true

          echo ">>> Creating dummy kernel config for ebuild kernel-option checks..."
          mkdir -p /usr/src/linux
          cat > /usr/src/linux/.config << 'KCONFIG'
          CONFIG_FB=y
          CONFIG_FB_RADEON=m
          CONFIG_DRM_RADEON_UMS=m
          CONFIG_DRM_RADEON=y
          KCONFIG

          mkdir -p /etc/portage/binrepos.conf
          cat > /etc/portage/binrepos.conf/gentoo-official.conf << 'BINHOST'
          [nexus]
          priority = 10
          sync-uri = https://github.com/Ackerman-00/gentoo-nexus/releases/download/rolling/
          location = /var/cache/binhost/nexus
          verify-signature = false

          [gentoo-official-v3]
          priority = 5
          sync-uri = https://distfiles.gentoo.org/releases/amd64/binpackages/23.0/x86-64-v3/
          location = /var/cache/binhost/gentoo-official-v3
          verify-signature = true
          BINHOST

          # Portage >=3.0.81 ships a default [gentoo] binrepo at
          # /usr/share/portage/config/binrepos.conf/gentoo.conf with
          # x86-64 paths. Override it here (higher priority dir) to
          # use x86-64-v3 instead of deleting the shipped file.
          cat > /etc/portage/binrepos.conf/gentoo.conf << 'BINHOST'
          [gentoo]
          priority = 0
          sync-uri = https://distfiles.gentoo.org/releases/amd64/binpackages/23.0/x86-64-v3/
          location = /var/cache/binhost/gentoo-official-v3
          verify-signature = true
          BINHOST

          mkdir -p /etc/portage/package.accept_keywords
          echo '*/*::gentoo-nexus **' > /etc/portage/package.accept_keywords/nexus
          echo 'net-libs/webkit-gtk -~amd64 amd64' > /etc/portage/package.accept_keywords/stable-binary

          mkdir -p /etc/portage/package.use
          cat > /etc/portage/package.use/nexus << 'USES'
          media-libs/opus abi_x86_64
          gui-libs/gtk introspection
          sys-auth/seatd builtin server
          sys-kernel/installkernel dracut
          sys-kernel/linux-firmware redistributable initramfs compress-zstd
          sys-libs/minizip-ng compat
          sys-apps/dbus -systemd elogind
          media-video/pipewire -systemd elogind -ffmpeg
          dev-libs/libdbusmenu gtk3
          net-misc/networkmanager -modemmanager -bluetooth
          sys-libs/ncurses -gpm
          sys-libs/zlib-ng abi_x86_32 abi_x86_64 compat
          x11-libs/libdrm video_cards_amdgpu video_cards_intel video_cards_radeon
          media-libs/mesa -rust -opencl proprietary-codecs lm-sensors
          media-video/ffmpeg x264 x265 vpx opus dav1d vaapi vdpau
          */* VIDEO_CARDS: -* amdgpu radeonsi
          USES

          cat > /etc/portage/package.use/gaming << 'GAMING'
          virtual/libelf abi_x86_32
          dev-libs/elfutils abi_x86_32
          llvm-core/llvm -xml abi_x86_32
          llvm-runtimes/compiler-rt abi_x86_32
          media-libs/mesa abi_x86_32
          sys-apps/lm-sensors abi_x86_32
          media-libs/vulkan-loader abi_x86_32
          media-libs/alsa-lib abi_x86_32
          media-libs/libglvnd abi_x86_32 X
          x11-libs/libX11 abi_x86_32
          x11-libs/libxcb abi_x86_32
          x11-libs/libXext abi_x86_32
          x11-libs/libdrm abi_x86_32
          dev-libs/expat abi_x86_32
          dev-util/spirv-tools abi_x86_32
          virtual/opengl abi_x86_32
          virtual/zlib abi_x86_32
          sys-libs/zlib abi_x86_32
          app-arch/zstd abi_x86_32
          dev-libs/icu abi_x86_32
          dev-libs/libffi abi_x86_32
          dev-libs/libxml2 abi_x86_32
          x11-libs/libXau abi_x86_32
          x11-libs/libXdmcp abi_x86_32
          x11-libs/libXfixes abi_x86_32
          x11-libs/libXrandr abi_x86_32
          x11-libs/libXrender abi_x86_32
          x11-libs/libXxf86vm abi_x86_32
          x11-libs/libpciaccess abi_x86_32
          x11-libs/libxshmfence abi_x86_32
          x11-libs/xcb-util-keysyms abi_x86_32
          dev-libs/wayland abi_x86_32
          media-libs/libva abi_x86_32
          media-libs/libdisplay-info abi_x86_32
          llvm-core/clang abi_x86_32
          app-arch/bzip2 abi_x86_32
          app-arch/xz-utils abi_x86_32
          media-libs/freetype brotli
          dev-util/sysprof-capture abi_x86_32
          GAMING

          mkdir -p /etc/portage/package.mask
          echo '>=dev-libs/libgit2-1.9.3' > /etc/portage/package.mask/libgit2

          emaint binhost --fix

          while IFS= read -r -d '' ebuild_file; do
              ebuild "$ebuild_file" manifest >/dev/null 2>&1 || true
          done < <(find /var/db/repos/gentoo-nexus -mindepth 2 -maxdepth 3 -name "*.ebuild" -print0)

          TARGET="$RAW_TARGET"
          if [[ "$TARGET" != =* && "$TARGET" != *"-9999" ]]; then
            RESOLVED=$(portageq best_visible / "$TARGET" 2>/dev/null || true)
            if [ -n "$RESOLVED" ] && [[ "$RESOLVED" == */* ]]; then
              TARGET="=${RESOLVED}"
            fi
          fi

          emerge --oneshot --getbinpkg --backtrack=30 --quiet-build=y '>=dev-libs/gobject-introspection-1.86.0' 2>/dev/null || true

          # Pre-build sysprof-capture with abi_x86_32 when building mesa.
          # Must run BEFORE gdbus-codegen emerge, which pulls sysprof-capture
          # in as a glib dependency — otherwise the official binhost's binary
          # (without abi_x86_32) gets cached and our rebuild attempt fails.
          if echo "${TARGET}" | grep -qE "media-libs/mesa"; then
              echo ">>> Pre-building sysprof-capture with abi_x86_32 for mesa..."
              emerge --oneshot --buildpkg --getbinpkg=n --usepkg=n \
                  --backtrack=30 --quiet-build=y \
                  "dev-util/sysprof-capture" 2>/dev/null || true
          fi

          emerge --oneshot --getbinpkg --backtrack=30 --quiet-build=y '>=dev-util/gdbus-codegen-2.88.1' 2>/dev/null || true

          if echo "${TARGET}" | grep -qE "media-libs/mesa|media-libs/libsdl2|media-video/ffmpeg|media-video/pipewire|x11-libs/gtk|gui-libs/libdecor|gui-wm/"; then
              emerge --oneshot --getbinpkg --backtrack=30 --quiet-build=y "dev-libs/wayland" "dev-util/wayland-scanner" 2>/dev/null || {
                  emerge --oneshot --usepkg --getbinpkg --buildpkg --backtrack=30 --quiet-build=y "dev-libs/wayland" "dev-util/wayland-scanner" || true
              }
          fi

          # Pre-build xbitmaps from source (binary from official binhost can
          # spuriously fail, cascading to drop xorg-server and drivers).
          # Always run because transitive deps (e.g. media-gfx/blender-bin
          # pulling xorg-server) are not caught by a TARGET-based grep.
          emerge --oneshot --buildpkg --getbinpkg=n --usepkg=n \
              --backtrack=30 --quiet-build=y \
              "x11-misc/xbitmaps" 2>/dev/null || true

          set +e
          touch /var/cache/binpkgs/.build_start

          FORCE_MATCH="false"
          if [[ "$FORCE" == "true" ]]; then
            FORCE_MATCH="true"
          else
            for fatom in $FORCE; do
              fatom="${fatom#=}"
              if [[ "${TARGET#=}" == "$fatom"* ]]; then
                FORCE_MATCH="true"
                break
              fi
            done
          fi

          CPV="${TARGET#=}"
          PN=$(echo "$CPV" | sed -E 's/-[0-9].*//')
          if [[ "$FORCE_MATCH" == "true" ]]; then
            # Force rebuild: build the TARGET from SOURCE so new flags (e.g.
            # VIDEO_CARDS) take effect, while dependencies are still fetched as
            # binaries via --getbinpkg. --usepkg-exclude takes a package NAME
            # (not a versioned atom) and stops Portage reusing the target binary.
            echo ">>> FORCE REBUILD: compiling ${TARGET} from source (deps from binpkg)"
            emerge --oneshot --getbinpkg --buildpkg --usepkg-exclude "$PN" \
              --binpkg-respect-use=y --quiet-build=y --keep-going \
              --autounmask=n \
              "${TARGET}" 2>&1 | tee /tmp/emerge.log
            BUILD_EXIT=${PIPESTATUS[0]}
          else
            emerge --oneshot --usepkg --getbinpkg --buildpkg --backtrack=30 \
              --binpkg-respect-use=y --quiet-build=y --keep-going \
              --autounmask=n \
              "${TARGET}" 2>&1 | tee /tmp/emerge.log
            BUILD_EXIT=${PIPESTATUS[0]}
          fi
          set -e

          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo ">>> BUILD FAILED with exit code $BUILD_EXIT"
            echo ">>> WARNING: emerge failed for ${TARGET}. Check logs above."
          fi

          # Force a FULL re-scan of the binary package directory. With the
          # pkgdir-index-trusted FEATURE (set in the profile), emaint otherwise
          # trusts the downloaded Packages index and silently drops any CPV
          # whose .gpkg.tar is present but not already indexed -- causing the
          # reconcile step to re-add the same "missing" entries every run.
          rm -f /var/cache/binpkgs/Packages /var/cache/binpkgs/Packages.gz
          emaint binhost --fix
          BUILDSCRIPT

          chmod +x build.sh
          echo "TARGET=${{ steps.queue.outputs.TARGET_PKG }}" >> "$GITHUB_ENV"
          echo "FORCE_REBUILD=${{ github.event.inputs.force_rebuild }}" >> "$GITHUB_ENV"

      # ---- topic: docker-build ----
      - name: Build Package in Docker
        if: steps.queue.outputs.skip_compile != 'true'
        run: |
          touch build_start_marker
          docker run --rm --privileged \
            -v "${{ github.workspace }}/binpkgs:/var/cache/binpkgs:rw" \
            -v "${{ github.workspace }}/overlay:/var/db/repos/gentoo-nexus:rw" \
            -v "${{ github.workspace }}/distfiles:/var/cache/distfiles:rw" \
            -v "${{ github.workspace }}/ccache:/var/cache/ccache:rw" \
            -v "${{ github.workspace }}/build.sh:/build.sh:ro" \
            gentoo/stage3:amd64-desktop-openrc \
            bash /build.sh "${{ env.TARGET }}" "${{ env.FORCE_REBUILD }}"

      - name: Fix Permissions Post-Build
        if: steps.queue.outputs.skip_compile != 'true'
        run: sudo chown -R "$(id -u):$(id -g)" "${{ github.workspace }}"

      - name: Reconcile Packages Index
        if: steps.queue.outputs.skip_compile != 'true'
        run: |
          python3 -m pip install --quiet zstandard 2>/dev/null || true
          python3 << 'PYEOF'
          # Reconcile the Packages index against the .gpkg.tar files on disk.
          #
          # Source of truth is the Packages index that `emaint binhost --fix`
          # regenerated inside the build container (it indexes every local
          # .gpkg.tar with correct metadata, and is already complete). We only
          # APPEND entries for .gpkg.tar files that exist on disk but are NOT
          # already in that index (e.g. files pulled from the rolling release
          # whose category/path the build-time emaint could not resolve). We
          # never rewrite existing entries, so re-running reconcile is
          # idempotent: a second run adds nothing.
          import os, re, io, tarfile, subprocess

          try:
              import zstandard
              HAVE_ZSTD = True
          except ImportError:
              HAVE_ZSTD = False

          pkgdir = 'binpkgs'
          packages_file = os.path.join(pkgdir, 'Packages')

          def _decompress(data):
              if HAVE_ZSTD:
                  return zstandard.ZstdDecompressor().decompressobj().decompress(data)
              tf = '/tmp/meta.zst'
              with open(tf, 'wb') as o:
                  o.write(data)
              raw = subprocess.check_output(['zstd', '-d', '-c', tf])
              os.unlink(tf)
              return raw

          def read_gpkg_metadata(gpkg_path):
              """Return dict of the gpkg metadata/ directory contents (CATEGORY,
              CPV, USE, BUILD_ID, BUILD_TIME, ...). Reading the metadata archive
              near the front of the container keeps this cheap."""
              try:
                  with open(gpkg_path, 'rb') as fh:
                      with tarfile.open(fileobj=fh, mode='r|') as tar:
                          for m in tar:
                              if m.name.endswith(('.tar.zst', '.tar.gz', '.tar.bz2')):
                                  if 'metadata' not in m.name:
                                      continue
                                  raw = _decompress(tar.extractfile(m).read())
                                  meta = {}
                                  with tarfile.open(fileobj=io.BytesIO(raw)) as mt:
                                      for mm in mt.getmembers():
                                          if mm.name.startswith('metadata/') and not mm.isdir():
                                              name = mm.name.split('/', 1)[1]
                                              meta[name] = mt.extractfile(mm).read().decode('utf-8', 'replace').strip()
                                  return meta
              except Exception as e:
                  print(f"  WARN: cannot read metadata from {gpkg_path}: {e}")
              return {}

          # --- Parse the (emaint-generated) Packages index as ground truth ---
          header = []
          entries = []
          if os.path.exists(packages_file):
              with open(packages_file) as f:
                  text = f.read()
              blocks = text.split('\n\n')
              header = blocks[0].splitlines() if blocks else []
              for blk in blocks[1:]:
                  d = {}
                  for line in blk.splitlines():
                      if ':' in line:
                          k, v = line.split(':', 1)
                          d[k.strip()] = v.strip()
                  if 'CPV' in d:
                      entries.append(d)

          # Index by the on-disk PATH (relative to PKGDIR). emaint already
          # records the true PATH + correct CPV for every real .gpkg.tar, so a
          # file whose PATH is present is NOT re-added -- even when the gpkg's
          # self-declared CPV (e.g. dev-ruby/rubygems) differs from the index
          # CPV (e.g. virtual/rubygems). Keying by CPV would cause phantom
          # re-adds every run; keying by PATH is exact and idempotent.
          indexed_paths = set()
          for d in entries:
              p = d.get('PATH', '')
              if p:
                  indexed_paths.add(p.replace('\\', '/'))

          # Category fallback: scan local overlay ebuild tree.
          skip_dirs = {'binpkgs', 'distfiles', 'ccache', '.git', '.github',
                       'profiles', 'metadata', 'eclass'}
          pn_to_cat = {}
          for entry in sorted(os.listdir('.')):
              if entry.startswith('.') or entry in skip_dirs:
                  continue
              cat_path = os.path.join('.', entry)
              if not os.path.isdir(cat_path):
                  continue
              for pn in os.listdir(cat_path):
                  pkg_path = os.path.join(cat_path, pn)
                  if os.path.isdir(pkg_path) and os.path.exists(os.path.join(pkg_path, pn + '.ebuild')):
                      pn_to_cat.setdefault(pn, entry)

          META_KEYS = ('BUILD_ID', 'BUILD_TIME', 'USE', 'CHOST', 'CBUILD',
                       'CFLAGS', 'CXXFLAGS', 'LDFLAGS', 'FEATURES', 'LICENSE',
                       'KEYWORDS', 'REQUIRED_USE', 'PROPERTIES', 'RESTRICT',
                       'DEFINED_PHASES', 'IUSE', 'SLOT', 'EAPI', 'REPO_REVISIONS',
                       'SIZE', 'MD5', 'SHA1', 'SHA512')

          added = 0
          for root, _dirs, files in os.walk(pkgdir):
              for f in files:
                  if not f.endswith('.gpkg.tar'):
                      continue
                  fullpath = os.path.join(root, f)
                  relpath = os.path.relpath(fullpath, pkgdir).replace('\\', '/')

                  # If emaint already indexed this exact file, keep it as-is.
                  if relpath in indexed_paths:
                      continue

                  # Genuinely missing from the index: derive CPV from the gpkg's
                  # own metadata (authoritative for the file's true category).
                  meta = read_gpkg_metadata(fullpath)
                  cpv = meta.get('CPV')
                  if not cpv:
                      base = re.sub(r'-\d+$', '', f[:-9])  # strip BUILD_ID + .gpkg.tar
                      m = re.match(r'^(.+?)-(\d[\w.*+-]*(?:-r\d+)?)$', base)
                      if not m:
                          print(f"  SKIP (unparseable): {relpath}")
                          continue
                      pn, ver = m.group(1), m.group(2)
                      cat = meta.get('CATEGORY') or pn_to_cat.get(pn)
                      if not cat:
                          print(f"  SKIP (no category): {relpath}")
                          continue
                      cpv = f"{cat}/{pn}-{ver}"

                  bid = meta.get('BUILD_ID', '')
                  block = {'CPV': cpv, 'PATH': relpath}
                  for k in META_KEYS:
                      if k in meta:
                          block[k] = meta[k]
                  if 'BUILD_ID' not in block and bid:
                      block['BUILD_ID'] = bid
                  # Ensure a BUILD_TIME exists (clients sort on it).
                  if 'BUILD_TIME' not in block:
                      try:
                          block['BUILD_TIME'] = str(int(os.path.getmtime(fullpath)))
                      except Exception:
                          pass
                  entries.append(block)
                  added += 1
                  print(f"  ADD: {cpv} (BUILD_ID={bid})  ({relpath})")

          with open(packages_file, 'w') as pkgs:
              for line in header:
                  pkgs.write(line + '\n')
              pkgs.write('\n')
              for block in entries:
                  for k, v in block.items():
                      pkgs.write(f"{k}: {v}\n")
                  pkgs.write('\n')

          if added:
              print(f">>> Reconciled Packages index: {len(entries)} entries ({added} added)")
          else:
              print(f">>> Reconciled Packages index: {len(entries)} entries (no changes)")
          PYEOF

      # ---- topic: upload ----
      - name: Upload to GitHub Release
        if: steps.queue.outputs.skip_compile != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo ">>> Ensuring rolling release exists..."
          if ! gh release view rolling --repo "$REPO" >/dev/null 2>&1; then
            for i in 1 2 3; do
              gh release create rolling \
                --repo "$REPO" \
                --title "Nexus Rolling Binaries" \
                --prerelease 2>&1 && break
              sleep 5
            done
          fi

          retry_upload() {
            for i in 1 2 3; do
              # --clobber replaces an existing asset with the same name, so the
              # Packages index is always refreshed even if the delete step missed.
              gh release upload rolling --clobber "$1" --repo "$REPO" 2>&1 && return 0
              sleep 5
            done
            return 1
          }

          # Determine which reference file to use for -newer
          if [ -f binpkgs/.build_start ]; then
            REF_FILE="binpkgs/.build_start"
          else
            REF_FILE="build_start_marker"
          fi
          echo ">>> Using reference file: $REF_FILE"

          UPLOAD_FAILED=0

          # 1. Upload newly built .gpkg.tar files first (before Packages index)
          echo ">>> Uploading new binary packages..."
          shopt -s nullglob
          while IFS= read -r -d '' file; do
            PN=$(echo "$file" | awk -F'/' '{print $3}')
            ASSET_NAME=$(basename "$file")
            echo "  Processing: $ASSET_NAME (PN=$PN)"

            # Delete old versions of the same package name
            for old_asset in $(gh release view rolling --json assets --jq '.assets[].name' --repo "$REPO" 2>/dev/null); do
              if [[ "$old_asset" == ${PN}-[0-9]*.gpkg.tar ]]; then
                echo "    Deleting old version: $old_asset"
                gh release delete-asset rolling "$old_asset" --repo "$REPO" -y 2>&1 || true
              fi
            done

            if retry_upload "$file"; then
              echo "    OK: $ASSET_NAME uploaded"
            else
              echo "    ERROR: Failed to upload $ASSET_NAME after 3 retries" >&2
              UPLOAD_FAILED=1
            fi
          done < <(find binpkgs -type f -name '*.gpkg.tar' -newer "$REF_FILE" -print0 2>/dev/null)

          # 2. Sanitize and upload Packages index last (the "commit" step)
          echo ">>> Processing Packages index..."
          for existing in Packages Packages.gz; do
            if gh release view rolling --json assets --jq '.assets[].name' --repo "$REPO" 2>/dev/null | grep -qxF "$existing"; then
              echo "  Deleting existing: $existing"
              gh release delete-asset rolling "$existing" --repo "$REPO" -y 2>&1 || true
            fi
          done
          sed -i -E \
            -e 's|^PATH: .*/([^/]+\.gpkg\.tar)$|PATH: \1|' \
            -e 's|^URI: .*/([^/]+\.gpkg\.tar)$|URI: \1|' \
            binpkgs/Packages 2>/dev/null || true

          awk '/^CPV: acct-(group|user)\//{skip=1} /^$/{if(skip){skip=0; next}} !skip' \
            binpkgs/Packages > binpkgs/Packages.tmp && mv binpkgs/Packages.tmp binpkgs/Packages 2>/dev/null || true

          rm -f binpkgs/Packages.gz
          gzip -c binpkgs/Packages 2>/dev/null > binpkgs/Packages.gz || true

          for file in binpkgs/Packages*; do
            [ -f "$file" ] || continue
            BN=$(basename "$file")
            echo "  Uploading: $BN"
            if retry_upload "$file"; then
              echo "    OK: $BN uploaded"
            else
              echo "    ERROR: Failed to upload $BN after 3 retries" >&2
              UPLOAD_FAILED=1
            fi
          done

          if [ "$UPLOAD_FAILED" -ne 0 ]; then
            echo ">>> WARNING: One or more uploads failed. The rolling release may be incomplete."
            echo ">>> Check the above logs for details."
          else
            echo ">>> All uploads completed successfully."
          fi

          # === Update commit manifest for 9999 live packages ===
          COMMITS_JSON=$(gh release download rolling -p 'commits.json' --repo "$REPO" --clobber -O /tmp/commits.json 2>/dev/null && cat /tmp/commits.json || echo '{}')
          while IFS= read -r -d '' file; do
            CAT=$(echo "$file" | awk -F'/' '{print $2}')
            PN=$(echo "$file" | awk -F'/' '{print $3}')
            ATOM="${CAT}/${PN}"
            EBUILD="overlay/${CAT}/${PN}/${PN}-9999.ebuild"
            if [ -f "$EBUILD" ]; then
              EGIT_COMMIT=$(grep -oP '^EGIT_COMMIT="\K[a-fA-F0-9]+' "$EBUILD" 2>/dev/null || true)
              if [ -n "$EGIT_COMMIT" ]; then
                COMMITS_JSON=$(echo "$COMMITS_JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); d['${ATOM}']='${EGIT_COMMIT}'; print(json.dumps(d,indent=2))")
                echo "  [*] Recorded commit ${EGIT_COMMIT} for ${ATOM}"
              fi
            fi
          done < <(find binpkgs -type f -name '*.gpkg.tar' -newer "$REF_FILE" -print0 2>/dev/null)
          echo "$COMMITS_JSON" > /tmp/commits.json
          for i in 1 2 3; do
            gh release upload rolling /tmp/commits.json --repo "$REPO" --clobber 2>&1 && { echo ">>> commits.json updated"; break; }
            sleep 3
          done

  # ---- topic: relay ----
  relay:
    if: ${{ always() && needs.build.outputs.remaining != '' }}
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - run: |
          echo ">>> Triggering relay for: ${{ needs.build.outputs.remaining }}"
          for i in 1 2 3; do
            gh workflow run "${{ github.workflow }}" \
              --ref "${{ github.ref_name }}" \
              --repo ${{ github.repository }} \
              -f package_list="${{ needs.build.outputs.remaining }}" \
              -f force_rebuild="${{ needs.build.outputs.force_rebuild }}" && exit 0
            sleep 10
          done
          exit 1
