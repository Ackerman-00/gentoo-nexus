name: Check All Updates

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: check-updates-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests packaging

      - name: 1. Auto-Heal & Upstream Version Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 🚀 DYNAMIC FIREWALL: Automatically patch ALL ebuilds in your repo safely
          find . -path ./cache -prune -o -type f -name '*.ebuild' -exec sed -i 's/LLVM_COMPAT=( {18..21} )/LLVM_COMPAT=( {18..22} )/g' {} + || true
          find . -path ./cache -prune -o -type f -name '*.ebuild' -exec sed -i 's/gui-libs\/display-info/media-libs\/libdisplay-info/g' {} + || true
          find . -path ./cache -prune -o -type f -name '*.ebuild' -exec sed -i 's/media-libs\/mesa\[gbm\]/media-libs\/mesa/g' {} + || true
          find . -path ./cache -prune -o -type f -name '*.ebuild' -exec sed -i 's/media-libs\/mesa\[gbm(+)\]/media-libs\/mesa/g' {} + || true
          find . -path ./cache -prune -o -type f -name '*.ebuild' -exec sed -i 's/mesa\[gbm\]/mesa/g' {} + || true
          find . -path ./cache -prune -o -type f -name '*.ebuild' -exec sed -i 's/mesa\[gbm(+)\]/mesa/g' {} + || true

          # Create a tracking file
          touch changed_packages.txt

          # We can still run the python script here for specific Upstream auto-bumps 
          # (like checking Github releases). If it finds an update, it can echo to changed_packages.txt.
          # (I have omitted the long Python script here for brevity, but you can paste your Python 
          # auto-bumper here exactly as it was. It just needs to echo the pkg_dir to changed_packages.txt).

      - name: 2. Dynamic Binhost Audit (Find ALL Missing Binaries)
        run: |
          # 🚀 Fetch SourceForge Packages Index
          BINHOST_URL="https://gentoo-nexus.sourceforge.io/Packages"
          curl -sL "$BINHOST_URL" -o sf_packages.txt || touch sf_packages.txt

          echo ">>> Scanning repository for all ebuilds..."
          
          # 🚀 DYNAMIC DISCOVERY: Find every ebuild in the repo (ignoring root files/caches)
          for ebuild in */*/*.ebuild; do
              [ -e "$ebuild" ] || continue
              
              pkg_dir=$(dirname "$ebuild")
              EBUILD_NAME=$(basename "$ebuild" .ebuild)
              CPV="${pkg_dir}/${EBUILD_NAME}"
              
              # If this specific version is NOT on SourceForge, queue it up!
              if ! grep -q "^CPV: $CPV$" sf_packages.txt; then
                  echo "🚨 Missing binary for $CPV! Queuing build..."
                  echo "$pkg_dir" >> changed_packages.txt
              fi
          done

          # Clean up duplicates
          if [ -s changed_packages.txt ]; then
              sort -u changed_packages.txt > changed_packages_unique.txt
              mv changed_packages_unique.txt changed_packages.txt
              echo "Packages queued for build:"
              cat changed_packages.txt
          else
              echo "✅ All packages are up to date on the binhost!"
          fi

      - name: 3. Generate Manifests for Queued Packages
        if: hashFiles('changed_packages.txt') != ''
        run: |
          mkdir -p /tmp/gentoo-tree /tmp/distfiles
          
          cat > manifest_script.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail
          emerge-webrsync -q
          
          mkdir -p /etc/portage/repos.conf
          cat > /etc/portage/repos.conf/gentoo-nexus.conf << 'REPOCONF'
          [gentoo-nexus]
          location = /overlay
          masters = gentoo
          REPOCONF

          while IFS= read -r pkg; do
            [ -z "$pkg" ] && continue
            echo "Generating manifest for $pkg"
            ebuild $(ls -1v /overlay/$pkg/*.ebuild | tail -n 1) manifest 2>&1 || true
          done < /overlay/changed_packages.txt
          EOF
          chmod +x manifest_script.sh

          docker run --rm \
            -v "${{ github.workspace }}:/overlay" \
            -v "/tmp/gentoo-tree:/var/db/repos/gentoo" \
            -v "/tmp/distfiles:/var/cache/distfiles" \
            gentoo/stage3:amd64-desktop-openrc bash /overlay/manifest_script.sh

      - name: 4. Commit and push updates
        if: hashFiles('changed_packages.txt') != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "bot: auto-update ebuilds and manifests"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin HEAD:"${GITHUB_REF_NAME}"
          fi

      - name: 5. Trigger Sequential Builds (Void Logic)
        if: hashFiles('changed_packages.txt') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          WORKFLOW_NAME="Manual Build"
          
          while IFS= read -r pkg; do
            [ -z "$pkg" ] && continue
            echo "=================================================="
            echo "🚀 Dispatching build for $pkg"
            echo "=================================================="
            before_ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)

            gh workflow run "${WORKFLOW_NAME}" \
              --ref "${GITHUB_REF_NAME}" \
              -f atom="${pkg}"

            sleep 8 # Buffer for GitHub to register the run

            # Grab the Run ID of the workflow we just triggered
            run_id=$(gh run list \
              --workflow="${WORKFLOW_NAME}" \
              --json databaseId,createdAt \
              --jq "[.[] | select(.createdAt >= \"${before_ts}\")] | ..databaseId // empty")

            if [ -n "${run_id}" ]; then
              echo "👀 Watching run ${run_id}..."
              # This pauses the script until the build completes!
              gh run watch "${run_id}" --exit-status || echo "⚠️ Run $run_id failed, but continuing to next package..."
            else
              echo "⚠️ Could not grab run ID. Moving to next package in queue."
              sleep 30
            fi
          done < changed_packages.txt
