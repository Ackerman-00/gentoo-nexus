name: Gentoo Nexus Check Updates

on:
  schedule:
    - cron: '0 */8 * * *'
  push:
    paths:
      - '**/*.ebuild'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-and-manifest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get week number for cache key
        id: week
        run: echo "key=$(date +%Y-%U)" >> "$GITHUB_OUTPUT"

      - name: Cache Gentoo portage tree
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/cache/gentoo-tree
          key: gentoo-tree-${{ runner.os }}-${{ steps.week.outputs.key }}
          restore-keys: |
            gentoo-tree-${{ runner.os }}-

      - name: 1. Self-Healing & Version Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import os, re, requests, subprocess, stat
          from pathlib import Path

          STABLE_TARGETS = {
              "app-misc/dgop":              "AvengeMedia/dgop",
              "games-util/protonplus-bin":  "Vysp3r/ProtonPlus",
              "x11-misc/matugen":           "InioX/matugen",
              "gui-wm/dank-material-shell": "AvengeMedia/DankMaterialShell",
          }

          def get_latest(repo):
              try:
                  hdrs = {"Authorization": f"token {os.environ['GITHUB_TOKEN']}"}
                  r = requests.get(f"https://api.github.com/repos/{repo}/releases/latest", headers=hdrs, timeout=15)
                  if r.status_code == 200:
                      tag = r.json().get("tag_name", "").lstrip("v")
                      if tag: return tag
                  r2 = requests.get(f"https://api.github.com/repos/{repo}/tags", headers=hdrs, timeout=15)
                  if r2.status_code == 200:
                      tags = r2.json()
                      if tags: return tags["name"].lstrip("v")
              except Exception as e:
                  print(f"WARNING: get_latest({repo}) failed: {e}")
              return None

          def get_appimage_version(filepath):
              try:
                  os.chmod(filepath, stat.S_IRWXU)
                  out = subprocess.run(["strings", filepath], capture_output=True, text=True, timeout=15).stdout
                  m = re.search(r"X-AppImage-Version=([0-9.]+)", out)
                  if m: return m.group(1)
                  m = re.search(r'"name"\s*:\s*"rootapp".*?"version"\s*:\s*"([0-9.]+)"', out, re.IGNORECASE | re.DOTALL)
                  if m: return m.group(1)
                  m = re.search(r'RootApp[-_]?([0-9]+\.[0-9]+\.[0-9]+)', out, re.IGNORECASE)
                  if m: return m.group(1)
              except Exception as e:
                  print(f"WARNING: get_appimage_version failed: {e}")
              return None

          def get_latest_commit(repo_url):
              try:
                  out = subprocess.check_output(["git", "ls-remote", repo_url, "HEAD"], timeout=30, stderr=subprocess.DEVNULL).decode()
                  m = re.search(r"([a-f0-9]{40})", out)
                  if m: return m.group(1)
              except Exception as e:
                  print(f"WARNING: get_latest_commit({repo_url}) failed: {e}")
              return None

          mango_dir = Path("gui-wm/mangowc")
          if mango_dir.exists():
              for eb in mango_dir.glob("mangowc-12.7.ebuild"):
                  target = mango_dir / "mangowc-0.12.7.ebuild"
                  if not target.exists(): eb.rename(target)

          proton_dir = Path("games-util/protonplus-bin")
          if proton_dir.exists():
              for eb in proton_dir.glob("protonplus-[0-9]*.ebuild"):
                  if "protonplus-bin" not in eb.name:
                      new_name = eb.name.replace("protonplus-", "protonplus-bin-")
                      eb.rename(proton_dir / new_name)

          for path, repo in STABLE_TARGETS.items():
              pkg_dir = Path(path)
              if not pkg_dir.exists(): continue
              ebs = sorted(pkg_dir.glob("*.ebuild"))
              if not ebs: continue
              target_file = ebs[-1]
              match = re.search(r"-([0-9][0-9.]*)\.ebuild$", target_file.name)
              if not match: continue
              curr_ver = match.group(1)
              pkg_name = re.sub(r"-" + re.escape(curr_ver) + r"\.ebuild$", "", target_file.name)
              latest_ver = get_latest(repo)
              if latest_ver and latest_ver != curr_ver:
                  new_path = pkg_dir / f"{pkg_name}-{latest_ver}.ebuild"
                  if not new_path.exists(): target_file.rename(new_path)
                  else: target_file.unlink()

          live_dirs = ["gui-wm/niri", "x11-base/xwayland-satellite"]
          for live_dir in live_dirs:
              pkg_dir = Path(live_dir)
              if not pkg_dir.exists(): continue
              for eb in pkg_dir.glob("*.ebuild"):
                  with open(eb) as f: content = f.read()
                  is_live = eb.name.endswith("-9999.ebuild") or bool(re.search(r'^(?:PV|VERSION)=["\']?9999["\']?', content, re.MULTILINE))
                  if not is_live: continue

                  repo_match = re.search(r'^(?:EGIT|GIT)_REPO_URI=["\']([^"\']+)["\']', content, re.MULTILINE)
                  if repo_match: repo_url = repo_match.group(1)
                  else:
                      gh = re.search(r"https://github\.com/([A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+)", content)
                      if gh: repo_url = f"https://github.com/{gh.group(1)}.git"
                      else: continue

                  new_commit = get_latest_commit(repo_url)
                  if not new_commit: continue

                  if "EGIT_COMMIT=" in content:
                      new_content = re.sub(r'(EGIT_COMMIT=["\']?)[a-f0-9]{7,40}(["\']?)', r"\g<1>" + new_commit + r"\2", content)
                  else:
                      new_content = re.sub(r"(^EAPI=.*)", r'\1\nEGIT_COMMIT="' + new_commit + '"', content, count=1, flags=re.MULTILINE)
                  if new_content != content:
                      with open(eb, "w") as f: f.write(new_content)

          root_dir = Path("app-misc/rootapp-bin")
          if root_dir.exists():
              ebs = sorted(root_dir.glob("*.ebuild"))
              if ebs:
                  appimage_path = "/tmp/Root.AppImage"
                  ret = os.system(f"curl --fail -sL -o {appimage_path} https://installer.rootapp.com/installer/Linux/X64/Root.AppImage")
                  if ret == 0 and os.path.exists(appimage_path) and os.path.getsize(appimage_path) > 0:
                      version = get_appimage_version(appimage_path)
                      if version and version not in ebs[-1].name:
                          new_path = root_dir / f"rootapp-bin-{version}.ebuild"
                          if not new_path.exists(): ebs[-1].rename(new_path)
                  if os.path.exists(appimage_path): os.remove(appimage_path)
          EOF

      - name: 2. Generate Manifests
        run: |
          find . -name 'Manifest' -delete
          mkdir -p "${{ github.workspace }}/cache/gentoo-tree"
          mkdir -p "${{ github.workspace }}/cache/distfiles"

          cat > manifest_script.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail
          mkdir -p /etc/portage/repos.conf /overlay/distfiles

          cat >> /etc/portage/make.conf << 'MAKECONF'
          FEATURES="-userfetch -userpriv -usersandbox -ipc-sandbox -network-sandbox -pid-sandbox"
          DISTDIR="/overlay/distfiles"
          EGIT_CLONE_TYPE="single"
          MAKECONF

          if [ ! -f /var/db/repos/gentoo/profiles/eapi ]; then
            emerge-webrsync -q
          fi

          cat > /etc/portage/repos.conf/gentoo-nexus.conf << 'REPOCONF'
          [gentoo-nexus]
          location = /overlay
          masters = gentoo
          REPOCONF

          find /overlay -type f -name '*.ebuild' -not -path '*/cache/*' -not -path '*/job_out/*' | while read -r eb; do
            ebuild "$eb" manifest 2>&1 || true
          done
          EOF
          chmod +x manifest_script.sh

          docker run --rm \
            -v "${{ github.workspace }}:/overlay" \
            -v "${{ github.workspace }}/cache/gentoo-tree:/var/db/repos/gentoo" \
            -v "${{ github.workspace }}/cache/distfiles:/var/cache/distfiles" \
            -w /overlay gentoo/stage3 bash /overlay/manifest_script.sh

      - name: 3. Commit and Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          echo "distfiles/" >> .gitignore
          echo "cache/" >> .gitignore
          echo "job_out/" >> .gitignore
          echo "*.sh" >> .gitignore
          
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "bot: auto-update ebuilds and manifests [skip ci]"
            branch=$(git rev-parse --abbrev-ref HEAD)
            if [ "$branch" = "main" ]; then
              if git pull --rebase origin main; then
                git push
              else
                echo "ERROR: Rebase conflict with remote commits. Aborting."
                git rebase --abort 2>/dev/null || true
                exit 1
              fi
            fi
          fi

  build-binaries:
    needs: update-and-manifest
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        package:
          - gui-wm/niri
          - gui-wm/mangowc
          - gui-wm/dank-material-shell
          - x11-base/xwayland-satellite
          - app-misc/dgop
          - app-misc/rootapp-bin
          - x11-misc/matugen
          - games-util/protonplus-bin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get week number for cache key
        id: week
        run: echo "key=$(date +%Y-%U)" >> "$GITHUB_OUTPUT"

      - name: Cache Gentoo portage tree
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/cache/gentoo-tree
          key: gentoo-tree-${{ runner.os }}-${{ steps.week.outputs.key }}
          restore-keys: |
            gentoo-tree-${{ runner.os }}-

      - name: Sanitize artifact name
        id: artname
        run: echo "name=binpkg-$(echo '${{ matrix.package }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Check SourceForge Binhost Status
        id: check_bin
        run: |
          PKG="${{ matrix.package }}"
          BINHOST="https://gentoo-nexus.sourceforge.io/Packages"

          # Always build -9999 (live git versions)
          if ls "${PKG}"/*-9999.ebuild 1>/dev/null 2>&1; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Bulletproof extraction: Gets exactly what Gentoo parses (e.g., 0.1.2-r1)
          EBUILD_FILE=$(ls -1 "${PKG}"/*.ebuild 2>/dev/null | sort -V | tail -n 1)
          if [ -z "$EBUILD_FILE" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          PN=$(basename "${PKG}")
          VER=$(basename "${EBUILD_FILE}" | sed -E "s/^${PN}-//; s/\.ebuild$//")
          
          echo "Checking SourceForge for CPV: ${PKG}-${VER}"
          
          if curl --fail -sL "$BINHOST" 2>/dev/null | grep -q "^CPV: ${PKG}-${VER}$"; then
            echo "✅ Package exists on SourceForge. Skipping build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "🚀 Package not found on SourceForge. Building!"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Binary (Zero-Compile Active)
        if: steps.check_bin.outputs.skip == 'false'
        run: |
          mkdir -p job_out
          mkdir -p "${{ github.workspace }}/cache/gentoo-tree"
          mkdir -p "${{ github.workspace }}/cache/distfiles"

          cat > build_script.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail
          mkdir -p /etc/portage/repos.conf /etc/portage/binrepos.conf /overlay/distfiles /overlay/job_out
          
          mkdir -p /etc/portage/package.accept_keywords
          mkdir -p /etc/portage/package.license
          mkdir -p /etc/portage/package.use
          mkdir -p /etc/portage/package.mask

          echo "sys-apps/systemd" >> /etc/portage/package.mask/systemd
          echo "sys-apps/gentoo-systemd-integration" >> /etc/portage/package.mask/systemd
          echo "kde-plasma/polkit-kde-agent" >> /etc/portage/package.mask/systemd
          
          echo "sys-auth/polkit -systemd elogind" > /etc/portage/package.use/polkit
          echo "sys-auth/elogind pam policykit" > /etc/portage/package.use/elogind
          
          echo "media-libs/tiff -webp" > /etc/portage/package.use/circular

          cat > /etc/portage/package.mask/llvm << 'LLVMMASK'
          >=llvm-core/llvm-22
          >=llvm-core/libclc-22
          >=llvm-core/clang-22
          >=llvm-core/llvmgold-22
          >=llvm-core/lld-22
          >=llvm-core/llvm-common-22
          >=llvm-core/clang-common-22
          LLVMMASK

          cat > /etc/portage/binrepos.conf/gentoo.conf << 'REPOCONF'
          [gentoo-nexus-binhost]
          priority = 9999
          sync-uri = https://gentoo-nexus.sourceforge.io/

          [gentoo]
          priority = 1
          sync-uri = https://gentoo.osuosl.org/releases/amd64/binpackages/23.0/x86-64/
          REPOCONF

          # 🚀 FIX: RESPECT-USE=Y forces Portage to reject systemd binaries
          cat > /etc/portage/make.conf << 'MAKECONF'
          FEATURES="-userfetch -userpriv -usersandbox -ipc-sandbox -network-sandbox -pid-sandbox getbinpkg buildpkg -binpkg-request-signature -binpkg-sig-verify"
          EMERGE_DEFAULT_OPTS="--getbinpkg --usepkg --binpkg-respect-use=y --binpkg-changed-deps=y"
          DISTDIR="/overlay/distfiles"
          PKGDIR="/overlay/job_out"
          USE="wayland vulkan pipewire egl gles2 dbus udev elogind harfbuzz opengl X alsa pam -systemd -kde -gnome -test"
          EGIT_CLONE_TYPE="single"
          ACCEPT_KEYWORDS="~amd64 amd64"
          ACCEPT_LICENSE="*"
          MAKECONF

          if [ ! -f /var/db/repos/gentoo/profiles/eapi ]; then
            emerge-webrsync -q
          fi
          
          getuto || true

          emerge --noreplace --quiet dev-lang/go dev-lang/rust-bin app-eselect/eselect-repository dev-vcs/git
          eselect repository enable guru && emaint sync -r guru

          cat > /etc/portage/repos.conf/gentoo-nexus.conf << 'REPOCONF'
          [gentoo-nexus]
          location = /overlay
          masters = gentoo
          priority = 9999
          REPOCONF

          cat > /etc/portage/repos.conf/guru.conf << 'REPOCONF'
          [guru]
          location = /var/db/repos/guru
          masters = gentoo
          REPOCONF

          echo "*/*::gentoo-nexus **" >> /etc/portage/package.accept_keywords/nexus
          echo "*/*::guru **" >> /etc/portage/package.accept_keywords/guru
          echo "*/* *" >> /etc/portage/package.license/all

          EMERGE_DEFAULT_OPTS="" emerge --oneshot --quiet --usepkg=n --getbinpkg=n media-libs/tiff
          EMERGE_DEFAULT_OPTS="" emerge --oneshot --quiet --usepkg=n --getbinpkg=n media-libs/libwebp

          emerge --autounmask=y --autounmask-write --quiet '${{ matrix.package }}' 2>&1 || true
          if ls /etc/portage/package.use/* 1> /dev/null 2>&1 || [ -f /etc/portage/package.use ]; then
            etc-update --automode -3 2>/dev/null || true
          fi
          
          emerge --autounmask=y --autounmask-write --quiet '${{ matrix.package }}' 2>&1 || true
          if ls /etc/portage/package.use/* 1> /dev/null 2>&1 || [ -f /etc/portage/package.use ]; then
            etc-update --automode -3 2>/dev/null || true
          fi

          emerge --buildpkg --quiet '${{ matrix.package }}'
          EOF
          chmod +x build_script.sh

          docker run --rm \
            -v "${{ github.workspace }}:/overlay" \
            -v "${{ github.workspace }}/cache/gentoo-tree:/var/db/repos/gentoo" \
            -v "${{ github.workspace }}/cache/distfiles:/var/cache/distfiles" \
            gentoo/stage3 bash /overlay/build_script.sh

      - name: Upload Intermediate Artifact
        if: steps.check_bin.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artname.outputs.name }}
          path: job_out/
          if-no-files-found: warn

  deploy-binhost:
    needs: build-binaries
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH for SourceForge
        env:
          SF_SSH_KEY: ${{ secrets.SF_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SF_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t rsa,ecdsa,ed25519 web.sourceforge.net >> ~/.ssh/known_hosts && chmod 644 ~/.ssh/known_hosts

      - name: Download all new binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: combined/
          pattern: binpkg-*
          merge-multiple: true

      - name: Fetch current SourceForge state
        env:
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
        run: |
          mkdir -p public_binhost
          rsync -avz -e "ssh" $SF_USERNAME@web.sourceforge.net:/home/project-web/gentoo-nexus/htdocs/ public_binhost/ || true
          if [ -d combined ]; then cp -r combined/* public_binhost/ 2>/dev/null || true; fi

      - name: Build binhost index and remove old versions
        run: |
          cat > deploy_script.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail
          python3 << 'PYEOF'
          import portage.versions
          from pathlib import Path
          from collections import defaultdict
          from functools import cmp_to_key

          pkg_dir = Path('/overlay/public_binhost')
          groups = defaultdict(list)

          for f in list(pkg_dir.glob('*.gpkg.tar')) + list(pkg_dir.glob('*.tbz2')):
              basename = f.name.replace('.gpkg.tar', '').replace('.tbz2', '')
              parts = portage.versions.pkgsplit(basename)
              if parts:
                  pkg_name, ver, rev = parts, parts, parts
                  ver_str = ver + ('-' + rev if rev != 'r0' else '')
                  groups[pkg_name].append((ver_str, f))

          def ver_cmp(a, b): return portage.versions.vercmp(a, b)

          for pkg_name, items in groups.items():
              if len(items) > 1:
                  items.sort(key=cmp_to_key(ver_cmp))
                  for old_ver, old_file in items[:-1]: old_file.unlink()
          PYEOF

          if ls /overlay/public_binhost/*.gpkg.tar 1>/dev/null 2>&1 || ls /overlay/public_binhost/*.tbz2 1>/dev/null 2>&1; then
            echo 'PKGDIR="/overlay/public_binhost"' >> /etc/portage/make.conf
            emaint binhost --fix
          fi
          EOF
          chmod +x deploy_script.sh
          docker run --rm -v "${{ github.workspace }}:/overlay" -w /overlay gentoo/stage3 bash /overlay/deploy_script.sh

          FILE_LIST=$(ls -1 public_binhost/*.gpkg.tar public_binhost/*.tbz2 2>/dev/null | xargs -I{} basename {} | sort || echo "(no packages yet)")
          cat > public_binhost/index.html << HTML
          <!DOCTYPE html><html><head><title>Gentoo Nexus Binhost</title><style>body { font-family: monospace; background: #1a1a1a; color: #e0e0e0; padding: 2em; } a { color: #66d9ef; }</style></head><body><h1>Gentoo Nexus Binhost</h1><p>Last updated by automated checks.</p><pre>${FILE_LIST}</pre></body></html>
          HTML

      - name: Deploy to SourceForge
        env:
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
        run: |
          rsync -avz --delete -e "ssh" public_binhost/ $SF_USERNAME@web.sourceforge.net:/home/project-web/gentoo-nexus/htdocs/
