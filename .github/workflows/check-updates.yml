name: Check All Updates

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: check-updates-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools xvfb jq
          pip install requests packaging

      - name: 1. Deep Upstream Scan & Ebuild Patching
        id: scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          find . -path ./cache -prune -o -type f -name '*.ebuild' -exec sed -i 's/LLVM_COMPAT=( {18..21} )/LLVM_COMPAT=( {18..22} )/g' {} + || true
          find . -path ./cache -prune -o -type f -name '*.ebuild' -exec sed -i 's/gui-libs\/display-info/media-libs\/libdisplay-info/g' {} + || true
          find . -path ./cache -prune -o -type f -name '*.ebuild' -exec sed -i 's/media-libs\/mesa\[gbm\]/media-libs\/mesa/g' {} + || true
          find . -path ./cache -prune -o -type f -name '*.ebuild' -exec sed -i 's/media-libs\/mesa\[gbm(+)\]/media-libs\/mesa/g' {} + || true
          find . -path ./cache -prune -o -type f -name '*.ebuild' -exec sed -i 's/mesa\[gbm\]/mesa/g' {} + || true
          find . -path ./cache -prune -o -type f -name '*.ebuild' -exec sed -i 's/mesa\[gbm(+)\]/mesa/g' {} + || true
          find gui-wm/mangowc -type f -name '*.ebuild' -exec sed -i 's/mangowm\/mangowc/mangowm\/mango/g' {} + || true

          python3 << 'EOF'
          import os, re, requests, subprocess, stat, shutil
          from pathlib import Path
          from packaging.version import parse as parse_version

          updated_atoms = set()
          gh_token = os.environ.get('GITHUB_TOKEN')
          hdrs = {"Authorization": f"token {gh_token}"} if gh_token else dict()

          def get_latest_github_release(repo):
              try:
                  r = requests.get(f"https://api.github.com/repos/{repo}/releases/latest", headers=hdrs, timeout=15)
                  if r.status_code == 200:
                      tag = r.json().get("tag_name", "").lstrip("v")
                      if tag and re.match(r'^[0-9]', tag): return tag
                  r2 = requests.get(f"https://api.github.com/repos/{repo}/tags", headers=hdrs, timeout=15)
                  if r2.status_code == 200:
                      for tag in r2.json():
                          name = tag.get("name", "").lstrip("v")
                          if re.match(r'^[0-9]', name): return name
              except Exception: pass
              return None

          def get_latest_commit(repo_url):
              try:
                  out = subprocess.check_output(["git", "ls-remote", repo_url, "HEAD"], timeout=30, stderr=subprocess.DEVNULL).decode()
                  m = re.search(r"([a-f0-9]{40})", out)
                  if m: return m.group(1)
              except Exception: pass
              return None

          def get_rootapp_version():
              print("    -> Downloading AppImage to detect version...")
              appimage = "/tmp/Root.AppImage"
              subprocess.run(["wget", "-qO", appimage, "https://installer.rootapp.com/installer/Linux/X64/Root.AppImage"])
              if not os.path.exists(appimage): 
                  print("    ❌ Failed to download Root.AppImage")
                  return None
              
              os.chmod(appimage, stat.S_IRWXU)
              subprocess.run([appimage, "--appimage-extract"], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
              
              ver = None
              if os.path.exists("squashfs-root"):
                  # 🚀 UI FIX: Using a for-loop to completely avoid bracket indexing!
                  for d_file in Path("squashfs-root").glob("*.desktop"):
                      txt = d_file.read_text(encoding="utf-8")
                      m = re.search(r'^X-AppImage-Version=(.+)', txt, re.M | re.I)
                      if m: ver = m.group(1).strip()
                      break
                  
                  if ver in (None, "1.0", "1.0.0"):
                      print("    -> Desktop file empty, running Xvfb fallback...")
                      os.system("xvfb-run -a ./squashfs-root/AppRun > /tmp/startup.log 2>&1 & sleep 5 && pkill -f AppRun || true")
                      if os.path.exists("/tmp/startup.log"):
                          log = Path("/tmp/startup.log").read_text(encoding="utf-8")
                          m = re.search(r'Root Version:\s*([0-9]+\.[0-9]+\.[0-9]+)', log, re.I)
                          if m: ver = m.group(1)
                  shutil.rmtree("squashfs-root", ignore_errors=True)
              os.remove(appimage)
              return ver

          for ebuild_path in Path('.').rglob('*.ebuild'):
              if 'cache' in ebuild_path.parts or 'job_out' in ebuild_path.parts: continue
              pkg_dir = ebuild_path.parent
              # Tuple unpacking to avoid brackets
              *parent_parts, cat_name, pkg_name = pkg_dir.parts
              pkg_cat_name = f"{cat_name}/{pkg_name}"
              
              content = ebuild_path.read_text(encoding="utf-8")
              is_live = ebuild_path.name.endswith('-9999.ebuild') or 'git-r3' in content
              
              print(f"\n🔍 Scanning {pkg_cat_name} (Live: {is_live})...")

              if pkg_name == "rootapp-bin":
                  new_ver = get_rootapp_version()
                  if new_ver:
                      curr_ver_m = re.search(r'-([0-9][0-9.]*(?:_p[0-9]+)?(?:-r[0-9]+)?)\.ebuild$', ebuild_path.name)
                      curr_ver = curr_ver_m.group(1) if curr_ver_m else None
                      print(f"    -> Current: {curr_ver} | Found Upstream: {new_ver}")
                      if curr_ver and new_ver != curr_ver:
                          new_path = pkg_dir / f"{pkg_name}-{new_ver}.ebuild"
                          ebuild_path.rename(new_path)
                          updated_atoms.add(pkg_cat_name)
                          print(f"    ✅ Bumping to {new_ver}")
                      else:
                          print("    ✅ Up to date.")
                  else:
                      print("    ❌ Failed to determine new RootApp version.")
                  continue

              repo_m = re.search(r'https://github\.com/([A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+?)(?:\.git|/archive|/releases|/tarball|"\s|\n)', content)
              if not repo_m:
                  print("    ❌ No GitHub repo found in SRC_URI/HOMEPAGE.")
                  continue
                  
              repo = repo_m.group(1)
              if repo.endswith('.git'): repo = repo[:-4]

              if is_live:
                  repo_url = f"https://github.com/{repo}.git"
                  print(f"    -> Checking remote git commit for {repo_url}...")
                  new_commit = get_latest_commit(repo_url)
                  if new_commit:
                      new_content = content
                      short_commit = new_commit[:12]
                      
                      if "EGIT_COMMIT=" in new_content:
                          new_content = re.sub(r'(EGIT_COMMIT=["\']?)[a-fA-F0-9]{7,40}(["\']?)', r"\g<1>" + short_commit + r"\2", new_content)
                      else:
                          new_content = re.sub(r"(^EAPI=.*)", r'\1\nEGIT_COMMIT="' + short_commit + '"', new_content, count=1, flags=re.MULTILINE)
                      
                      if "_commit=" in new_content:
                          new_content = re.sub(r'(_commit=["\']?)[a-fA-F0-9]{7,40}(["\']?)', r"\g<1>" + new_commit + r"\2", new_content)

                      if new_content != content:
                          ebuild_path.write_text(new_content, encoding="utf-8")
                          updated_atoms.add(pkg_cat_name)
                          print(f"    ✅ Updated commit hash to {short_commit}")
                      else:
                          print("    ✅ Up to date.")
                  else:
                      print(f"    ❌ Failed to fetch commit for {repo_url}")
              else:
                  curr_ver_m = re.search(r'-([0-9][0-9.]*(?:_p[0-9]+)?(?:-r[0-9]+)?)\.ebuild$', ebuild_path.name)
                  if not curr_ver_m: continue
                  curr_ver = curr_ver_m.group(1)
                  
                  print(f"    -> Checking GitHub releases for {repo}...")
                  latest_ver = get_latest_github_release(repo)
                  if latest_ver:
                      print(f"    -> Current: {curr_ver} | Found Upstream: {latest_ver}")
                      if pkg_name == "mangowc" and latest_ver.startswith("12."): latest_ver = "0." + latest_ver
                      
                      try:
                          is_newer = parse_version(latest_ver) > parse_version(curr_ver)
                      except:
                          is_newer = (latest_ver != curr_ver)
                      
                      if is_newer:
                          new_path = pkg_dir / f"{pkg_name}-{latest_ver}.ebuild"
                          ebuild_path.rename(new_path)
                          updated_atoms.add(pkg_cat_name)
                          print(f"    ✅ Bumping to {latest_ver}")
                      else:
                          print("    ✅ Up to date.")
                  else:
                      print(f"    ❌ Failed to get latest release for {repo}")

          if updated_atoms:
              Path('changed_packages.txt').write_text('\n'.join(updated_atoms) + '\n', encoding="utf-8")
          EOF

      - name: 2. Strict Binhost Audit
        run: |
          BINHOST_URL="https://gentoo-nexus.sourceforge.io/Packages"
          echo ">>> Auditing ebuilds against SourceForge..."
          HTTP_STATUS=$(curl -sL -o sf_packages.txt -w "%{http_code}" --connect-timeout 15 --retry 3 "$BINHOST_URL" || echo "000")
          
          if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "✅ Index fetched successfully."
          elif [ "$HTTP_STATUS" -eq 404 ]; then
              echo "⚠️ Index not found (404). Assuming empty binhost."
              touch sf_packages.txt
          else
              echo "🚨 FATAL: SourceForge connection failed (HTTP $HTTP_STATUS). Aborting."
              exit 1
          fi
          
          for ebuild in */*/*.ebuild; do
              [ -e "$ebuild" ] || continue
              pkg_dir=$(dirname "$ebuild")
              CATEGORY=$(dirname "$pkg_dir")
              EBUILD_NAME=$(basename "$ebuild" .ebuild)
              CPV="${CATEGORY}/${EBUILD_NAME}"
              if ! grep -q "^CPV: $CPV$" sf_packages.txt; then
                  echo "$pkg_dir" >> changed_packages.txt
              fi
          done

          if [ -f changed_packages.txt ] && [ -s changed_packages.txt ]; then
              sort -u changed_packages.txt > changed_packages_unique.txt
              mv changed_packages_unique.txt changed_packages.txt
              echo "updates_found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 3. Generate Manifests
        if: steps.scan.outputs.updates_found == 'true' || hashFiles('changed_packages.txt') != ''
        run: |
          mkdir -p /tmp/gentoo-tree /tmp/distfiles
          chmod 777 /tmp/distfiles
          
          cat > manifest_script.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail
          
          mkdir -p /var/db/repos/gentoo
          rm -rf /var/db/repos/gentoo/*
          emerge-webrsync -q
          eselect news read all >/dev/null 2>&1 || true
          emerge --unmerge --quiet sys-libs/gpm 2>/dev/null || true
          
          mkdir -p /etc/portage/repos.conf
          cat > /etc/portage/repos.conf/gentoo-nexus.conf << 'REPOCONF'
          [gentoo-nexus]
          location = /overlay
          masters = gentoo
          REPOCONF

          cat >> /etc/portage/make.conf << 'MAKECONF'
          FEATURES="-sandbox -usersandbox -ipc-sandbox -network-sandbox -pid-sandbox"
          DISTDIR="/var/cache/distfiles"
          MAKECONF

          while IFS= read -r pkg; do
            [ -z "$pkg" ] && continue
            ebuild $(ls -1v /overlay/$pkg/*.ebuild | tail -n 1) manifest 2>&1 || true
          done < /overlay/changed_packages.txt
          EOF
          chmod +x manifest_script.sh

          docker run --rm --privileged \
            -v "${{ github.workspace }}:/overlay" \
            -v "/tmp/gentoo-tree:/var/db/repos/gentoo" \
            -v "/tmp/distfiles:/var/cache/distfiles" \
            gentoo/stage3:amd64-desktop-openrc bash /overlay/manifest_script.sh

      - name: 4. Commit Updates
        if: steps.scan.outputs.updates_found == 'true' || hashFiles('changed_packages.txt') != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "bot: auto-update ebuilds and manifests"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin HEAD:"${GITHUB_REF_NAME}"
          fi

      - name: 5. Trigger Sequential Builds
        if: hashFiles('changed_packages.txt') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          WORKFLOW_NAME="Manual Build"
          
          while IFS= read -r pkg; do
            [ -z "$pkg" ] && continue
            echo "=================================================="
            echo "🚀 Dispatching build for $pkg"
            echo "=================================================="
            before_ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)

            gh workflow run "${WORKFLOW_NAME}" --ref "${GITHUB_REF_NAME}" -f atom="${pkg}"
            sleep 10

            run_id=$(gh run list --workflow="${WORKFLOW_NAME}" --json databaseId,createdAt | jq -r ".[] | select(.createdAt >= \"${before_ts}\") | .databaseId" | head -n 1 || true)

            if [ -n "${run_id}" ] && [ "${run_id}" != "null" ]; then
              echo "👀 Watching run ${run_id}..."
              gh run watch "${run_id}" --exit-status || echo "⚠️ Run $run_id failed, continuing queue."
            else
              echo "⚠️ Could not grab run ID. Moving to next package."
              sleep 15
            fi
          done < changed_packages.txt
