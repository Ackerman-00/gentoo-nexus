name: Check Updates

on:
  schedule:
    - cron: '0 6 * * 1,3,5'
  workflow_dispatch:

concurrency:
  group: check-updates-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  check-updates:
    name: Scan & Update Ebuilds
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: pip install requests packaging

      - name: Scan & Bump
        id: scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > scan.py << 'EOF'
          import os, re, subprocess, tempfile
          from pathlib import Path
          from packaging.version import parse as parse_version, InvalidVersion
          from requests.adapters import HTTPAdapter
          from urllib3.util.retry import Retry
          import requests

          session = requests.Session()
          session.mount('https://', HTTPAdapter(max_retries=Retry(total=3, backoff_factor=1, status_forcelist=[403, 429])))
          gh_token = os.environ.get('GITHUB_TOKEN')
          if gh_token:
              session.headers.update({"Authorization": f"Bearer {gh_token}", "Accept": "application/vnd.github.v3+json"})

          updated_atoms = set()

          _SUFFIX_WEIGHT = {'alpha':-40,'beta':-30,'pre':-20,'rc':-10,'p':10}

          def _to_tuple_extended(v):
              v = v.lstrip('v')
              v_clean = re.sub(r'-e\d+$', '', v)
              sm = re.search(r'[_-](alpha|beta|pre|rc|p)(\d*)$', v_clean, re.I)
              nm = re.search(r'_(\d+)$', v_clean)
              if sm:
                  base = v_clean[:sm.start()]
                  w = _SUFFIX_WEIGHT.get(sm.group(1).lower(), 0)
                  n = int(sm.group(2)) if sm.group(2) else 0
              elif nm:
                  base = v_clean[:nm.start()]
                  w, n = _SUFFIX_WEIGHT['p'], int(nm.group(1))
              else:
                  base, w, n = v_clean, 0, 0
              return (tuple(int(x) for x in re.findall(r'\d+', base)), w, n)

          def ver_gt(a, b):
              a, b = a.lstrip('v'), b.lstrip('v')
              try:
                  return parse_version(a) > parse_version(b)
              except InvalidVersion:
                  try:
                      return _to_tuple_extended(a) > _to_tuple_extended(b)
                  except Exception:
                      return a > b

          def ver_eq(a, b):
              a, b = a.lstrip('v'), b.lstrip('v')
              try:
                  return parse_version(a) == parse_version(b)
              except InvalidVersion:
                  try:
                      return _to_tuple_extended(a) == _to_tuple_extended(b)
                  except Exception:
                      return a == b

          def get_latest_github_release(repo):
              best_ver = None
              try:
                  r = session.get(f"https://api.github.com/repos/{repo}/releases/latest", timeout=15)
                  if r.status_code == 200:
                      tag = r.json().get("tag_name", "").lstrip("v")
                      if tag and re.match(r'^[0-9]', tag):
                          best_ver = tag
                  r2 = session.get(f"https://api.github.com/repos/{repo}/tags?per_page=100", timeout=15)
                  if r2.status_code == 200 and r2.json():
                      for tag_obj in r2.json():
                          name = tag_obj.get("name", "").lstrip("v")
                          if re.match(r'^[0-9]', name):
                              if not best_ver or ver_gt(name, best_ver):
                                  best_ver = name
              except Exception as e:
                  print(f"  [!] API Error for {repo}: {e}")
              return best_ver

          def get_latest_commit(repo_url, branch="HEAD"):
              try:
                  out = subprocess.check_output(["git","ls-remote",repo_url,branch], timeout=30, stderr=subprocess.DEVNULL).decode()
                  m = re.search(r"([a-f0-9]{40})", out)
                  if m: return m.group(1)[:12]
              except: pass
              return None

          def extract_appimage_version(appimage_path):
              try:
                  subprocess.run(['chmod','+x',appimage_path], check=True)
                  res = subprocess.run([appimage_path,'--appimage-version'], capture_output=True, text=True, timeout=30)
                  if res.returncode == 0 and res.stdout.strip(): return res.stdout.strip()
              except: pass
              try:
                  with tempfile.TemporaryDirectory() as tmpdir:
                      subprocess.run([appimage_path,'--appimage-extract'], cwd=tmpdir, capture_output=True, timeout=120)
                      extracted_dir = Path(tmpdir) / 'squashfs-root'
                      if extracted_dir.is_dir():
                          for d_file in extracted_dir.glob('*.desktop'):
                              content = d_file.read_text(encoding='utf-8', errors='ignore')
                              m = re.search(r'^X-AppImage-Version=(.+)', content, re.MULTILINE) or \
                                  re.search(r'^Version=(.+)', content, re.MULTILINE)
                              if m: return m.group(1).strip()
              except: pass
              return None

          for ebuild_path in Path('.').rglob('*.ebuild'):
              if any(x in ebuild_path.parts for x in ['cache','job_out','binpkgs','distfiles','ccache','.github','.git']):
                  continue
              pkg_dir = ebuild_path.parent
              if len(pkg_dir.parts) < 2: continue
              pkg_cat_name = f"{pkg_dir.parts[-2]}/{pkg_dir.parts[-1]}"
              content = ebuild_path.read_text(encoding="utf-8")

              if pkg_dir.parts[-1] == "rootapp-bin":
                  print(f"--- Scanning {pkg_cat_name} (AppImage) ---")
                  curr_m = re.search(rf'{re.escape(pkg_dir.parts[-1])}-(\S+?)\.ebuild$', ebuild_path.name)
                  if not curr_m: continue
                  curr_ver = curr_m.group(1)
                  with tempfile.NamedTemporaryFile(delete=False, suffix=".AppImage") as tmp:
                      tmp_path = tmp.name
                  try:
                      subprocess.run(['curl','-sSL','-o',tmp_path,"https://installer.rootapp.com/installer/Linux/X64/Root.AppImage"], timeout=120)
                      new_ver = extract_appimage_version(tmp_path)
                  finally:
                      if os.path.exists(tmp_path): os.unlink(tmp_path)
                  if new_ver and ver_gt(new_ver, curr_ver):
                      new_path = pkg_dir / f"{pkg_dir.parts[-1]}-{new_ver}.ebuild"
                      ebuild_path.rename(new_path)
                      updated_atoms.add(pkg_cat_name)
                      print(f"  [+] Renamed to: {new_path.name}")
                  else:
                      print("  [-] Already up to date.")
                  continue

              repo_m = re.search(r'github\.com/([A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+?)(?:\.git|/archive|/releases|/tarball|["\s\'])', content)
              if not repo_m: continue
              repo = repo_m.group(1).rstrip('.')
              print(f"--- Scanning {pkg_cat_name} ({repo}) ---")

              if ebuild_path.name.endswith('9999.ebuild'):
                  branch_m = re.search(r'^EGIT_BRANCH=["\']?([^"\']+)["\']?', content, re.MULTILINE)
                  branch = branch_m.group(1) if branch_m else "HEAD"
                  new_commit = get_latest_commit(f"https://github.com/{repo}.git", branch)
                  if new_commit:
                      new_content = re.sub(r'(EGIT_COMMIT=["\']?)[a-fA-F0-9]{7,40}(["\']?)',
                                           r"\g<1>" + new_commit + r"\2", content)
                      if new_content != content:
                          ebuild_path.write_text(new_content, encoding="utf-8")
                          updated_atoms.add(pkg_cat_name)
                          print(f"  [+] Bumped live commit on {branch} to: {new_commit}")
                      else:
                          print("  [-] Commit hash already up to date.")
              else:
                  curr_m = re.search(rf'{re.escape(pkg_dir.parts[-1])}-(\S+?)\.ebuild$', ebuild_path.name)
                  if not curr_m:
                      print("  [!] Could not extract current version.")
                      continue
                  curr_ver = curr_m.group(1)
                  latest_ver = get_latest_github_release(repo)
                  if not latest_ver:
                      print("  [!] Failed to pull latest version from API.")
                      continue
                  if pkg_dir.parts[-1] == "mangowm" and latest_ver.count('.') == 1 and not latest_ver.startswith("0."):
                      latest_ver = "0." + latest_ver
                  if ver_gt(latest_ver, curr_ver):
                      new_path = pkg_dir / f"{pkg_dir.parts[-1]}-{latest_ver}.ebuild"
                      ebuild_path.rename(new_path)
                      updated_atoms.add(pkg_cat_name)
                      print(f"  [+] Renamed to: {new_path.name}")
                  elif ver_eq(latest_ver, curr_ver):
                      print("  [-] Already up to date.")
                  else:
                      print(f"  [-] Already up to date (ebuild {curr_ver} >= upstream {latest_ver}).")

          changed_list = sorted(updated_atoms)
          if changed_list:
              Path('changed_packages.txt').write_text('\n'.join(changed_list) + '\n', encoding="utf-8")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"changed_packages={'true' if changed_list else 'false'}\n")
          EOF
          python3 -u scan.py

      - name: Sync Overlay
        run: |
          cat > sync_overlay.sh << 'SYNCEOF'
          #!/bin/bash
          set -euo pipefail

          OVERLAY="/overlay"

          # === Repo Setup ===
          mkdir -p /var/db/repos/gentoo /etc/portage/repos.conf
          emerge-webrsync -q || true

          cat > /etc/portage/repos.conf/gentoo.conf << 'REPOEOF'
          [gentoo]
          location = /var/db/repos/gentoo
          auto-sync = yes
          priority = -1000
          REPOEOF

          cat > /etc/portage/repos.conf/gentoo-nexus.conf << 'REPOEOF'
          [gentoo-nexus]
          location = /overlay
          masters = gentoo
          priority = 9999
          auto-sync = no
          REPOEOF

          mkdir -p /overlay/metadata /overlay/profiles
          echo "masters = gentoo" > /overlay/metadata/layout.conf
          find /overlay -mindepth 1 -maxdepth 1 -type d | grep -v -E '\.git|\.github|metadata|profiles|binpkgs|distfiles|ccache|setup' | sed 's|/overlay/||' > /overlay/profiles/categories

          # === Generate Manifests ===
          echo ">>> Generating Manifests..."
          for e in $(find /overlay -mindepth 2 -maxdepth 3 -name "*.ebuild" | sort); do
            ebuild_name=$(basename "$e")
            GENTOO_MIRRORS="" DISTDIR="/var/cache/distfiles" ebuild "$e" fetch >/dev/null 2>&1 || true
            GENTOO_MIRRORS="" DISTDIR="/var/cache/distfiles" ebuild "$e" manifest --force >/dev/null 2>&1 || {
              echo "  [!] Manifest failed for ${ebuild_name} — retrying with pkgdev"
              command -v pkgdev >/dev/null 2>&1 && pkgdev manifest -m "$e" >/dev/null 2>&1 || true
            }
          done
          egencache --update --repo gentoo-nexus --jobs 4
          echo ">>> Manifests generated."

          # === Validate Manifests & Resolve State ===
          cat > /etc/portage/make.conf << 'MAKECONF'
          COMMON_FLAGS="-O2 -march=x86-64 -pipe"
          CFLAGS="${COMMON_FLAGS}"
          CXXFLAGS="${COMMON_FLAGS}"
          FCFLAGS="${COMMON_FLAGS}"
          FFLAGS="${COMMON_FLAGS}"
          ACCEPT_KEYWORDS="~amd64"
          ACCEPT_LICENSE="*"
          ACCEPT_PROPERTIES="*"
          ACCEPT_RESTRICT="*"
          MAKEOPTS="-j4"
          USE="elogind -systemd dbus wayland egl vaapi vdpau vulkan amdgpu ffmpeg encode opencl"
          VIDEO_CARDS="amdgpu radeonsi"
          MAKECONF

          cat > /etc/portage/package.use/global << 'USECONF'
          sys-libs/zlib minizip
          media-video/pipewire extra
          media-video/ffmpeg -sdl
          sys-libs/ncurses -gpm
          dev-libs/openssl -bindist
          dev-libs/libdbusmenu gtk3
          USECONF

          mkdir -p /etc/portage/package.accept_keywords
          cat > /etc/portage/package.accept_keywords/nexus << 'KEYW'
          */*::gentoo-nexus **
          net-libs/webkit-gtk ~amd64
          KEYW

          echo ">>> Validating Manifests..."
          MANIFEST_FAILS=0
          for e in $(find /overlay -mindepth 2 -maxdepth 3 -name "*.ebuild" | sort); do
            DISTFILE=$(grep -oP 'SRC_URI="?\K[^"]+' "$e" 2>/dev/null | head -1 || true)
            if [ -n "$DISTFILE" ]; then
              if ! grep -q "DIST ${DISTFILE}" "${e%/*}/Manifest" 2>/dev/null; then
                echo "  [!] Missing DIST entry — regenerating for $(basename "$e")"
                GENTOO_MIRRORS="" DISTDIR="/var/cache/distfiles" ebuild "$e" manifest --force >/dev/null 2>&1 || {
                  echo "  [!!] FAILED: $(basename "$e")"
                  MANIFEST_FAILS=$((MANIFEST_FAILS + 1))
                }
              fi
            fi
          done
          echo ">>> Manifest validation complete. Failures: $MANIFEST_FAILS"

          echo ">>> Resolving package versions..."
          ALL_PKGS=$(find /overlay -mindepth 2 -maxdepth 3 -name "*.ebuild" | awk -F/ '{print $(NF-2)"/"$(NF-1)}' | sort -u || true)

          > /overlay/desired_state.txt
          for pkg in $ALL_PKGS; do
            RES=$(emerge -pqO --color=n "$pkg" 2>/dev/null | awk '/^\[ebuild/ {for(i=1;i<=NF;i++) if($i ~ /\//) {sub(/::.*/,"",$i); print $i; break}}' || true)
            if [ -n "$RES" ]; then
              echo "$RES" >> /overlay/desired_state.txt
              echo "  Target: $RES"
            fi
          done
          echo ">>> State resolution complete."
          SYNCEOF
          chmod +x sync_overlay.sh
          docker run --rm -v "${{ github.workspace }}:/overlay" gentoo/stage3:amd64-desktop-openrc bash /overlay/sync_overlay.sh

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for item in scan.py changed_packages.txt packages_to_build.txt sync_overlay.sh desired_state.txt; do
            grep -qxF "$item" .gitignore 2>/dev/null || echo "$item" >> .gitignore
          done
          git rm --cached scan.py changed_packages.txt packages_to_build.txt desired_state.txt sync_overlay.sh 2>/dev/null || true
          git add -A
          if ! git diff --cached --quiet; then
            MSG="auto-update: ebuild refresh, manifests, and cache $(date -u '+%Y-%m-%d')"
            [ -f changed_packages.txt ] && MSG="auto-update: ebuild bumps ($(tr '\n' ' ' < changed_packages.txt)) $(date -u '+%Y-%m-%d')"
            git commit -m "$MSG"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Binhost Audit
        id: audit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          EXISTING_ASSETS=$(gh release view rolling --json assets --jq '.assets[].name' 2>/dev/null || echo "")
          CHANGED=$(cat changed_packages.txt 2>/dev/null || echo "")
          > packages_to_build.txt
          CHANGED_ATOMS=""

          while IFS= read -r CPV; do
             [ -z "$CPV" ] && continue
             PN_PV="${CPV#*/}"
             ATOM=$(python3 -c "import re,sys;cpv=sys.argv[1];m=re.match(r'^(.*?)-[0-9]',cpv);print(m.group(1)) if m else print(cpv)" "$CPV")

             if echo "$CHANGED" | grep -q "^${ATOM}$"; then
                echo "=$CPV" >> packages_to_build.txt
                CHANGED_ATOMS="$CHANGED_ATOMS =$CPV"
             elif ! echo "$EXISTING_ASSETS" | grep -qE "^${PN_PV//./\\.}(-[0-9]+)?\.gpkg\.tar$"; then
                echo "=$CPV" >> packages_to_build.txt
             fi
          done < desired_state.txt

          UNIQUE_BUILD_LIST=$(tr '\n' ' ' < packages_to_build.txt | tr ' ' '\n' | sort -u | xargs)
          echo "build_list=$UNIQUE_BUILD_LIST" >> "$GITHUB_OUTPUT"
          UNIQUE_CHANGED_ATOMS=$(echo $CHANGED_ATOMS | tr ' ' '\n' | sort -u | xargs)
          echo "force_required=$UNIQUE_CHANGED_ATOMS" >> "$GITHUB_OUTPUT"

      - name: Trigger Relay
        if: steps.audit.outputs.build_list != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import os, re, json, sys
          from pathlib import Path
          from collections import defaultdict

          overlay = Path(os.environ.get('GITHUB_WORKSPACE', '.'))
          pkgs = {}
          deps = defaultdict(set)

          for ebuild_path in sorted(overlay.rglob('*.ebuild')):
              if any(x in ebuild_path.parts for x in ['.git', '.github', 'metadata', 'profiles', 'binpkgs', 'distfiles', 'ccache']):
                  continue
              pkg = f"{ebuild_path.parts[-3]}/{ebuild_path.parts[-2]}"
              pkgs[pkg] = ebuild_path

          for pkg, ebuild_path in pkgs.items():
              content = ebuild_path.read_text(encoding='utf-8', errors='ignore')
              for other_pkg in pkgs:
                  if other_pkg == pkg:
                      continue
                  other_pn = other_pkg.split('/')[1]
                  if re.search(rf'\b{re.escape(other_pn)}\b', content):
                      deps[pkg].add(other_pkg)

          edges = defaultdict(list)
          for pkg, pkg_deps in deps.items():
              for dep in pkg_deps:
                  edges[dep].append(pkg)

          in_degree = defaultdict(int)
          for pkg in pkgs:
              in_degree[pkg] = len(deps[pkg])

          queue = sorted(pkg for pkg in pkgs if in_degree[pkg] == 0)
          sorted_pkgs = []
          while queue:
              node = queue.pop(0)
              sorted_pkgs.append(node)
              for dependent in edges[node]:
                  in_degree[dependent] -= 1
                  if in_degree[dependent] == 0:
                      queue.append(dependent)
                      queue.sort()

          if len(sorted_pkgs) != len(pkgs):
              remaining = set(pkgs) - set(sorted_pkgs)
              print(f"Warning: cycle detected: {remaining}", file=sys.stderr)
              sorted_pkgs.extend(remaining)

          with open('priority_order.json', 'w') as f:
              json.dump(sorted_pkgs, f)

          print(">>> Auto-detected package order (deps first):", " ".join(sorted_pkgs))
          PYEOF

          PRIORITY_ORDER=($(python3 -c "import json; print(' '.join(json.load(open('priority_order.json'))))"))
          RAW_LIST="${{ steps.audit.outputs.build_list }}"
          ORDERED=()
          for priority_pkg in "${PRIORITY_ORDER[@]}"; do
            for exact_pkg in $RAW_LIST; do
              if echo "$exact_pkg" | grep -q "$priority_pkg"; then ORDERED+=("$exact_pkg"); fi
            done
          done
          for exact_pkg in $RAW_LIST; do
            already=false
            for p in "${ORDERED[@]}"; do [ "$p" == "$exact_pkg" ] && already=true && break; done
            [ "$already" = false ] && ORDERED+=("$exact_pkg")
          done
          FINAL_LIST="${ORDERED[*]}"
          echo ">>> Queueing for compilation: $FINAL_LIST"
          gh workflow run "Gentoo Build Relay" \
            --ref "${GITHUB_REF_NAME}" \
            -f package_list="$FINAL_LIST" \
            -f force_rebuild="${{ steps.audit.outputs.force_required }}"
