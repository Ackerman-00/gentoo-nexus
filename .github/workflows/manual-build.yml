name: Manual Build

on:
  workflow_dispatch:
    inputs:
      atom:
        description: 'Package atom to build'
        required: true
        type: string
      force_rebuild:
        description: 'Force rebuild'
        required: false
        type: boolean
        default: false

concurrency:
  group: build-${{ github.event.inputs.atom }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check SourceForge Binhost
        id: check_bin
        run: |
          PKG="${{ github.event.inputs.atom }}"
          BINHOST="https://gentoo-nexus.sourceforge.io/Packages"

          if [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          EBUILD_FILE=$(ls -1v "${PKG}"/*.ebuild 2>/dev/null | tail -n 1)
          if [ -z "$EBUILD_FILE" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          PN=$(basename "${PKG}")
          VER=$(basename "${EBUILD_FILE}" | sed -E "s/^${PN}-//; s/\.ebuild$//")
          
          if curl --fail -sL "$BINHOST" 2>/dev/null | grep -q "^CPV: ${PKG}-${VER}$"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Binary Package
        if: steps.check_bin.outputs.skip == 'false'
        run: |
          mkdir -p job_out /tmp/distfiles
          chmod 777 /tmp/distfiles

          cat > build_script.sh << 'BUILDEOF'
          #!/bin/bash
          set -euo pipefail
          
          rm -rf /var/db/repos/gentoo/*
          emerge-webrsync -q
          command -v getuto >/dev/null 2>&1 && getuto || true
          
          eselect profile set default/linux/amd64/23.0/desktop
          
          mkdir -p /etc/portage/{repos.conf,binrepos.conf,package.{accept_keywords,license,use,mask}}
          mkdir -p /overlay/{distfiles,job_out}

          cat > /etc/portage/package.mask/systemd << 'MASK'
          sys-apps/systemd
          sys-apps/gentoo-systemd-integration
          MASK

          cat > /etc/portage/package.mask/gpm << 'MASK'
          sys-libs/gpm
          MASK

          cat > /etc/portage/package.use/global << 'USE'
          */* -systemd elogind -gpm
          sys-libs/ncurses -gpm -abi_x86_32
          sys-libs/termcap -gpm
          www-client/w3m -gpm
          USE

          cat > /etc/portage/binrepos.conf/gentoo.conf << 'REPOCONF'
          [gentoo]
          priority = 10000
          sync-uri = https://distfiles.gentoo.org/releases/amd64/binpackages/23.0/x86-64/
          verify-signature = false
          REPOCONF

          cat > /etc/portage/binrepos.conf/nexus.conf << 'REPOCONF'
          [gentoo-nexus-sf]
          priority = 9999
          sync-uri = https://gentoo-nexus.sourceforge.io/
          REPOCONF

          cat > /etc/portage/make.conf << 'MAKECONF'
          FEATURES="-userfetch -userpriv -usersandbox -ipc-sandbox -network-sandbox -pid-sandbox getbinpkg buildpkg"
          EMERGE_DEFAULT_OPTS="--getbinpkg --usepkg --binpkg-respect-use=y --binpkg-changed-deps=y --autounmask=y --autounmask-write --autounmask-backtrack=y --keep-going --quiet"
          DISTDIR="/var/cache/distfiles"
          PKGDIR="/overlay/job_out"
          USE="pipewire egl gles2 vulkan pam -systemd -test -gpm elogind"
          VIDEO_CARDS="amdgpu radeonsi nouveau virgl"
          EGIT_CLONE_TYPE="single"
          ACCEPT_KEYWORDS="~amd64 amd64"
          ACCEPT_LICENSE="*"
          MAKECONF

          emerge --noreplace --quiet dev-lang/go dev-lang/rust-bin app-eselect/eselect-repository dev-vcs/git
          eselect repository enable guru 2>/dev/null || true
          emaint sync -r guru 2>/dev/null || true

          cat > /etc/portage/repos.conf/gentoo-nexus.conf << 'REPOCONF'
          [gentoo-nexus]
          location = /overlay
          masters = gentoo
          priority = 9999
          REPOCONF

          cat > /etc/portage/repos.conf/guru.conf << 'REPOCONF'
          [guru]
          location = /var/db/repos/guru
          masters = gentoo
          REPOCONF

          echo "*/*::gentoo-nexus ~amd64" >> /etc/portage/package.accept_keywords/nexus
          echo "*/*::guru ~amd64" >> /etc/portage/package.accept_keywords/guru
          echo "*/* *" >> /etc/portage/package.license/all

          TARGET_PKG='${{ github.event.inputs.atom }}'
          echo "$TARGET_PKG **" >> /etc/portage/package.accept_keywords/target

          for pkg in gui-wm/niri x11-base/xwayland-satellite; do
            if [ -d "/overlay/$pkg" ]; then
              sed -i 's/LLVM_COMPAT=( {18..21} )/LLVM_COMPAT=( {18..22} )/g' "/overlay/$pkg"/*.ebuild 2>/dev/null || true
              sed -i 's/gui-libs\/display-info/media-libs\/libdisplay-info/g' "/overlay/$pkg"/*.ebuild 2>/dev/null || true
              sed -i 's/media-libs\/mesa\[gbm\]/media-libs\/mesa/g' "/overlay/$pkg"/*.ebuild 2>/dev/null || true
              sed -i 's/media-libs\/mesa\[gbm(+)\]/media-libs\/mesa/g' "/overlay/$pkg"/*.ebuild 2>/dev/null || true
              sed -i 's/mesa\[gbm\]/mesa/g' "/overlay/$pkg"/*.ebuild 2>/dev/null || true
              sed -i 's/mesa\[gbm(+)\]/mesa/g' "/overlay/$pkg"/*.ebuild 2>/dev/null || true
              ebuild $(ls -1v /overlay/$pkg/*.ebuild | tail -n 1) manifest 2>/dev/null || true
            fi
          done

          for pkg in gui-libs/wlroots gui-libs/scenefx; do
            if [ -d "/var/db/repos/guru/$pkg" ]; then
              sed -i 's/media-libs\/mesa\[gbm\]/media-libs\/mesa/g' "/var/db/repos/guru/$pkg"/*.ebuild 2>/dev/null || true
              sed -i 's/media-libs\/mesa\[gbm(+)\]/media-libs\/mesa/g' "/var/db/repos/guru/$pkg"/*.ebuild 2>/dev/null || true
              sed -i 's/mesa\[gbm\]/mesa/g' "/var/db/repos/guru/$pkg"/*.ebuild 2>/dev/null || true
              sed -i 's/mesa\[gbm(+)\]/mesa/g' "/var/db/repos/guru/$pkg"/*.ebuild 2>/dev/null || true
              ebuild $(ls -1v /var/db/repos/guru/$pkg/*.ebuild | tail -n 1) manifest 2>/dev/null || true
            fi
          done

          mkdir -p /etc/portage/package.use
          echo "dev-libs/glib -introspection" > /etc/portage/package.use/glib_bootstrap
          emerge --oneshot --quiet --nodeps dev-libs/glib dev-libs/gobject-introspection-common dev-util/gdbus-codegen 2>&1 || true
          emerge --oneshot --quiet --nodeps dev-libs/gobject-introspection 2>&1 || true
          rm -f /etc/portage/package.use/glib_bootstrap
          emerge --oneshot --quiet dev-libs/glib 2>&1 || true
          
          USE="-cairo -glib -introspection -doc -gtk-doc" emerge --oneshot --quiet --nodeps media-libs/harfbuzz 2>&1 || true
          emerge --oneshot --quiet --nodeps sys-libs/ncurses 2>&1 || true

          emerge "$TARGET_PKG" 2>&1 || true
          for i in 1 2 3; do etc-update --automode -5 2>/dev/null || break; done
          
          emerge "$TARGET_PKG" 2>&1 || true
          for i in 1 2 3; do etc-update --automode -5 2>/dev/null || break; done

          emerge --buildpkg "$TARGET_PKG"
          BUILDEOF
          chmod +x build_script.sh

          docker run --rm --privileged \
            -v "${{ github.workspace }}:/overlay" \
            -v "/tmp/distfiles:/var/cache/distfiles" \
            gentoo/stage3:amd64-desktop-openrc bash /overlay/build_script.sh

      - name: Deploy to SourceForge
        if: steps.check_bin.outputs.skip == 'false'
        env:
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_SSH_KEY: ${{ secrets.SF_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SF_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t rsa,ecdsa,ed25519 web.sourceforge.net >> ~/.ssh/known_hosts

          mkdir -p public_binhost
          rsync -avz -e "ssh" $SF_USERNAME@web.sourceforge.net:/home/project-web/gentoo-nexus/htdocs/ public_binhost/ 2>/dev/null || true
          
          if [ -d job_out ]; then cp -r job_out/* public_binhost/ 2>/dev/null || true; fi

          cat > deploy_script.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail
          python3 << 'PYEOF'
          import portage.versions
          from pathlib import Path
          from collections import defaultdict
          from functools import cmp_to_key

          pkg_dir = Path('/overlay/public_binhost')
          if not pkg_dir.exists(): exit(0)
          groups = defaultdict(list)

          for f in list(pkg_dir.rglob('*.gpkg.tar')) + list(pkg_dir.rglob('*.tbz2')):
              rel_path = f.relative_to(pkg_dir)
              cpv = f"{rel_path.parent}/{f.name.replace('.gpkg.tar', '').replace('.tbz2', '')}"
              parts = portage.versions.pkgsplit(cpv)
              if parts:
                  groups[parts].append((parts + ('-' + parts if parts != 'r0' else ''), f))

          def ver_cmp(a, b): return portage.versions.vercmp(a, b)

          for pkg_name, items in groups.items():
              if len(items) > 1:
                  items.sort(key=cmp_to_key(ver_cmp))
                  for old_ver, old_file in items[:-1]: old_file.unlink()
          PYEOF

          if ls /overlay/public_binhost/*/*.gpkg.tar 1>/dev/null 2>&1 || ls /overlay/public_binhost/*/*.tbz2 1>/dev/null 2>&1; then
            echo 'PKGDIR="/overlay/public_binhost"' >> /etc/portage/make.conf
            emaint binhost --fix 2>/dev/null || true
          fi
          EOF
          chmod +x deploy_script.sh
          docker run --rm -v "${{ github.workspace }}:/overlay" -w /overlay gentoo/stage3:amd64-desktop-openrc bash /overlay/deploy_script.sh

          FILE_LIST=$(ls -1 public_binhost/*/*.gpkg.tar public_binhost/*/*.tbz2 2>/dev/null | xargs -I{} basename {} | sort || echo "(no packages yet)")
          cat > public_binhost/index.html << HTML
          <!DOCTYPE html><html><head><title>Gentoo Nexus Binhost</title><style>body { font-family: monospace; background: #1a1a1a; color: #e0e0e0; padding: 2em; } a { color: #66d9ef; }</style></head><body><h1>Gentoo Nexus Binhost</h1><p>Last build: <strong>${{ github.event.inputs.atom }}</strong></p><p>Updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')</p><pre>${FILE_LIST}</pre></body></html>
          HTML

          rsync -avz --delete -e "ssh" public_binhost/ $SF_USERNAME@web.sourceforge.net:/home/project-web/gentoo-nexus/htdocs/
