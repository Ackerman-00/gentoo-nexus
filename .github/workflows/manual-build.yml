name: Manual Build

on:
  workflow_dispatch:
    inputs:
      atom:
        description: 'Package atom (e.g. gui-wm/niri)'
        required: true
        type: string

concurrency:
  group: manual-build-${{ github.event.inputs.atom }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  manual:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get week number for cache key
        id: week
        run: echo "key=$(date +%Y-%U)" >> "$GITHUB_OUTPUT"

      - name: Cache Gentoo portage tree
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/cache/gentoo-tree
          key: gentoo-tree-${{ runner.os }}-${{ steps.week.outputs.key }}
          restore-keys: |
            gentoo-tree-${{ runner.os }}-

      - name: Build Binary Asset (Zero-Compile Active)
        run: |
          mkdir -p job_out
          mkdir -p "${{ github.workspace }}/cache/gentoo-tree"
          mkdir -p "${{ github.workspace }}/cache/distfiles"

          cat > build_script.sh << 'BUILDEOF'
          #!/bin/bash
          set -euo pipefail
          
          if [ ! -f /var/db/repos/gentoo/profiles/eapi ]; then
            emerge-webrsync -q
          fi
          
          command -v getuto >/dev/null 2>&1 && getuto || true

          eselect profile set default/linux/amd64/23.0/desktop
          
          mkdir -p /etc/portage/repos.conf /etc/portage/binrepos.conf /overlay/distfiles /overlay/job_out
          mkdir -p /etc/portage/package.accept_keywords
          mkdir -p /etc/portage/package.license
          mkdir -p /etc/portage/package.use
          mkdir -p /etc/portage/package.mask

          cat > /etc/portage/package.mask/systemd << 'MASK'
          sys-apps/systemd
          sys-apps/systemd-utils
          sys-apps/gentoo-systemd-integration
          sys-apps/systemd-initctl
          MASK

          cat > /etc/portage/package.mask/gpm << 'MASK'
          sys-libs/gpm
          MASK

          cat > /etc/portage/package.use/ncurses << 'USE'
          sys-libs/ncurses -gpm -abi_x86_32
          sys-libs/termcap -gpm
          www-client/w3m -gpm
          USE

          cat > /etc/portage/package.use/elogind << 'USE'
          */* -systemd elogind -gpm
          sys-auth/polkit -systemd elogind
          sys-auth/elogind pam policykit
          media-video/pipewire -systemd elogind
          media-video/wireplumber -systemd elogind
          sys-apps/dbus -systemd elogind
          media-libs/libpulse -systemd elogind
          sys-fs/udisks -systemd elogind
          net-misc/networkmanager -systemd elogind
          sys-apps/xdg-desktop-portal -systemd elogind
          x11-base/xwayland -systemd elogind
          dev-libs/libei -systemd elogind
          net-misc/modemmanager -systemd elogind
          sys-apps/accountsservice -systemd elogind
          media-libs/tiff -webp
          USE

          cat > /etc/portage/package.use/harfbuzz << 'USE'
          media-libs/harfbuzz -cairo -doc -gtk-doc -introspection
          USE

          cat > /etc/portage/package.use/libdrm << 'USE'
          x11-libs/libdrm video_cards_amdgpu video_cards_intel video_cards_nouveau -video_cards_radeon -video_cards_r600 -video_cards_r300
          USE

          cat > /etc/portage/binrepos.conf/nexus.conf << 'REPOCONF'
          [gentoo-nexus-sf]
          priority = 9999
          sync-uri = https://gentoo-nexus.sourceforge.io/

          [gentoo-nexus-gh]
          priority = 9998
          sync-uri = https://ackerman-00.github.io/gentoo-nexus/
          REPOCONF

          cat > /etc/portage/make.conf << 'MAKECONF'
          FEATURES="-userfetch -userpriv -usersandbox -ipc-sandbox -network-sandbox -pid-sandbox getbinpkg buildpkg -binpkg-request-signature -binpkg-sig-verify"
          DISTDIR="/overlay/distfiles"
          PKGDIR="/overlay/job_out"
          USE="pipewire egl gles2 vulkan pam -systemd -test -gpm elogind"
          VIDEO_CARDS="amdgpu radeonsi nouveau virgl"
          EGIT_CLONE_TYPE="single"
          ACCEPT_KEYWORDS="~amd64 amd64"
          ACCEPT_LICENSE="*"
          MAKECONF

          emerge --noreplace --quiet dev-lang/go dev-lang/rust-bin app-eselect/eselect-repository dev-vcs/git
          eselect repository enable guru && emaint sync -r guru

          cat > /etc/portage/repos.conf/gentoo-nexus.conf << 'REPOCONF'
          [gentoo-nexus]
          location = /overlay
          masters = gentoo
          priority = 9999
          REPOCONF

          cat > /etc/portage/repos.conf/guru.conf << 'REPOCONF'
          [guru]
          location = /var/db/repos/guru
          masters = gentoo
          REPOCONF

          echo "*/*::gentoo-nexus **" >> /etc/portage/package.accept_keywords/nexus
          echo "*/*::guru **" >> /etc/portage/package.accept_keywords/guru
          echo "*/* *" >> /etc/portage/package.license/all

          # 🚀 CRITICAL: Only patch OVERLAY ebuilds (NOT gentoo repo!)
          find /overlay -type f -name '*.ebuild' -exec sed -i 's/LLVM_COMPAT=( {18..21} )/LLVM_COMPAT=( {18..22} )/g' {} + || true
          find /overlay -type f -name '*.ebuild' -exec sed -i 's/gui-libs\/display-info/media-libs\/libdisplay-info/g' {} + || true
          find /overlay -type f -name '*.ebuild' -exec sed -i 's/media-libs\/mesa\[gbm\]/media-libs\/mesa/g' {} + || true
          find /overlay -type f -name '*.ebuild' -exec sed -i 's/mesa\[gbm\]/mesa/g' {} + || true

          emerge --oneshot --quiet --usepkg=n --getbinpkg=n --autounmask=y --autounmask-write --autounmask-backtrack=y \
            sys-auth/polkit dev-libs/libei media-video/wireplumber media-libs/libpulse sys-apps/accountsservice 2>&1 || true
          
          for i in 1 2 3; do
            etc-update --automode -5 2>/dev/null || break
          done

          emerge --oneshot --quiet --usepkg=n --getbinpkg=n media-libs/harfbuzz
          emerge --oneshot --quiet --usepkg=n --getbinpkg=n sys-libs/ncurses
          emerge --oneshot --quiet --usepkg=n --getbinpkg=n media-libs/tiff media-libs/libwebp

          emerge --autounmask=y --autounmask-write --autounmask-backtrack=y --keep-going --quiet \
            --usepkg-exclude sys-auth/polkit \
            --usepkg-exclude dev-libs/libei \
            --usepkg-exclude media-video/wireplumber \
            --usepkg-exclude media-libs/libpulse \
            --usepkg-exclude sys-apps/accountsservice \
            '${{ github.event.inputs.atom }}' 2>&1 || true
          
          for i in 1 2 3; do
            etc-update --automode -5 2>/dev/null || break
          done
          
          emerge --autounmask=y --autounmask-write --autounmask-backtrack=y --keep-going --quiet \
            --usepkg-exclude sys-auth/polkit \
            --usepkg-exclude dev-libs/libei \
            --usepkg-exclude media-video/wireplumber \
            --usepkg-exclude media-libs/libpulse \
            --usepkg-exclude sys-apps/accountsservice \
            '${{ github.event.inputs.atom }}' 2>&1 || true
          
          for i in 1 2 3; do
            etc-update --automode -5 2>/dev/null || break
          done

          emerge --buildpkg --quiet '${{ github.event.inputs.atom }}'
          BUILDEOF
          chmod +x build_script.sh

          docker run --rm \
            -v "${{ github.workspace }}:/overlay" \
            -v "${{ github.workspace }}/cache/gentoo-tree:/var/db/repos/gentoo" \
            -v "${{ github.workspace }}/cache/distfiles:/var/cache/distfiles" \
            gentoo/stage3 bash /overlay/build_script.sh

      - name: Upload Intermediate Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binpkg-manual-build
          path: job_out/
          if-no-files-found: warn

  deploy-binhost:
    needs: manual
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH for SourceForge
        env:
          SF_SSH_KEY: ${{ secrets.SF_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SF_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t rsa,ecdsa,ed25519 web.sourceforge.net >> ~/.ssh/known_hosts && chmod 644 ~/.ssh/known_hosts

      - name: Download new binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: combined/
          pattern: binpkg-*
          merge-multiple: true

      - name: Fetch current SourceForge state
        env:
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
        run: |
          mkdir -p public_binhost
          rsync -avz -e "ssh" $SF_USERNAME@web.sourceforge.net:/home/project-web/gentoo-nexus/htdocs/ public_binhost/ || true
          if [ -d combined ]; then cp -r combined/* public_binhost/ 2>/dev/null || true; fi

      - name: Build binhost index and remove old versions
        run: |
          cat > deploy_script.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail
          python3 << 'PYEOF'
          import portage.versions
          from pathlib import Path
          from collections import defaultdict
          from functools import cmp_to_key

          pkg_dir = Path('/overlay/public_binhost')
          groups = defaultdict(list)

          for f in list(pkg_dir.glob('*.gpkg.tar')) + list(pkg_dir.glob('*.tbz2')):
              basename = f.name.replace('.gpkg.tar', '').replace('.tbz2', '')
              parts = portage.versions.pkgsplit(basename)
              if parts:
                  pkg_name, ver, rev = parts
                  ver_str = ver + ('-' + rev if rev != 'r0' else '')
                  groups[pkg_name].append((ver_str, f))

          def ver_cmp(a, b): return portage.versions.vercmp(a, b)

          for pkg_name, items in groups.items():
              if len(items) > 1:
                  items.sort(key=cmp_to_key(ver_cmp))
                  for old_ver, old_file in items[:-1]: old_file.unlink()
          PYEOF

          if ls /overlay/public_binhost/*.gpkg.tar 1>/dev/null 2>&1 || ls /overlay/public_binhost/*.tbz2 1>/dev/null 2>&1; then
            echo 'PKGDIR="/overlay/public_binhost"' >> /etc/portage/make.conf
            emaint binhost --fix
          fi
          EOF
          chmod +x deploy_script.sh
          docker run --rm -v "${{ github.workspace }}:/overlay" -w /overlay gentoo/stage3 bash /overlay/deploy_script.sh

          FILE_LIST=$(ls -1 public_binhost/*.gpkg.tar public_binhost/*.tbz2 2>/dev/null | xargs -I{} basename {} | sort || echo "(no packages yet)")
          cat > public_binhost/index.html << HTML
          <!DOCTYPE html><html><head><title>Gentoo Nexus Binhost</title><style>body { font-family: monospace; background: #1a1a1a; color: #e0e0e0; padding: 2em; } a { color: #66d9ef; }</style></head><body><h1>Gentoo Nexus Binhost</h1><p>Last manual build: <strong>${{ github.event.inputs.atom }}</strong></p><pre>${FILE_LIST}</pre></body></html>
          HTML

      - name: Deploy to SourceForge
        env:
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
        run: |
          rsync -avz --delete -e "ssh" public_binhost/ $SF_USERNAME@web.sourceforge.net:/home/project-web/gentoo-nexus/htdocs/
