name: Manual Build

on:
  workflow_dispatch:
    inputs:
      atom:
        description: 'Package atom to build'
        required: true
        type: string
      force_rebuild:
        description: 'Force rebuild'
        required: false
        type: boolean
        default: false

concurrency:
  group: build-${{ github.event.inputs.atom }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check SourceForge Binhost Status
        id: check_bin
        run: |
          PKG="${{ github.event.inputs.atom }}"
          BINHOST="https://gentoo-nexus.sourceforge.io/Packages"

          if [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          EBUILD_FILE=$(ls -1v "${PKG}"/*.ebuild 2>/dev/null | tail -n 1)
          if [ -z "$EBUILD_FILE" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          PN=$(basename "${PKG}")
          VER=$(basename "${EBUILD_FILE}" | sed -E "s/^${PN}-//; s/\.ebuild$//")
          
          HTTP_STATUS=$(curl -sL -o sf_packages.txt -w "%{http_code}" --connect-timeout 15 --retry 3 "$BINHOST" || echo "000")
          
          if [ "$HTTP_STATUS" -eq 200 ]; then
            if grep -q "^CPV: ${PKG}-${VER}$" sf_packages.txt; then
              echo "✅ Binary for ${PKG}-${VER} exists. Skipping!"
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "🚀 No binary found. Proceeding to build."
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          elif [ "$HTTP_STATUS" -eq 404 ]; then
            echo "🚀 Index is 404 (Empty Binhost). Proceeding to build."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
             echo "🚨 SourceForge timeout ($HTTP_STATUS). Skipping to prevent damage."
             echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Binary Package
        if: steps.check_bin.outputs.skip == 'false'
        run: |
          mkdir -p job_out /tmp/distfiles
          chmod 777 /tmp/distfiles

          cat > build_script.sh << 'BUILDEOF'
          #!/bin/bash
          set -euo pipefail
          
          mkdir -p /var/db/repos/gentoo
          rm -rf /var/db/repos/gentoo/*
          emerge-webrsync -q
          eselect news read all >/dev/null 2>&1 || true
          
          command -v getuto >/dev/null 2>&1 && getuto || true
          eselect profile set default/linux/amd64/23.0/desktop
          
          emerge --unmerge --quiet sys-libs/gpm 2>/dev/null || true
          
          mkdir -p /etc/portage/{repos.conf,binrepos.conf,package.{accept_keywords,license,use,mask}}
          mkdir -p /overlay/{distfiles,job_out}

          cat > /etc/portage/package.mask/systemd << 'MASK'
          sys-apps/systemd
          sys-apps/gentoo-systemd-integration
          MASK

          cat > /etc/portage/package.mask/gpm << 'MASK'
          sys-libs/gpm
          MASK

          cat > /etc/portage/package.use/global << 'USE'
          */* -systemd -gpm
          sys-libs/ncurses -abi_x86_32
          USE

          cat > /etc/portage/binrepos.conf/gentoo.conf << 'REPOCONF'
          [gentoo]
          priority = 10000
          sync-uri = https://distfiles.gentoo.org/releases/amd64/binpackages/23.0/x86-64/
          verify-signature = false
          REPOCONF

          cat > /etc/portage/binrepos.conf/nexus.conf << 'REPOCONF'
          [gentoo-nexus-sf]
          priority = 9999
          sync-uri = https://gentoo-nexus.sourceforge.io/
          REPOCONF

          cat > /etc/portage/make.conf << 'MAKECONF'
          FEATURES="-userfetch -userpriv -usersandbox -ipc-sandbox -network-sandbox -pid-sandbox getbinpkg buildpkg"
          EMERGE_DEFAULT_OPTS="--getbinpkg --usepkg --binpkg-respect-use=y --binpkg-changed-deps=y --autounmask=y --autounmask-write --autounmask-backtrack=y --keep-going --quiet"
          DISTDIR="/var/cache/distfiles"
          PKGDIR="/overlay/job_out"
          VIDEO_CARDS="amdgpu radeonsi nouveau virgl"
          EGIT_CLONE_TYPE="single"
          ACCEPT_KEYWORDS="~amd64 amd64"
          ACCEPT_LICENSE="*"
          MAKECONF

          emerge --noreplace --quiet dev-lang/go dev-lang/rust-bin app-eselect/eselect-repository dev-vcs/git
          eselect repository enable guru 2>/dev/null || true
          emaint sync -r guru 2>/dev/null || true
          eselect news read all >/dev/null 2>&1 || true

          cat > /etc/portage/repos.conf/gentoo-nexus.conf << 'REPOCONF'
          [gentoo-nexus]
          location = /overlay
          masters = gentoo
          priority = 9999
          REPOCONF

          cat > /etc/portage/repos.conf/guru.conf << 'REPOCONF'
          [guru]
          location = /var/db/repos/guru
          masters = gentoo
          REPOCONF

          echo ">>> Shielding gentoo-nexus packages from Guru overrides..."
          for pkg in /overlay/*/*/*.ebuild; do
            [ -e "$pkg" ] || continue
            cat_pkg=$(echo "$pkg" | awk -F'/' '{print $(NF-2)"/"$(NF-1)}')
            echo "$cat_pkg::guru" >> /etc/portage/package.mask/guru_shield
          done

          echo "*/*::gentoo-nexus ~amd64" >> /etc/portage/package.accept_keywords/nexus
          echo "*/*::guru ~amd64" >> /etc/portage/package.accept_keywords/guru
          echo "*/* *" >> /etc/portage/package.license/all

          TARGET_PKG='${{ github.event.inputs.atom }}'
          echo "$TARGET_PKG **" >> /etc/portage/package.accept_keywords/target

          find /overlay -mindepth 2 -maxdepth 4 -type f -name '*.ebuild' -not -path '*/cache/*' -not -path '*/job_out/*' -not -path '*/.git/*' -exec sed -i 's/LLVM_COMPAT=( {18..21} )/LLVM_COMPAT=( {18..22} )/g' {} + || true
          find /overlay -mindepth 2 -maxdepth 4 -type f -name '*.ebuild' -not -path '*/cache/*' -not -path '*/job_out/*' -not -path '*/.git/*' -exec sed -i 's/gui-libs\/display-info/media-libs\/libdisplay-info/g' {} + || true
          find /overlay -mindepth 2 -maxdepth 4 -type f -name '*.ebuild' -not -path '*/cache/*' -not -path '*/job_out/*' -not -path '*/.git/*' -exec sed -i 's/media-libs\/mesa\[gbm\]/media-libs\/mesa/g' {} + || true
          find /overlay -mindepth 2 -maxdepth 4 -type f -name '*.ebuild' -not -path '*/cache/*' -not -path '*/job_out/*' -not -path '*/.git/*' -exec sed -i 's/media-libs\/mesa\[gbm(+)\]/media-libs\/mesa/g' {} + || true
          find /overlay -mindepth 2 -maxdepth 4 -type f -name '*.ebuild' -not -path '*/cache/*' -not -path '*/job_out/*' -not -path '*/.git/*' -exec sed -i 's/mesa\[gbm\]/mesa/g' {} + || true
          find /overlay -mindepth 2 -maxdepth 4 -type f -name '*.ebuild' -not -path '*/cache/*' -not -path '*/job_out/*' -not -path '*/.git/*' -exec sed -i 's/mesa\[gbm(+)\]/mesa/g' {} + || true

          for pkg in gui-libs/wlroots gui-libs/scenefx; do
            if [ -d "/var/db/repos/guru/$pkg" ]; then
              sed -i 's/media-libs\/mesa\/\[gbm\]/media-libs\/mesa/g' "/var/db/repos/guru/$pkg"/*.ebuild 2>/dev/null || true
              sed -i 's/media-libs\/mesa\/\[gbm(+)\]/media-libs\/mesa/g' "/var/db/repos/guru/$pkg"/*.ebuild 2>/dev/null || true
            fi
          done

          EXCLUDES="--usepkg-exclude sys-auth/polkit --usepkg-exclude dev-libs/libei --usepkg-exclude media-video/wireplumber --usepkg-exclude media-libs/libpulse --usepkg-exclude sys-apps/accountsservice --usepkg-exclude sys-auth/elogind"

          echo ">>> Compiling Main Target: $TARGET_PKG"
          emerge $EXCLUDES "$TARGET_PKG" 2>&1 || true
          for i in 1 2 3; do etc-update --automode -5 2>/dev/null || break; done
          
          emerge $EXCLUDES "$TARGET_PKG" 2>&1 || true
          for i in 1 2 3; do etc-update --automode -5 2>/dev/null || break; done

          emerge --buildpkg $EXCLUDES "$TARGET_PKG"
          BUILDEOF
          chmod +x build_script.sh

          docker run --rm --privileged \
            -v "${{ github.workspace }}:/overlay" \
            -v "/tmp/distfiles:/var/cache/distfiles" \
            gentoo/stage3:amd64-desktop-openrc bash /overlay/build_script.sh

      - name: Deploy Additively to SourceForge
        if: steps.check_bin.outputs.skip == 'false'
        env:
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_SSH_KEY: ${{ secrets.SF_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SF_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t rsa,ecdsa,ed25519 web.sourceforge.net >> ~/.ssh/known_hosts
          
          cat > deploy_script.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail
          
          python3 << 'PYEOF'
          import urllib.request
          import os
          import portage.versions
          from collections import defaultdict
          from functools import cmp_to_key

          def parse_blocks(text):
              blocks = {}
              current_block = []
              current_cpv = None
              for line in text.splitlines(True):
                  if line.startswith('PACKAGES:') or line.startswith('PKGDIR:'): continue
                  if line.startswith('CPV:'): 
                      current_cpv = line.replace('CPV:', '').strip()
                  current_block.append(line)
                  if line.strip() == '':
                      if current_cpv: blocks[current_cpv] = "".join(current_block).strip() + "\n\n"
                      current_block = []
                      current_cpv = None
              if current_cpv: blocks[current_cpv] = "".join(current_block).strip() + "\n\n"
              return blocks

          local_blocks = {}
          if os.path.exists('/overlay/job_out/Packages'):
              with open('/overlay/job_out/Packages', 'r') as f:
                  local_blocks = parse_blocks(f.read())

          server_blocks = {}
          try:
              req = urllib.request.urlopen("https://gentoo-nexus.sourceforge.io/Packages", timeout=15)
              server_blocks = parse_blocks(req.read().decode('utf-8'))
          except Exception as e:
              print("Notice: Server index missing or unreachable. Starting fresh.")

          all_blocks = {**server_blocks, **local_blocks}

          grouped = defaultdict(list)
          for cpv in all_blocks.keys():
              parts = portage.versions.pkgsplit(cpv)
              if parts:
                  pkgname, pkgver, pkgrev = parts
                  ver_str = pkgver + ('-' + pkgrev if pkgrev != 'r0' else '')
                  grouped[pkgname].append((ver_str, cpv))
              else:
                  grouped[cpv].append(('0', cpv))

          def ver_cmp(a, b): return portage.versions.vercmp(a, b)

          final_blocks = {}
          for pkgname, items in grouped.items():
              if len(items) > 1:
                  items.sort(key=cmp_to_key(lambda x, y: ver_cmp(x, y)))
              best_cpv = items[-1][-1]
              final_blocks[best_cpv] = all_blocks[best_cpv]

          with open('/overlay/job_out/Packages', 'w') as f:
              f.write("PKGDIR: .\nPACKAGES:\n\n")
              for cpv in sorted(final_blocks.keys()):
                  f.write(final_blocks[cpv])

          html = "<!DOCTYPE html><html><head><title>Gentoo Nexus Binhost</title><style>body { font-family: monospace; background: #1a1a1a; color: #e0e0e0; padding: 2em; } a { color: #66d9ef; }</style></head><body><h1>Gentoo Nexus Binhost</h1>"
          html += "<p>Last Updated: " + os.popen("date -u '+%Y-%m-%d %H:%M:%S UTC'").read().strip() + "</p><pre>\n"
          for cpv in sorted(final_blocks.keys()):
              html += f"{cpv}\n"
          html += "</pre></body></html>"
          
          with open('/overlay/job_out/index.html', 'w') as f:
              f.write(html)
          PYEOF
          EOF
          chmod +x deploy_script.sh
          docker run --rm -v "${{ github.workspace }}:/overlay" -w /overlay gentoo/stage3:amd64-desktop-openrc bash /overlay/deploy_script.sh

          echo ">>> Deploying new package additively (NO --delete) to preserve existing files..."
          rsync -avz -e "ssh -o StrictHostKeyChecking=no" job_out/ $SF_USERNAME@web.sourceforge.net:/home/project-web/gentoo-nexus/htdocs/
