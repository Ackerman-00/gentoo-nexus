name: Manual Build

on:
  workflow_dispatch:
    inputs:
      atom:
        description: 'Package atom (e.g. gui-wm/niri)'
        required: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  manual:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build Binary Asset
        run: |
          docker run --rm -v ${{ github.workspace }}:/overlay gentoo/stage3 sh -c "
            set -e
            mkdir -p /var/db/repos/gentoo /etc/portage/repos.conf
            
            # 1. Strict Sandboxing & Permission Overrides
            echo 'FEATURES=\"-userfetch -userpriv -usersandbox -ipc-sandbox -network-sandbox -pid-sandbox\"' >> /etc/portage/make.conf
            echo 'DISTDIR=\"/overlay/distfiles\"' >> /etc/portage/make.conf
            mkdir -p /overlay/distfiles

            emerge-webrsync -q

            # 2. Pre-install heavy toolchains to prevent Actions timeouts
            emerge --noreplace dev-lang/go dev-lang/rust-bin

            # 3. Enable GURU for dependencies
            emerge --noreplace app-eselect/eselect-repository dev-vcs/git
            eselect repository enable guru
            emaint sync -r guru

            # 4. Configure Overlay & Global USE flags
            echo 'USE=\"wayland vulkan pipewire -X -systemd\"' >> /etc/portage/make.conf
            echo -e '[gentoo-nexus]\nlocation = /overlay\nmasters = gentoo\npriority = 9999' > /etc/portage/repos.conf/gentoo-nexus.conf
            echo -e '[guru]\nlocation = /var/db/repos/guru\nmasters = gentoo' >> /etc/portage/repos.conf/guru.conf

            # 5. Build the requested package
            emerge --autounmask=y --autounmask-write --autounmask-continue --buildpkg --quiet ${{ github.event.inputs.atom }}

            # 6. Setup Binhost Index (Checking for modern .gpkg.tar format)
            mkdir -p /overlay/public_binhost
            cp -r /var/cache/binpkgs/* /overlay/public_binhost/ 2>/dev/null || true
            cd /overlay/public_binhost
            
            if ls *.gpkg.tar 1>/dev/null 2>&1; then
                emaint binhost --fix
            fi
            
            touch .nojekyll
            chown -R $(id -u):$(id -g) /overlay/public_binhost
          "

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public_binhost/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4