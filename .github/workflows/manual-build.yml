name: Manual Build

on:
  workflow_dispatch:
    inputs:
      atom:
        description: 'Package atom (e.g. gui-wm/niri)'
        required: true

jobs:
  manual:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Build
        run: |
          docker run --rm -v ${{ github.workspace }}:/overlay gentoo/stage3 sh -c "
            emerge-webrsync -q && emerge --noreplace dev-lang/rust-bin
            echo -e '[overlay]\nlocation = /overlay\nmasters = gentoo' > /etc/portage/repos.conf/overlay.conf
            emerge --buildpkg ${{ github.event.inputs.atom }}
            mkdir -p /overlay/public && cp -r /var/cache/binpkgs/* /overlay/public/
            cd /overlay/public && emaint binhost --fix
            chown -R $(id -u):$(id -g) /overlay/public
          "
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true
