name: Check Gentoo Official Updates

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Space-separated package atoms to force rebuild (e.g. media-libs/mesa sys-kernel/gentoo-kernel)'
        required: false
        default: ''

permissions:
  contents: write
  actions: write

jobs:
  check:
    name: Check for Updates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true

      - name: Prepare Workspace
        run: |
          mkdir -p binpkgs distfiles
          chmod -R 777 binpkgs distfiles

      - name: Scan Tracked Packages for Updates
        id: scan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          TRACKED_PKGS="llvm-core/llvm llvm-core/clang llvm-runtimes/compiler-rt dev-libs/roct-thunk-interface dev-libs/rocr-runtime dev-libs/rocm-opencl-runtime sys-kernel/linux-firmware x11-drivers/xf86-video-amdgpu media-libs/vulkan-loader sys-kernel/gentoo-kernel sys-apps/portage media-libs/mesa games-util/heroic-bin app-editors/zed dev-util/rustup"
          FORCE="${{ github.event.inputs.force_rebuild }}"

          echo ">>> Fetching rolling release assets..."
          EXISTING_ASSETS=$(gh release view rolling --json assets --jq '.assets[].name' 2>/dev/null || echo "")

          echo ">>> Resolving latest versions from Gentoo tree..."
          cat > resolve_versions.sh << 'SCRIPT'
          #!/bin/bash
          source /etc/profile
          emerge-webrsync -q
          eselect profile set default/linux/amd64/23.0/desktop 2>/dev/null || true
          for pkg in "$@"; do
            portageq best_visible / "$pkg" 2>/dev/null || echo ""
          done
          SCRIPT
          chmod +x resolve_versions.sh
          docker run --rm \
            -v "${{ github.workspace }}/resolve_versions.sh:/resolve_versions.sh:ro" \
            gentoo/stage3:amd64-desktop-openrc \
            bash /resolve_versions.sh $TRACKED_PKGS > latest_cpvs.txt

          BUILD_QUEUE=""
          i=1
          for PKG in $TRACKED_PKGS; do
            CPV=$(sed -n "${i}p" latest_cpvs.txt)
            i=$((i + 1))

            echo ">>> Checking: $PKG"

            # Force rebuild — always include as unversioned atom
            if echo "$FORCE" | tr ' ' '\n' | grep -qxF "$PKG"; then
              echo "  FORCE: $PKG"
              BUILD_QUEUE="$BUILD_QUEUE $PKG"
              continue
            fi

            if [ -z "$CPV" ]; then
              echo "  CANNOT RESOLVE: $PKG — adding to queue"
              BUILD_QUEUE="$BUILD_QUEUE $PKG"
              continue
            fi

            # Extract PN-PVR (e.g. mesa-26.1.3) and check rolling release assets
            PN_PV="${CPV#*/}"
            export EXISTING_ASSETS
            if python3 -c "
                import os, re
                assets = os.environ['EXISTING_ASSETS']
                pn_pv = '$PN_PV'
                pattern = r'^' + re.escape(pn_pv) + r'(-[0-9]+)?\.gpkg\.tar$'
                for a in assets.splitlines():
                    if re.match(pattern, a.strip()):
                        sys.exit(0)
                sys.exit(1)
            "; then
              echo "  EXISTS: $CPV"
            else
              echo "  MISSING: $CPV"
              BUILD_QUEUE="$BUILD_QUEUE =$CPV"
            fi
          done

          BUILD_QUEUE="${BUILD_QUEUE# }"
          if [ -z "$BUILD_QUEUE" ]; then
            echo ">>> All packages up to date. Nothing to build."
          else
            echo ">>> Packages to build: $BUILD_QUEUE"
            gh workflow run "Build Gentoo Official" \
              --ref "${{ github.ref_name }}" \
              --repo ${{ github.repository }} \
              -f package_list="$BUILD_QUEUE" \
              -f force_rebuild="$FORCE"
          fi
