name: Check Gentoo Official Updates

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      package_list:
        description: 'Space-separated list of =cat/pkg-ver to build manually (e.g. "=media-libs/mesa-26.1.5 =sys-apps/portage-3.0.81.2"). Overrides auto-detect when provided.'
        required: false
        default: ''
        type: string
      force_rebuild:
        description: 'Force rebuild of the provided package_list even if already present in rolling (true, or space-separated atom list). Only applies when package_list is set.'
        required: false
        default: ''
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  check:
    name: Check for Updates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:

      # ---- topic: checkout-setup ----
      - uses: actions/checkout@v6

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true

      # ---- topic: workspace ----
      - name: Prepare Workspace
        run: |
          mkdir -p binpkgs distfiles
          chmod -R 777 binpkgs distfiles

      # ---- topic: scan-versions ----
      - name: Scan Tracked Packages for Updates
        id: scan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
           TRACKED_PKGS="llvm-core/llvm llvm-core/clang llvm-runtimes/compiler-rt sys-devel/gcc dev-libs/roct-thunk-interface dev-libs/rocr-runtime dev-libs/rocm-opencl-runtime sys-kernel/linux-firmware x11-drivers/xf86-video-amdgpu media-libs/vulkan-loader sys-kernel/gentoo-kernel sys-apps/portage media-libs/mesa media-libs/libva-intel-media-driver dev-util/mesa_clc media-video/ffmpeg games-util/heroic-bin app-editors/zed dev-util/rustup media-gfx/blender-bin dev-games/godot"

           MANUAL_LIST="${{ github.event.inputs.package_list }}"
           MANUAL_FORCE="${{ github.event.inputs.force_rebuild }}"

           if [ -n "$MANUAL_LIST" ]; then
             echo ">>> Manual package_list provided — skipping auto-detect."
             BUILD_QUEUE=""
             for atom in $MANUAL_LIST; do
               BUILD_QUEUE="$BUILD_QUEUE $atom"
             done
             BUILD_QUEUE="${BUILD_QUEUE# }"
             echo "build_list=$BUILD_QUEUE" >> "$GITHUB_OUTPUT"
             echo "force_rebuild=$MANUAL_FORCE" >> "$GITHUB_OUTPUT"
             echo ">>> Manual packages to build: $BUILD_QUEUE (force: '${MANUAL_FORCE:-false}')"
             exit 0
           fi

           echo ">>> Fetching rolling release assets..."
          EXISTING_ASSETS=$(gh release view rolling --json assets --jq '.assets[].name' 2>/dev/null || echo "")

          echo ">>> Resolving latest versions from Gentoo tree..."
          cat > resolve_versions.sh << 'SCRIPT'
          #!/bin/bash
          source /etc/profile
          emerge-webrsync -q >&2 || true
            eselect profile set default/linux/amd64/23.0/desktop/gnome >&2 2>/dev/null || true
           export ACCEPT_KEYWORDS="~amd64"
           export ACCEPT_LICENSE="*"
           for pkg in "$@"; do
             portageq best_visible / "$pkg" 2>/dev/null || echo ""
           done
          SCRIPT
          chmod +x resolve_versions.sh
          docker run --rm \
            -v "${{ github.workspace }}/resolve_versions.sh:/resolve_versions.sh:ro" \
            gentoo/stage3:amd64-desktop-openrc \
            bash /resolve_versions.sh $TRACKED_PKGS > latest_cpvs.txt

          BUILD_QUEUE=""
          i=1
          for PKG in $TRACKED_PKGS; do
            CPV=$(sed -n "${i}p" latest_cpvs.txt)
            i=$((i + 1))

            echo ">>> Checking: $PKG"

            if [ -z "$CPV" ]; then
              echo "  CANNOT RESOLVE: $PKG — adding to queue"
              BUILD_QUEUE="$BUILD_QUEUE $PKG"
              continue
            fi

            # Extract PN-PVR (e.g. mesa-26.1.3) and check rolling release assets
            PN_PV="${CPV#*/}"
            export EXISTING_ASSETS PN_PV
            if python3 << 'PYEOF'; then
          import os, re, sys
          assets = os.environ['EXISTING_ASSETS']
          pn_pv = os.environ['PN_PV']
          pattern = r'^' + re.escape(pn_pv) + r'(-[0-9]+)?\.gpkg\.tar$'
          for a in assets.splitlines():
              if re.match(pattern, a.strip()):
                  sys.exit(0)
          sys.exit(1)
          PYEOF
              echo "  EXISTS: $CPV"
            else
              echo "  MISSING: $CPV"
              BUILD_QUEUE="$BUILD_QUEUE =$CPV"
            fi
          done

          BUILD_QUEUE="${BUILD_QUEUE# }"
          echo "build_list=$BUILD_QUEUE" >> "$GITHUB_OUTPUT"
          echo "force_rebuild=" >> "$GITHUB_OUTPUT"

          if [ -z "$BUILD_QUEUE" ]; then
            echo ">>> All packages up to date. Nothing to build."
          else
            echo ">>> Packages to build: $BUILD_QUEUE"
          fi

      # ---- topic: trigger-relay ----
      - name: Trigger Relay
        if: steps.scan.outputs.build_list != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRIORITY_ORDER=(
            "llvm-core/llvm"
            "llvm-core/clang"
            "llvm-runtimes/compiler-rt"
            "sys-devel/gcc"
            "dev-libs/roct-thunk-interface"
            "dev-libs/rocr-runtime"
            "dev-libs/rocm-opencl-runtime"
            "sys-kernel/linux-firmware"
            "x11-drivers/xf86-video-amdgpu"
            "media-libs/vulkan-loader"
            "sys-kernel/gentoo-kernel"
            "sys-apps/portage"
            "media-libs/mesa"
            "dev-util/mesa_clc"
            "games-util/heroic-bin"
            "app-editors/zed"
            "dev-util/rustup"
            "media-gfx/blender-bin"
            "dev-games/godot"
          )
          RAW_LIST="${{ steps.scan.outputs.build_list }}"
          ORDERED=()
          for priority_pkg in "${PRIORITY_ORDER[@]}"; do
            for exact_pkg in $RAW_LIST; do
              if echo "$exact_pkg" | grep -q "$priority_pkg"; then ORDERED+=("$exact_pkg"); fi
            done
          done
          for exact_pkg in $RAW_LIST; do
            already=false
            for p in "${ORDERED[@]}"; do [ "$p" == "$exact_pkg" ] && already=true && break; done
            [ "$already" = false ] && ORDERED+=("$exact_pkg")
          done
          FINAL_LIST="${ORDERED[*]}"
          echo ">>> Queueing for compilation: $FINAL_LIST"
          gh workflow run "Build Gentoo Official" \
            --ref "${{ github.ref_name }}" \
            --repo ${{ github.repository }} \
            -f package_list="$FINAL_LIST" \
            -f force_rebuild="${{ steps.scan.outputs.force_rebuild }}"
