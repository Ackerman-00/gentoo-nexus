name: Manual Build (The Sniper)

on:
  workflow_dispatch:
    inputs:
      atom:
        description: 'Package atom to build (e.g. games-util/steam-launcher)'
        required: true
        type: string
      force_rebuild:
        description: 'Force rebuild even if binary exists on Pages'
        required: false
        type: boolean
        default: false

concurrency:
  group: build-${{ github.event.inputs.atom }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check GitHub Pages Binhost Status
        id: check_bin
        run: |
          PKG="${{ github.event.inputs.atom }}"
          BINHOST="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/Packages"

          if [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          EBUILD_FILE=$(ls -1v "${PKG}"/*.ebuild 2>/dev/null | tail -n 1)
          if [ -z "$EBUILD_FILE" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          PN=$(basename "${PKG}")
          VER=$(basename "${EBUILD_FILE}" | sed -E "s/^${PN}-//; s/\.ebuild$//")
          
          HTTP_STATUS=$(curl -sL -o gh_packages.txt -w "%{http_code}" --connect-timeout 15 --retry 3 "$BINHOST" || echo "000")
          
          if [ "$HTTP_STATUS" -eq 200 ]; then
            if grep -q "^CPV: ${PKG}-${VER}$" gh_packages.txt; then
              echo "✅ Binary for ${PKG}-${VER} exists on Pages. Skipping!"
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "🚀 No binary found. Proceeding to build."
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          elif [ "$HTTP_STATUS" -eq 404 ]; then
            echo "🚀 Index is 404 (Empty Binhost). Proceeding to build."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
             echo "🚨 Timeout ($HTTP_STATUS). Skipping to prevent damage."
             echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Binary Package
        if: steps.check_bin.outputs.skip == 'false'
        run: |
          mkdir -p job_out /tmp/distfiles
          chmod 777 /tmp/distfiles

          cat > build_script.sh << 'BUILDEOF'
          #!/bin/bash
          set -euo pipefail
          
          echo ">>> Initializing Gentoo Stage3 Container..."
          mkdir -p /var/db/repos/gentoo /etc/portage/{repos.conf,binrepos.conf,env,package.{accept_keywords,license,use,mask,env}} /overlay/{distfiles,job_out}
          emerge-webrsync -q
          eselect profile set default/linux/amd64/23.0/desktop
          
          emerge --unmerge --quiet sys-libs/gpm 2>/dev/null || true

          echo ">>> Configuring Repository Overlays..."
          emerge --noreplace --quiet dev-lang/go dev-lang/rust-bin app-eselect/eselect-repository dev-vcs/git
          eselect repository enable guru steam-overlay 2>/dev/null || true
          emaint sync -r guru steam-overlay 2>/dev/null || true

          cat > /etc/portage/repos.conf/gentoo-nexus.conf << 'REPOCONF'
          [gentoo-nexus]
          location = /overlay
          masters = gentoo
          priority = 9999
          REPOCONF
          
          # Architect Fix: Force portage to index the custom overlay before building
          emaint sync -r gentoo-nexus 2>/dev/null || true
          egencache --repo=gentoo-nexus --update

          echo ">>> Configuring Universal Make.conf..."
          cat > /etc/portage/make.conf << 'MAKECONF'
          COMMON_FLAGS="-O2 -march=x86-64-v3 -pipe"
          CFLAGS="${COMMON_FLAGS}"
          CXXFLAGS="${COMMON_FLAGS}"
          RUSTFLAGS="-C target-cpu=x86-64-v3 -C opt-level=2"
          USE="wayland X vulkan pipewire dbus elogind udev opengl dri gbm vaapi vdpau ffmpeg bluetooth screencast gstreamer minizip -daemon -systemd -aqua -cups"
          VIDEO_CARDS="amdgpu radeon radeonsi intel iris nouveau virgl"
          LINUX_FIRMWARE="amd-ucode intel-ucode amdgpu nvidia i915 rtl_nic ath10k ath11k iwlwifi mt76 rtw88 rtw89"
          FEATURES="-userfetch -userpriv -usersandbox -ipc-sandbox -network-sandbox -pid-sandbox buildpkg parallel-install"
          EMERGE_DEFAULT_OPTS="--usepkg --binpkg-respect-use=y --binpkg-changed-deps=n --rebuilt-binaries=n --autounmask=y --autounmask-write --autounmask-backtrack=y --keep-going --quiet"
          DISTDIR="/var/cache/distfiles"
          PKGDIR="/overlay/job_out"
          ACCEPT_LICENSE="*"
          MAKECONF

          CORES=$(nproc)
          echo "MAKEOPTS=\"-j${CORES} -l${CORES}\"" >> /etc/portage/make.conf

          cat > /etc/portage/package.mask/fixes << 'MASK'
          sys-apps/systemd
          sys-apps/gentoo-systemd-integration
          sys-libs/gpm
          =x11-misc/ly-9999
          =gui-libs/scenefx-9999
          MASK

          cat > /etc/portage/package.use/global << 'USE'
          */* -systemd -gpm
          sys-libs/ncurses -abi_x86_32
          media-video/pipewire extra sound-server
          media-video/wireplumber extra
          sys-kernel/gentoo-kernel savedconfig initramfs
          sys-kernel/installkernel dracut grub
          USE

          echo "*/* *" >> /etc/portage/package.license/all
          echo "*/*::steam-overlay **" >> /etc/portage/package.accept_keywords/steam
          echo "*/*::gentoo-nexus **" >> /etc/portage/package.accept_keywords/nexus
          echo "*/*::guru **" >> /etc/portage/package.accept_keywords/guru
          
          TARGET_PKG="${{ github.event.inputs.atom }}"

          echo ">>> Compiling Target..."
          for i in 1 2 3; do emerge --deep --newuse "$TARGET_PKG" 2>&1 && break || etc-update --automode -5; done
          emerge --deep --newuse "$TARGET_PKG"
          
          BUILDEOF
          chmod +x build_script.sh

          docker run --rm --privileged \
            -v "${{ github.workspace }}:/overlay" \
            -v "/tmp/distfiles:/var/cache/distfiles" \
            gentoo/stage3:amd64-desktop-openrc bash /overlay/build_script.sh

      # =====================================================================
      # PHASE 5: SPLIT-BRAIN DEPLOYMENT (RELEASES + PAGES)
      # =====================================================================
      - name: Deploy to GitHub Releases & Pages
        if: steps.check_bin.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(find job_out -name '*.gpkg.tar' 2>/dev/null)" ]; then exit 0; fi

          echo ">>> Uploading to Releases..."
          gh release view rolling || gh release create rolling --title "Nexus Rolling Packages" --notes "Automated OS Binaries"
          find job_out -name '*.gpkg.tar' -exec gh release upload rolling {} --clobber \;

          echo ">>> Updating Index on Pages..."
          git config --global user.name "github-actions[bot]"
          git config --global user.email "bot@github.com"
          git clone --branch gh-pages https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git pages_repo || { git init pages_repo; cd pages_repo; git checkout -b gh-pages; cd ..; }

          python3 << 'EOF'
          import os
          base_url = f"https://github.com/{os.environ.get('GITHUB_REPOSITORY')}/releases/download/rolling/"
          
          def get_blocks(path):
              blocks = {}
              if not os.path.exists(path): return blocks
              with open(path, 'r') as f:
                  cpv, cur = None, []
                  for line in f:
                      if line.startswith('PACKAGES:') or line.startswith('PKGDIR:'): continue
                      if line.strip() == '':
                          if cpv: blocks[cpv] = cur
                          cpv, cur = None, []
                      else:
                          if line.startswith('CPV:'): cpv = line.split(':', 1).strip()
                          cur.append(line.strip())
                  if cpv: blocks[cpv] = cur
              return blocks

          new_b = get_blocks('/home/runner/work/${{ github.event.repository.name }}/${{ github.event.repository.name }}/job_out/Packages')
          old_b = get_blocks('pages_repo/Packages')

          for cpv, lines in new_b.items():
              rel_path = next((l.split(':',1).strip() for l in lines if l.startswith('PATH:')), cpv+".gpkg.tar")
              lines = [l for l in lines if not l.startswith('URI:')]
              lines.append(f"URI: {base_url}{os.path.basename(rel_path)}")
              old_b[cpv] = lines

          with open('pages_repo/Packages', 'w') as f:
              f.write("PKGDIR: .\nPACKAGES:\n\n")
              for cpv in sorted(old_b.keys()):
                  f.write("\n".join(old_b[cpv]) + "\n\n")
          EOF

          cd pages_repo
          git add Packages
          git commit -m "Update Binhost via Manual Sniper" || true
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git gh-pages
