name: Check Official Package Updates

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Space-separated package atoms to force rebuild (e.g. media-libs/mesa sys-kernel/gentoo-kernel)'
        required: false
        default: ''

permissions:
  contents: write
  actions: write

jobs:
  check:
    name: Check for Updates
    runs-on: ubuntu-latest
    outputs:
      build_queue: ${{ steps.scan.outputs.BUILD_QUEUE }}
      has_builds: ${{ steps.scan.outputs.HAS_BUILDS }}
    steps:
      - uses: actions/checkout@v5

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true

      - name: Prepare Workspace
        run: |
          mkdir -p binpkgs distfiles
          chmod -R 777 binpkgs distfiles

      - name: Download Rolling Release Packages Index
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download rolling \
            -p "Packages*" \
            --repo ${{ github.repository }} \
            --dir binpkgs --clobber 2>/dev/null || \
            echo "No existing rolling release found"

      - name: Scan Tracked Packages for Updates
        id: scan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TRACKED_PKGS="llvm-core/llvm llvm-core/clang llvm-runtimes/compiler-rt dev-libs/roct-thunk-interface dev-libs/rocr-runtime dev-libs/rocm-opencl-runtime sys-kernel/linux-firmware x11-drivers/xf86-video-amdgpu media-libs/vulkan-loader sys-kernel/gentoo-kernel sys-apps/portage media-libs/mesa games-util/heroic-bin app-editors/zed dev-util/rustup"
          FORCE="${{ github.event.inputs.force_rebuild }}"
          BUILD_QUEUE=""

          check_package() {
            local pkg="$1"
            # If force-rebuilt, always include
            if echo "$FORCE" | tr ' ' '\n' | grep -qxF "$pkg"; then
              echo "  FORCE: $pkg"
              return 0
            fi

            # Check if any version exists in Packages
            local cat="${pkg%/*}"
            local pn="${pkg#*/}"
            if grep -q "^CPV: ${cat}/${pn}-" binpkgs/Packages 2>/dev/null; then
              local existing=$(grep "^CPV: ${cat}/${pn}-" binpkgs/Packages | tail -1 | awk '{print $2}')
              echo "  EXISTS: $pkg → $existing"
              return 1
            fi

            echo "  MISSING: $pkg"
            return 0
          }

          # Download latest Packages index from rolling release
          gh release download rolling \
            -p "Packages*" \
            --repo ${{ github.repository }} \
            --dir binpkgs --clobber 2>/dev/null || \
            echo "No existing rolling release found — will build all packages"

          for PKG in $TRACKED_PKGS; do
            echo ">>> Checking: $PKG"
            if check_package "$PKG"; then
              BUILD_QUEUE="$BUILD_QUEUE $PKG"
            fi
          done

          BUILD_QUEUE="${BUILD_QUEUE# }"
          echo "BUILD_QUEUE=$BUILD_QUEUE" >> "$GITHUB_OUTPUT"
          if [ -n "$BUILD_QUEUE" ]; then
            echo "HAS_BUILDS=true" >> "$GITHUB_OUTPUT"
            echo ">>> Packages to build: $BUILD_QUEUE"
          else
            echo "HAS_BUILDS=false" >> "$GITHUB_OUTPUT"
            echo ">>> All packages up to date. Nothing to build."
          fi

  trigger-build:
    name: Build Packages
    needs: [check]
    if: needs.check.outputs.has_builds == 'true'
    uses: ./.github/workflows/gentoo-build-official.yml
    with:
      package_list: ${{ needs.check.outputs.build_queue }}
    secrets: inherit
