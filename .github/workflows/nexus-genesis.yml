name: Nexus Genesis (Parallel Sync Pipeline)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      atom:
        description: 'Sniper Mode: Package atom to build (e.g., games-util/steam-launcher)'
        required: false
        type: string
        default: ''
      force_rebuild:
        description: 'Sniper Mode: Force rebuild even if binary exists'
        required: false
        type: boolean
        default: false
      force_full_run:
        description: 'Force Full Cluster Run (Bypass Scan & Audit)'
        required: false
        type: boolean
        default: false

concurrency:
  group: build-nexus-genesis
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  # =====================================================================
  # PHASE 1: OVERLAY SCAN & PATCHING
  # =====================================================================
  overlay-scan:
    name: Overlay Deep Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      updates_found: ${{ steps.audit.outputs.updates_found }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools xvfb jq
          pip install requests packaging

      - name: Deep Upstream Scan & Ebuild Patching
        id: scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          find . -path ./cache -prune -o -type f -name '*.ebuild' -exec sed -i 's/LLVM_COMPAT=( {18..21} )/LLVM_COMPAT=( {18..22} )/g' {} + || true
          find . -path ./cache -prune -o -type f -name '*.ebuild' -exec sed -i 's/gui-libs\/display-info/media-libs\/libdisplay-info/g' {} + || true
          find . -path ./cache -prune -o -type f -name '*.ebuild' -exec sed -i 's/media-libs\/mesa\[gbm\]/media-libs\/mesa/g' {} + || true
          find . -path ./cache -prune -o -type f -name '*.ebuild' -exec sed -i 's/media-libs\/mesa\[gbm(+)\]/media-libs\/mesa/g' {} + || true
          find gui-wm/mangowc -type f -name '*.ebuild' -exec sed -i 's/mangowm\/mangowc/mangowm\/mango/g' {} + || true

          python3 << 'EOF'
          import os, re, requests, subprocess, stat, shutil
          from pathlib import Path
          from packaging.version import parse as parse_version

          updated_atoms = set()
          gh_token = os.environ.get('GITHUB_TOKEN')
          hdrs = {"Authorization": f"token {gh_token}"} if gh_token else dict()

          def get_latest_github_release(repo):
              try:
                  r = requests.get(f"https://api.github.com/repos/{repo}/releases/latest", headers=hdrs, timeout=15)
                  if r.status_code == 200:
                      tag = r.json().get("tag_name", "").lstrip("v")
                      if tag and re.match(r'^[0-9]', tag): return tag
                  r2 = requests.get(f"https://api.github.com/repos/{repo}/tags", headers=hdrs, timeout=15)
                  if r2.status_code == 200:
                      for tag in r2.json():
                          name = tag.get("name", "").lstrip("v")
                          if re.match(r'^[0-9]', name): return name
              except Exception: pass
              return None

          def get_latest_commit(repo_url):
              try:
                  out = subprocess.check_output(["git", "ls-remote", repo_url, "HEAD"], timeout=30, stderr=subprocess.DEVNULL).decode()
                  m = re.search(r"([a-f0-9]{40})", out)
                  if m: return m.group(1)
              except Exception: pass
              return None

          def get_rootapp_version():
              appimage = "/tmp/Root.AppImage"
              subprocess.run(["wget", "-qO", appimage, "https://installer.rootapp.com/installer/Linux/X64/Root.AppImage"])
              if not os.path.exists(appimage): return None
              os.chmod(appimage, stat.S_IRWXU)
              subprocess.run([appimage, "--appimage-extract"], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
              ver = None
              if os.path.exists("squashfs-root"):
                  for d_file in Path("squashfs-root").glob("*.desktop"):
                      txt = d_file.read_text(encoding="utf-8")
                      m = re.search(r'^X-AppImage-Version=(.+)', txt, re.M | re.I)
                      if m: ver = m.group(1).strip()
                      break
                  if ver in (None, "1.0", "1.0.0"):
                      os.system("xvfb-run -a ./squashfs-root/AppRun > /tmp/startup.log 2>&1 & sleep 5 && pkill -f AppRun || true")
                      if os.path.exists("/tmp/startup.log"):
                          log = Path("/tmp/startup.log").read_text(encoding="utf-8")
                          m = re.search(r'Root Version:\s*([0-9]+\.[0-9]+\.[0-9]+)', log, re.I)
                          if m: ver = m.group(1)
                  shutil.rmtree("squashfs-root", ignore_errors=True)
              os.remove(appimage)
              return ver

          for ebuild_path in Path('.').rglob('*.ebuild'):
              if 'cache' in ebuild_path.parts or 'job_out' in ebuild_path.parts: continue
              pkg_dir = ebuild_path.parent
              *parent_parts, cat_name, pkg_name = pkg_dir.parts
              pkg_cat_name = f"{cat_name}/{pkg_name}"
              
              content = ebuild_path.read_text(encoding="utf-8")
              is_live = ebuild_path.name.endswith('-9999.ebuild') or 'git-r3' in content
              
              if pkg_name == "rootapp-bin":
                  new_ver = get_rootapp_version()
                  if new_ver:
                      curr_ver_m = re.search(r'-([0-9][0-9.]*(?:_p[0-9]+)?(?:-r[0-9]+)?)\.ebuild$', ebuild_path.name)
                      curr_ver = curr_ver_m.group(1) if curr_ver_m else None
                      if curr_ver and new_ver != curr_ver:
                          new_path = pkg_dir / f"{pkg_name}-{new_ver}.ebuild"
                          ebuild_path.rename(new_path)
                          updated_atoms.add(pkg_cat_name)
                  continue

              repo_m = re.search(r'https://github\.com/([A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+?)(?:\.git|/archive|/releases|/tarball|"\s|\n)', content)
              if not repo_m: continue
              repo = repo_m.group(1)
              if repo.endswith('.git'): repo = repo[:-4]

              if is_live:
                  repo_url = f"https://github.com/{repo}.git"
                  new_commit = get_latest_commit(repo_url)
                  if new_commit:
                      new_content = content
                      short_commit = new_commit[:12]
                      if "EGIT_COMMIT=" in new_content:
                          new_content = re.sub(r'(EGIT_COMMIT=["\']?)[a-fA-F0-9]{7,40}(["\']?)', r"\g<1>" + short_commit + r"\2", new_content)
                      else:
                          new_content = re.sub(r"(^EAPI=.*)", r'\1\nEGIT_COMMIT="' + short_commit + '"', new_content, count=1, flags=re.MULTILINE)
                      if "_commit=" in new_content:
                          new_content = re.sub(r'(_commit=["\']?)[a-fA-F0-9]{7,40}(["\']?)', r"\g<1>" + new_commit + r"\2", new_content)

                      if new_content != content:
                          ebuild_path.write_text(new_content, encoding="utf-8")
                          updated_atoms.add(pkg_cat_name)
              else:
                  curr_ver_m = re.search(r'-([0-9][0-9.]*(?:_p[0-9]+)?(?:-r[0-9]+)?)\.ebuild$', ebuild_path.name)
                  if not curr_ver_m: continue
                  curr_ver = curr_ver_m.group(1)
                  
                  latest_ver = get_latest_github_release(repo)
                  if latest_ver:
                      if pkg_name == "mangowc" and latest_ver.startswith("12."): latest_ver = "0." + latest_ver
                      try: is_newer = parse_version(latest_ver) > parse_version(curr_ver)
                      except: is_newer = (latest_ver != curr_ver)
                      
                      if is_newer:
                          new_path = pkg_dir / f"{pkg_name}-{latest_ver}.ebuild"
                          ebuild_path.rename(new_path)
                          updated_atoms.add(pkg_cat_name)

          if updated_atoms:
              Path('changed_packages.txt').write_text('\n'.join(updated_atoms) + '\n', encoding="utf-8")
          EOF

      - name: Smart Binhost Audit
        id: audit
        run: |
          BINHOST_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/Packages"
          HTTP_STATUS=$(curl -sL -o gh_packages.txt -w "%{http_code}" --connect-timeout 15 --retry 3 "$BINHOST_URL" || echo "000")
          if [ "$HTTP_STATUS" != "200" ]; then touch gh_packages.txt; fi
          
          echo ">>> Auditing Overlay Packages Against Binhost..."
          for ebuild in */*/*.ebuild; do
              [ -e "$ebuild" ] || continue
              pkg_dir=$(dirname "$ebuild")
              CATEGORY=$(dirname "$pkg_dir")
              EBUILD_NAME=$(basename "$ebuild" .ebuild)
              CPV="${CATEGORY}/${EBUILD_NAME}"
              
              if ! grep -q "^CPV: $CPV$" gh_packages.txt; then
                  echo "$pkg_dir" >> changed_packages.txt
                  echo "Missing binary detected: $CPV"
              fi
          done

          echo ">>> Auditing Core OS Packages Against Binhost..."
          CORE_ATOMS="sys-kernel/gentoo-kernel media-libs/mesa media-libs/vulkan-loader sys-boot/grub sys-auth/elogind"
          for atom in $CORE_ATOMS; do
              if ! grep -q "^CPV: $atom-" gh_packages.txt; then
                  echo "🚨 Core package $atom is missing! Forcing cluster rebuild."
                  touch core_missing.flag
              fi
          done

          UPDATES="false"
          if [ -f core_missing.flag ]; then UPDATES="true"; fi
          if [ -f changed_packages.txt ] && [ -s changed_packages.txt ]; then 
              sort -u changed_packages.txt > changed_packages_unique.txt
              mv changed_packages_unique.txt changed_packages.txt
              UPDATES="true"
          fi
          
          echo "updates_found=$UPDATES" >> "$GITHUB_OUTPUT"

      - name: Commit & Upload Overlay State
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "bot: auto-update ebuilds and manifests"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin HEAD:"${GITHUB_REF_NAME}"
          fi
          
      - name: Upload Workspace
        uses: actions/upload-artifact@v4
        with:
          name: overlay-workspace
          path: .
          include-hidden-files: true


  # =====================================================================
  # TIER 1: VANGUARD ISOLATION (Kernel & Mesa run first, in parallel)
  # =====================================================================
  
  build-kernel:
    name: Vanguard Kernel
    needs: overlay-scan
    if: github.event.inputs.atom == '' && (needs.overlay-scan.outputs.updates_found == 'true' || github.event_name == 'schedule' || github.event.inputs.force_full_run == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: overlay-workspace
          path: .
      - uses: actions/cache@v4
        with:
          path: /tmp/ccache
          key: ccache-kernel-${{ github.run_id }}
          restore-keys: |
            ccache-kernel-
      - name: Execute Kernel Build
        run: |
          mkdir -p job_out /tmp/distfiles /tmp/ccache
          chmod 777 /tmp/distfiles /tmp/ccache
          cat > build_script.sh << 'BUILDEOF'
          #!/bin/bash
          set -euo pipefail
          mkdir -p /var/db/repos/{gentoo,guru,steam-overlay} /etc/portage/{repos.conf,binrepos.conf,env,package.{accept_keywords,license,use,mask,env}} /overlay/{distfiles,job_out} /etc/portage/savedconfig/sys-kernel/
          
          cat > /etc/portage/binrepos.conf/gentoo.conf << 'EOF'
          [gentoo]
          priority = 10000
          sync-uri = https://distfiles.gentoo.org/releases/amd64/binpackages/23.0/x86-64/
          verify-signature = false
          EOF

          cat > /etc/portage/binrepos.conf/nexus.conf << 'EOF'
          [gentoo-nexus-gh]
          priority = 9999
          sync-uri = https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          verify-signature = false
          EOF

          cat >> /etc/portage/make.conf << 'MAKECONF'
          COMMON_FLAGS="-O2 -march=x86-64 -pipe"
          CFLAGS="${COMMON_FLAGS}"
          CXXFLAGS="${COMMON_FLAGS}"
          RUSTFLAGS="-C target-cpu=x86-64 -C opt-level=2"
          USE="wayland X vulkan pipewire dbus udev opengl dri gbm vaapi vdpau ffmpeg minizip -daemon -systemd -aqua -cups"
          VIDEO_CARDS="amdgpu radeon radeonsi intel iris nouveau virgl"
          FEATURES="-sandbox -usersandbox -ipc-sandbox -network-sandbox -pid-sandbox buildpkg parallel-install getbinpkg -binpkg-request-signature ccache"
          CCACHE_DIR="/var/cache/ccache"
          CCACHE_UMASK="002"
          EMERGE_DEFAULT_OPTS="--getbinpkg --usepkg --binpkg-respect-use=y --binpkg-changed-deps=y --autounmask=y --autounmask-write --keep-going --quiet"
          DISTDIR="/var/cache/distfiles"
          PKGDIR="/overlay/job_out"
          ACCEPT_LICENSE="*"
          EVCS_OFFLINE=1
          MAKECONF
          echo "MAKEOPTS=\"-j$(nproc)\"" >> /etc/portage/make.conf

          emerge-webrsync -q || true
          getuto || true
          eselect profile set default/linux/amd64/23.0/desktop
          
          echo ">>> Bootstrapping Tools..."
          emerge --noreplace --quiet dev-vcs/git dev-util/ccache
          
          chown -R portage:portage /var/cache/ccache
          chmod -R 2777 /var/cache/ccache
          
          echo ">>> Cloning Overlays..."
          git clone --depth 1 https://github.com/gentoo-mirror/guru.git /var/db/repos/guru || true
          git clone --depth 1 https://github.com/anyc/steam-overlay.git /var/db/repos/steam-overlay || true

          echo ">>> Fixing upstream Steam Overlay corruptions..."
          if [ -d /var/db/repos/steam-overlay/games-util/steam-launcher ]; then
            cd /var/db/repos/steam-overlay/games-util/steam-launcher
            ebuild $(ls *.ebuild | tail -n1) manifest || true
            cd /
          fi
          
          mkdir -p /var/db/repos/guru/metadata /var/db/repos/steam-overlay/metadata
          echo "masters = gentoo" > /var/db/repos/guru/metadata/layout.conf
          echo "masters = gentoo" > /var/db/repos/steam-overlay/metadata/layout.conf

          cat > /etc/portage/repos.conf/guru.conf << 'EOF'
          [guru]
          location = /var/db/repos/guru
          priority = 50
          masters = gentoo
          EOF
          
          cat > /etc/portage/repos.conf/steam-overlay.conf << 'EOF'
          [steam-overlay]
          location = /var/db/repos/steam-overlay
          priority = 50
          masters = gentoo
          EOF

          cat > /etc/portage/repos.conf/gentoo-nexus.conf << 'EOF'
          [gentoo-nexus]
          location = /overlay
          masters = gentoo guru
          priority = 9999
          EOF

          cat > /etc/portage/package.mask/no-live-core << 'MASK'
          =media-libs/mesa-9999*
          =dev-util/mesa_clc-9999*
          =dev-util/spirv-tools-9999*
          =media-libs/vulkan-loader-9999*
          MASK

          # UNIFIED DNA - ALL NODES
          echo "*/*::guru **" >> /etc/portage/package.accept_keywords/guru
          echo "*/*::steam-overlay **" >> /etc/portage/package.accept_keywords/steam
          echo "*/*::gentoo-nexus **" >> /etc/portage/package.accept_keywords/nexus
          echo "media-libs/mesa ~amd64" >> /etc/portage/package.accept_keywords/nexus
          echo "media-libs/vulkan-loader ~amd64" >> /etc/portage/package.accept_keywords/nexus
          echo "dev-util/mesa_clc ~amd64" >> /etc/portage/package.accept_keywords/nexus
          echo "dev-util/spirv-tools ~amd64" >> /etc/portage/package.accept_keywords/nexus
          echo "dev-util/spirv-headers ~amd64" >> /etc/portage/package.accept_keywords/nexus
          echo "dev-util/vulkan-headers ~amd64" >> /etc/portage/package.accept_keywords/nexus
          echo "dev-util/glslang ~amd64" >> /etc/portage/package.accept_keywords/nexus
          echo "dev-util/vulkan-utility-libraries ~amd64" >> /etc/portage/package.accept_keywords/nexus
          echo "sys-kernel/gentoo-kernel ~amd64" >> /etc/portage/package.accept_keywords/nexus
          echo "sys-kernel/linux-firmware ~amd64" >> /etc/portage/package.accept_keywords/nexus
          echo "virtual/dist-kernel ~amd64" >> /etc/portage/package.accept_keywords/nexus

          cat > /etc/portage/package.mask/fixes << 'MASK'
          sys-apps/systemd
          sys-apps/gentoo-systemd-integration
          =games-util/steam-launcher-1.0.0.85-r3::steam-overlay
          MASK

          cat > /etc/portage/package.use/global << 'EOF'
          sys-libs/zlib minizip
          media-video/pipewire extra
          media-video/ffmpeg -sdl
          dev-qt/qtbase wayland X -icu -sql -sqlite
          sys-libs/ncurses -gpm
          EOF

          mkdir -p /etc/portage/env /etc/portage/package.env
          cat > /etc/portage/env/gcc-ice-safe << 'EOF'
          CFLAGS="-O1 -pipe -fno-tree-loop-vectorize -fno-tree-slp-vectorize"
          CXXFLAGS="-O1 -pipe -fno-tree-loop-vectorize -fno-tree-slp-vectorize"
          EOF
          echo "MAKEOPTS=\"-j$(nproc)\"" >> /etc/portage/env/gcc-ice-safe
          cat > /etc/portage/package.env/gcc-ice-packages << 'EOF'
          dev-util/spirv-tools gcc-ice-safe
          media-libs/mesa gcc-ice-safe
          EOF

          cat > /etc/portage/package.use/steam << 'USE'
          media-libs/mesa abi_x86_32
          media-libs/vulkan-loader abi_x86_32 layers
          dev-util/spirv-tools abi_x86_32
          x11-drivers/nvidia-drivers abi_x86_32
          app-accessibility/at-spi2-core abi_x86_32
          app-arch/bzip2 abi_x86_32
          app-arch/lz4 abi_x86_32
          app-arch/xz-utils abi_x86_32
          app-arch/zstd abi_x86_32
          app-crypt/p11-kit abi_x86_32
          dev-db/sqlite abi_x86_32
          dev-libs/dbus-glib abi_x86_32
          dev-libs/elfutils abi_x86_32
          dev-libs/expat abi_x86_32
          dev-libs/fribidi abi_x86_32
          dev-libs/glib abi_x86_32
          dev-libs/gmp abi_x86_32
          dev-libs/icu abi_x86_32
          dev-libs/json-glib abi_x86_32
          dev-libs/libevdev abi_x86_32
          dev-libs/libffi abi_x86_32
          dev-libs/libgcrypt abi_x86_32
          dev-libs/libgpg-error abi_x86_32
          dev-libs/libgudev abi_x86_32
          dev-libs/libgusb abi_x86_32
          dev-libs/libpcre2 abi_x86_32
          dev-libs/libtasn1 abi_x86_32
          dev-libs/libunistring abi_x86_32
          dev-libs/libusb abi_x86_32
          dev-libs/libxml2 abi_x86_32
          dev-libs/lzo abi_x86_32
          dev-libs/nettle abi_x86_32
          dev-libs/nspr abi_x86_32
          dev-libs/nss abi_x86_32
          dev-libs/openssl abi_x86_32
          dev-libs/wayland abi_x86_32
          dev-util/glslang abi_x86_32
          dev-util/sysprof-capture abi_x86_32
          dev-util/vulkan-utility-libraries abi_x86_32
          gnome-base/librsvg abi_x86_32
          gui-libs/libdecor abi_x86_32
          llvm-core/clang abi_x86_32
          llvm-core/llvm abi_x86_32
          media-gfx/graphite2 abi_x86_32
          media-libs/alsa-lib abi_x86_32
          media-libs/flac abi_x86_32
          media-libs/fontconfig abi_x86_32
          media-libs/freetype abi_x86_32
          media-libs/glu abi_x86_32
          media-libs/harfbuzz abi_x86_32
          media-libs/lcms abi_x86_32
          media-libs/libdisplay-info abi_x86_32
          media-libs/libepoxy abi_x86_32
          media-libs/libglvnd abi_x86_32
          media-libs/libjpeg-turbo abi_x86_32
          media-libs/libogg abi_x86_32
          media-libs/libpng abi_x86_32
          media-libs/libpulse abi_x86_32
          media-libs/libsdl2 abi_x86_32
          media-libs/libsndfile abi_x86_32
          media-libs/libva abi_x86_32
